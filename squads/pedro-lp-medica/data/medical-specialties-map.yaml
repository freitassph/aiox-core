# Medical Specialties Map — Guia de SEO, Copy e Compliance por Especialidade
# Para uso pelos agentes: medical-seo-specialist, medical-copywriter, cfm-compliance-sentinel

specialties:
  cardiology:
    name: "Cardiologia"
    schema_org: "Cardiovascular"
    patient_vocabulary: ["problemas do coração", "pressão alta", "arritmia", "palpitações"]
    keywords_tier1: ["cardiologista [cidade]", "médico do coração [cidade]"]
    high_risk_conditions: ["hipertensão", "infarto", "insuficiência cardíaca"]
    cfm_notes: "Alta sensibilidade — evitar linguagem alarmista sobre doenças cardíacas"
    tone: "sóbrio-acolhedor, científico mas acessível"
    trust_signals: ["anos de experiência", "exames realizados", "SBC membership"]
    color_adaptation: "Manter teal padrão — azul profundo funciona bem"

  dermatology:
    name: "Dermatologia"
    schema_org: "Dermatology"
    patient_vocabulary: ["pele", "acne", "manchas", "queda de cabelo", "câncer de pele"]
    keywords_tier1: ["dermatologista [cidade]", "dermatologista estética [cidade]"]
    high_risk_conditions: ["melanoma", "câncer de pele"]
    cfm_notes: "Antes/depois PERMITIDO com aviso. Proibir promessas estéticas específicas."
    tone: "moderno-acolhedor, visual, menos técnico que cardiologia"
    trust_signals: ["casos tratados", "tecnologia utilizada", "SBD membership"]
    color_adaptation: "Paleta mais suave — pêssego/nude sutil + sage como acento"

  orthopedics:
    name: "Ortopedia"
    schema_org: "Musculoskeletal"
    patient_vocabulary: ["dor no joelho", "dor nas costas", "coluna", "artrose", "lesão esportiva"]
    keywords_tier1: ["ortopedista [cidade]", "ortopedia joelho [cidade]"]
    cfm_notes: "Evitar prometer recuperação de lesões. Foco em diagnóstico e reabilitação."
    tone: "funcional-direto, performance-focused"
    trust_signals: ["cirurgias realizadas", "clubes/times atendidos se houver", "SBOT membership"]
    color_adaptation: "Azul steel mais intenso — estrutura, força"

  endocrinology:
    name: "Endocrinologia"
    schema_org: "Endocrine"
    patient_vocabulary: ["diabetes", "tireoide", "obesidade", "hormônios", "menopausa"]
    keywords_tier1: ["endocrinologista [cidade]", "médico diabetes [cidade]"]
    cfm_notes: "Alta sensibilidade com diabetes e obesidade — linguagem sem estigma"
    tone: "técnico-acolhedor, foco em qualidade de vida"
    trust_signals: ["anos de experiência", "SBEM membership"]
    color_adaptation: "Azul + dourado — equilíbrio, precisão"

  gynecology:
    name: "Ginecologia e Obstetrícia"
    schema_org: "Obstetric"
    patient_vocabulary: ["ginecologista", "exame preventivo", "gravidez", "endometriose", "menopausa"]
    keywords_tier1: ["ginecologista [cidade]", "obstetra [cidade]"]
    high_risk_conditions: ["endometriose", "câncer de colo de útero", "infertilidade"]
    cfm_notes: "Infertilidade: NUNCA prometer gravidez ou taxa de sucesso. Obstetrícia: linguagem cuidadosa."
    tone: "acolhedor-empático, linguagem feminina sem ser patronizante"
    trust_signals: ["pacientes atendidas", "partos realizados", "FEBRASGO membership"]
    color_adaptation: "Rosa sofisticado (não infantil) + teal padrão"

  neurology:
    name: "Neurologia"
    schema_org: "Neurologic"
    patient_vocabulary: ["enxaqueca", "AVC", "Alzheimer", "epilepsia", "tontura", "dormência"]
    keywords_tier1: ["neurologista [cidade]", "médico enxaqueca [cidade]"]
    high_risk_conditions: ["AVC", "Parkinson", "Alzheimer"]
    cfm_notes: "Condições neurológicas sérias: linguagem de esperança sem promessas de reversão"
    tone: "sóbrio-científico com acolhimento, foco em qualidade de vida"
    trust_signals: ["formação neurológica", "ABN membership"]
    color_adaptation: "Azul profundo + cinza azulado — profundidade, sofisticação"

  gastroenterology:
    name: "Gastroenterologia"
    schema_org: "Gastroenterologic"
    patient_vocabulary: ["refluxo", "intestino", "colonoscopia", "fígado", "úlcera", "diarreia"]
    keywords_tier1: ["gastroenterologista [cidade]", "médico intestino [cidade]"]
    cfm_notes: "Padrão — evitar linguagem sobre 'limpeza intestinal' pseudocientífica"
    tone: "profissional-acolhedor"
    trust_signals: ["exames realizados", "FBG membership"]
    color_adaptation: "Teal padrão + sage — saúde, natureza"

  pediatrics:
    name: "Pediatria"
    schema_org: "Pediatric"
    patient_vocabulary: ["pediatra", "médico crianças", "bebê", "desenvolvimento infantil", "vacina"]
    keywords_tier1: ["pediatra [cidade]", "pediatra bebê [cidade]"]
    cfm_notes: "Foco nos pais, não nas crianças como pacientes diretos. Sem alarmismo sobre desenvolvimento."
    tone: "acolhedor-otimista, linguagem parental, tranquilizador"
    trust_signals: ["anos atendendo crianças", "SBP membership"]
    color_adaptation: "Paleta mais vibrante mas sofisticada — azul suave + coral/laranja suave"

  psychiatry:
    name: "Psiquiatria"
    schema_org: "Psychiatric"
    patient_vocabulary: ["depressão", "ansiedade", "TDAH", "psiquiatra", "transtorno"]
    keywords_tier1: ["psiquiatra [cidade]", "médico ansiedade [cidade]"]
    cfm_notes: "MÁXIMA sensibilidade. Sem estigmatizar. Sem prometer 'cura' de transtornos."
    tone: "acolhedor-empático, linguagem de esperança, anti-estigma"
    trust_signals: ["abordagem humanizada", "ABP membership"]
    color_adaptation: "Verde sage dominante + azul suave — calma, esperança"

  urology:
    name: "Urologia"
    schema_org: "Urologic"
    patient_vocabulary: ["próstata", "cálculo renal", "incontinência urinária", "disfunção erétil"]
    keywords_tier1: ["urologista [cidade]", "médico próstata [cidade]"]
    cfm_notes: "Disfunção erétil: linguagem médica, não sensacionalista"
    tone: "profissional-direto, abordagem masculina sem ser machista"
    trust_signals: ["cirurgias realizadas", "SBU membership"]
    color_adaptation: "Azul steel padrão"

  oncology:
    name: "Oncologia"
    schema_org: "Oncologic"
    patient_vocabulary: ["câncer", "tumor", "quimioterapia", "oncologista", "diagnóstico precoce"]
    keywords_tier1: ["oncologista [cidade]", "médico câncer [cidade]"]
    high_risk_conditions: ["todas as condições oncológicas"]
    cfm_notes: "MÁXIMA SENSIBILIDADE. Nunca 'cura garantida'. Foco em diagnóstico precoce e qualidade de vida."
    tone: "sóbrio-humanizado-esperançoso, nunca alarmista, nunca promessas"
    trust_signals: ["equipe multidisciplinar", "hospital de referência", "SBOC membership"]
    color_adaptation: "Roxo âmbar quente — esperança, não morte. Evitar vermelho puro."

# Sociedades médicas (para Trust Signals e E-E-A-T)
medical_societies:
  CFM: "Conselho Federal de Medicina — https://portal.cfm.org.br"
  AMB: "Associação Médica Brasileira — https://amb.org.br"
  SBC: "Sociedade Brasileira de Cardiologia"
  SBD: "Sociedade Brasileira de Dermatologia"
  SBOT: "Sociedade Brasileira de Ortopedia e Traumatologia"
  SBEM: "Sociedade Brasileira de Endocrinologia e Metabologia"
  FEBRASGO: "Federação Brasileira das Associações de Ginecologia e Obstetrícia"
  ABN: "Academia Brasileira de Neurologia"
  FBG: "Federação Brasileira de Gastroenterologia"
  SBP: "Sociedade Brasileira de Pediatria"
  ABP: "Associação Brasileira de Psiquiatria"
  SBU: "Sociedade Brasileira de Urologia"
  SBOC: "Sociedade Brasileira de Oncologia Clínica"
