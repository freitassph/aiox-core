# Design Tokens — Clinical Luxury System
# Referência canônica de todos os valores de design
# Para uso pelos agentes medical-design-system e medical-ui-artisan

meta:
  name: Clinical Luxury
  version: "2.0"
  created: "2026-03-18"
  author: "Valentina Cruz — medical-design-system"
  description: "Design system S+++ para landing pages médicas"

# ─────────────────────────────────────
# CORES
# ─────────────────────────────────────
colors:
  # Paleta Deep Blue (autoridade médica)
  depth:
    "900": "oklch(18% 0.065 248)"
    "800": "oklch(24% 0.07 246)"
    "700": "oklch(30% 0.075 244)"
    "600": "oklch(36% 0.08 242)"

  # Paleta Medical Teal (saúde, confiança)
  teal:
    "700": "oklch(38% 0.11 195)"
    "600": "oklch(46% 0.12 193)"  # PRIMARY
    "500": "oklch(54% 0.12 192)"
    "400": "oklch(62% 0.11 192)"
    "100": "oklch(94% 0.025 195)"
    "050": "oklch(97% 0.012 195)"

  # Neutros Quentes (não frios)
  neutral:
    "950": "oklch(14% 0.008 90)"
    "900": "oklch(20% 0.008 90)"
    "800": "oklch(28% 0.008 90)"
    "700": "oklch(38% 0.007 90)"
    "500": "oklch(52% 0.006 90)"
    "400": "oklch(64% 0.005 90)"
    "300": "oklch(75% 0.005 90)"
    "200": "oklch(85% 0.005 90)"
    "150": "oklch(91% 0.004 90)"
    "100": "oklch(94% 0.004 90)"
    "050": "oklch(97% 0.003 90)"
  pearl: "oklch(98.5% 0.004 85)"

  # Acentos Prestige
  gold:
    "600": "oklch(68% 0.10 76)"
    "400": "oklch(78% 0.09 78)"
    "100": "oklch(95% 0.025 80)"
  sage:
    "600": "oklch(50% 0.10 153)"
    "400": "oklch(63% 0.09 152)"
    "100": "oklch(94% 0.025 155)"

  # Semânticas
  success:
    "700": "oklch(42% 0.14 145)"
    "600": "oklch(52% 0.15 145)"
    "100": "oklch(94% 0.04 145)"
  warning:
    "600": "oklch(65% 0.14 72)"
    "100": "oklch(95% 0.04 80)"
  error:
    "600": "oklch(52% 0.17 22)"
    "100": "oklch(95% 0.04 20)"
  info:
    "600": "oklch(52% 0.13 228)"
    "100": "oklch(94% 0.03 228)"

  # Dark surfaces (impact sections)
  surface_dark:
    "1": "oklch(12% 0.055 248)"
    "2": "oklch(16% 0.05 247)"
    "3": "oklch(20% 0.045 246)"
    glass: "oklch(20% 0.045 246 / 0.85)"

# ─────────────────────────────────────
# TIPOGRAFIA
# ─────────────────────────────────────
typography:
  fonts:
    display: "'Fraunces', Georgia, serif"
    heading: "'Plus Jakarta Sans', system-ui, sans-serif"
    body: "'Inter', system-ui, sans-serif"
    mono: "'JetBrains Mono', 'Fira Code', monospace"
    quote: "'DM Serif Display', Georgia, serif"

  scale:
    display_2xl: "clamp(3.5rem, 6vw + 1rem, 7rem)"
    display_xl:  "clamp(3rem, 5vw + 0.75rem, 5.5rem)"
    display_lg:  "clamp(2.5rem, 4vw + 0.5rem, 4.5rem)"
    heading_xl:  "clamp(2rem, 3vw + 0.5rem, 3.5rem)"
    heading_lg:  "clamp(1.625rem, 2.5vw, 2.5rem)"
    heading_md:  "clamp(1.375rem, 2vw, 2rem)"
    heading_sm:  "clamp(1.125rem, 1.5vw, 1.625rem)"
    body_xl: "1.25rem"
    body_lg: "1.125rem"
    body_md: "1rem"
    body_sm: "0.875rem"
    body_xs: "0.8125rem"
    label_lg: "0.9375rem"
    label_md: "0.875rem"
    label_sm: "0.8125rem"
    label_xs: "0.75rem"

  line_heights:
    tight:    "0.95"
    snug:     "1.1"
    normal:   "1.4"
    relaxed:  "1.55"
    loose:    "1.65"
    spacious: "1.75"

  tracking:
    tightest: "-0.04em"
    tight:    "-0.03em"
    snug:     "-0.02em"
    normal:   "0"
    wide:     "0.025em"
    wider:    "0.05em"
    widest:   "0.08em"

  weights:
    thin:       "100"
    light:      "300"
    regular:    "400"
    medium:     "500"
    semibold:   "600"
    bold:       "700"
    extrabold:  "800"

# ─────────────────────────────────────
# ESPAÇAMENTO
# ─────────────────────────────────────
spacing:
  "0":  "0"
  "px": "1px"
  "1":  "0.25rem"   # 4px
  "2":  "0.5rem"    # 8px
  "3":  "0.75rem"   # 12px
  "4":  "1rem"      # 16px
  "5":  "1.25rem"   # 20px
  "6":  "1.5rem"    # 24px
  "8":  "2rem"      # 32px
  "10": "2.5rem"    # 40px
  "12": "3rem"      # 48px
  "16": "4rem"      # 64px
  "20": "5rem"      # 80px
  "24": "6rem"      # 96px
  "32": "8rem"      # 128px
  "40": "10rem"     # 160px
  "48": "12rem"     # 192px
  "64": "16rem"     # 256px

layout:
  section_pad_y: "clamp(4rem, 8vw, 8rem)"
  section_pad_x: "clamp(1.5rem, 4vw, 4rem)"
  content_max: "1280px"
  content_narrow: "760px"
  content_wide: "1440px"

breakpoints:
  xs: "320px"
  sm: "480px"
  md: "768px"
  lg: "1024px"
  xl: "1280px"
  "2xl": "1440px"
  "3xl": "1920px"

# ─────────────────────────────────────
# BORDAS
# ─────────────────────────────────────
border_radius:
  xs:   "2px"
  sm:   "4px"
  md:   "8px"
  lg:   "12px"
  xl:   "16px"
  "2xl": "24px"
  "3xl": "32px"
  "4xl": "48px"
  full: "9999px"

borders:
  subtle:  "1px solid oklch(85% 0.005 90)"
  default: "1.5px solid oklch(75% 0.005 90)"
  strong:  "2px solid oklch(64% 0.005 90)"
  brand:   "2px solid oklch(54% 0.12 192)"
  focus:   "2px solid oklch(62% 0.11 192)"

# ─────────────────────────────────────
# SOMBRAS
# ─────────────────────────────────────
shadows:
  xs:  "0 1px 2px 0 oklch(20% 0.06 245 / 0.04)"
  sm:  "0 1px 3px 0 oklch(20% 0.06 245 / 0.06), 0 1px 2px -1px oklch(20% 0.06 245 / 0.04)"
  md:  "0 4px 6px -1px oklch(20% 0.06 245 / 0.07), 0 2px 4px -2px oklch(20% 0.06 245 / 0.04)"
  lg:  "0 10px 15px -3px oklch(20% 0.06 245 / 0.07), 0 4px 6px -4px oklch(20% 0.06 245 / 0.03)"
  xl:  "0 20px 25px -5px oklch(20% 0.06 245 / 0.08), 0 8px 10px -6px oklch(20% 0.06 245 / 0.03)"
  "2xl": "0 25px 50px -12px oklch(20% 0.06 245 / 0.18)"
  card_hover: "0 20px 40px -8px oklch(20% 0.06 245 / 0.13), 0 8px 16px -4px oklch(20% 0.06 245 / 0.06)"
  focus_teal: "0 0 0 2px white, 0 0 0 4px oklch(54% 0.12 192)"
  focus_dark: "0 0 0 2px white, 0 0 0 4px oklch(36% 0.08 242)"
  glass: "0 8px 32px 0 oklch(12% 0.05 248 / 0.24), inset 0 1px 0 oklch(100% 0 0 / 0.1)"

# ─────────────────────────────────────
# MOTION
# ─────────────────────────────────────
motion:
  easing:
    default: "cubic-bezier(0.4, 0, 0.2, 1)"
    out:     "cubic-bezier(0, 0, 0.2, 1)"
    in:      "cubic-bezier(0.4, 0, 1, 1)"
    spring:  "cubic-bezier(0.34, 1.32, 0.64, 1)"
    breath:  "cubic-bezier(0.37, 0, 0.63, 1)"

  duration:
    instant: "50ms"
    fast:    "100ms"
    normal:  "200ms"
    slow:    "300ms"
    breath:  "500ms"
    long:    "700ms"
    lazy:    "1000ms"

  # Animações de componentes
  component_patterns:
    card_hover:     "translateY(-6px) + shadow-card-hover | 200ms ease-out"
    btn_hover:      "scale(1.01) | 150ms ease-out"
    btn_active:     "scale(0.97) | 100ms ease-in"
    fade_up:        "opacity 0→1, translateY 16px→0 | 400ms ease-out"
    counter_animate: "0 → N via requestAnimationFrame | easeOutCubic"
    whatsapp_pulse: "box-shadow ring expand+fade | 3s infinite"
    chevron_rotate: "rotate 0→180deg | 200ms ease-default"
    checkmark:      "stroke-dashoffset 100→0 | 300ms ease-out"
    skeleton_shimmer: "background-position -200%→200% | 1.5s ease-in-out infinite"

# ─────────────────────────────────────
# COMPONENTES — REFERÊNCIA
# ─────────────────────────────────────
components:
  # Botões
  button:
    height:
      sm: "var(--space-8)"   # 32px
      md: "var(--space-10)"  # 40px
      lg: "var(--space-12)"  # 48px
    padding:
      sm: "0 var(--space-4)"
      md: "0 var(--space-6)"
      lg: "0 var(--space-8)"
    border_radius: "var(--radius-full)"
    font_weight: "600"
    transition: "all 200ms var(--ease-default)"

  # Inputs
  input:
    height: "var(--space-12)"  # 48px
    padding: "0 var(--space-4)"
    border_radius: "var(--radius-md)"
    border: "var(--border-default)"
    border_focus: "var(--border-focus)"
    background: "var(--color-neutral-150)"
    background_focus: "white"
    transition: "all 150ms var(--ease-out)"

  # Cards
  card:
    padding: "var(--space-6)"
    border_radius: "var(--radius-xl)"
    shadow: "var(--shadow-sm)"
    shadow_hover: "var(--shadow-card-hover)"
    transform_hover: "translateY(-6px)"
    transition: "all 200ms var(--ease-out)"

  # Doctor portrait
  doctor_portrait:
    aspect_ratio: "3/4"
    border_radius: "var(--radius-2xl)"
    shadow: "var(--shadow-xl)"

  # Doctor avatar
  doctor_avatar:
    aspect_ratio: "1/1"
    border_radius: "var(--radius-full)"
    border: "3px solid white"
    shadow: "var(--shadow-md)"
