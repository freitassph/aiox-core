# ─────────────────────────────────────────────────────────────────────────────
# TIPOGRAFIA
# ─────────────────────────────────────────────────────────────────────────────
typography:
  # Google Fonts — carregar no layout.tsx
  fonts:
    display: "Fraunces"          # Hero H1, quotes — autoridade dramática
    heading: "Plus Jakarta Sans" # H2-H4 — modernidade elegante
    body: "Inter"                # Corpo — legibilidade máxima
    mono: "JetBrains Mono"       # CRM badges, dados — precisão técnica
    quote: "DM Serif Display"    # Citações de pacientes — humanidade

  # Configuração de carregamento (next/font)
  loading:
    fraunces:
      subsets: ["latin"]
      variable: "--font-fraunces"
      display: "swap"
      weights: [300, 400, 600, 700]
      axes: ["opsz", "WONK", "SOFT"]  # optical size + expressividade
    plus_jakarta_sans:
      subsets: ["latin"]
      variable: "--font-jakarta"
      display: "swap"
      weights: [400, 500, 600, 700, 800]
    inter:
      subsets: ["latin"]
      variable: "--font-inter"
      display: "swap"
      weights: [400, 500, 600]
    jetbrains_mono:
      subsets: ["latin"]
      variable: "--font-mono"
      display: "swap"
      weights: [400, 500]

  # Escala tipográfica — fluid com clamp()
  scale:
    xs:   "clamp(0.75rem, 0.7vw, 0.875rem)"   # 12-14px
    sm:   "clamp(0.875rem, 0.9vw, 1rem)"       # 14-16px
    base: "clamp(1rem, 1vw, 1.125rem)"         # 16-18px
    lg:   "clamp(1.125rem, 1.2vw, 1.25rem)"    # 18-20px
    xl:   "clamp(1.25rem, 1.4vw, 1.5rem)"      # 20-24px
    2xl:  "clamp(1.5rem, 2vw, 2rem)"           # 24-32px
    3xl:  "clamp(2rem, 2.5vw, 2.5rem)"         # 32-40px
    4xl:  "clamp(2.5rem, 3.5vw, 3.5rem)"       # 40-56px
    5xl:  "clamp(3rem, 5vw, 5rem)"             # 48-80px — hero

  # Line heights
  leading:
    none:    "1"
    tight:   "1.1"  # headlines
    snug:    "1.2"  # subheadings
    normal:  "1.5"  # body
    relaxed: "1.6"  # body longo/médico (legibilidade)
    loose:   "1.8"  # accessibility mode

  # Letter spacing
  tracking:
    tighter:  "-0.04em"  # grandes headlines
    tight:    "-0.02em"  # headings normais
    normal:   "0em"
    wide:     "0.05em"   # badges, labels, all-caps
    wider:    "0.1em"    # micro-labels

  # Font weights
  weight:
    light:     300
    regular:   400
    medium:    500
    semibold:  600
    bold:      700
    extrabold: 800

# ─────────────────────────────────────────────────────────────────────────────
# ESPAÇAMENTO — Base 8px grid
# ─────────────────────────────────────────────────────────────────────────────
spacing:
  1:  "0.25rem"   # 4px
  2:  "0.5rem"    # 8px
  3:  "0.75rem"   # 12px
  4:  "1rem"      # 16px
  5:  "1.25rem"   # 20px
  6:  "1.5rem"    # 24px
  8:  "2rem"      # 32px
  10: "2.5rem"    # 40px
  12: "3rem"      # 48px
  16: "4rem"      # 64px
  20: "5rem"      # 80px
  24: "6rem"      # 96px
  32: "8rem"      # 128px
  40: "10rem"     # 160px
  48: "12rem"     # 192px
  64: "16rem"     # 256px

# ─────────────────────────────────────────────────────────────────────────────
# LAYOUT E BREAKPOINTS
# ─────────────────────────────────────────────────────────────────────────────
layout:
  breakpoints:
    xs: "375px"    # iPhone SE
    sm: "640px"    # Mobile large
    md: "768px"    # Tablet
    lg: "1024px"   # Laptop
    xl: "1280px"   # Desktop
    2xl: "1536px"  # Wide

  container:
    default: "1200px"   # max-width conteúdo principal
    narrow: "800px"     # bio, blog, formulário
    wide: "1400px"      # hero full-bleed
    padding_mobile: "1rem"
    padding_desktop: "2rem"

  grid:
    columns: 12
    gutter: "1.5rem"

# ─────────────────────────────────────────────────────────────────────────────
# BORDAS E RAIOS
# ─────────────────────────────────────────────────────────────────────────────
borders:
  radius:
    xs:   "0.25rem"   # 4px — inputs, badges pequenos
    sm:   "0.5rem"    # 8px — botões pequenos
    md:   "0.75rem"   # 12px — cards menores
    lg:   "1rem"      # 16px — cards padrão
    xl:   "1.5rem"    # 24px — cards hero
    2xl:  "2rem"      # 32px — seções arredondadas
    full: "9999px"    # pílulas, avatares

  width:
    thin:   "1px"
    base:   "1.5px"   # padrão medical (traço fino)
    medium: "2px"
    thick:  "3px"

# ─────────────────────────────────────────────────────────────────────────────
# SOMBRAS — Sistema em camadas
# ─────────────────────────────────────────────────────────────────────────────
shadows:
  xs:        "0 1px 2px oklch(10% 0.02 248 / 0.15)"
  sm:        "0 2px 4px oklch(10% 0.02 248 / 0.2)"
  md:        "0 4px 8px oklch(10% 0.02 248 / 0.25)"
  lg:        "0 8px 16px oklch(10% 0.02 248 / 0.3)"
  xl:        "0 16px 32px oklch(10% 0.02 248 / 0.35)"
  2xl:       "0 24px 48px oklch(10% 0.02 248 / 0.4)"
  card_hover: "0 20px 40px oklch(10% 0.02 248 / 0.45), 0 0 0 1px oklch(30% 0.015 248 / 0.4)"
  brand_glow: "0 0 24px oklch(58% 0.18 195 / 0.35)"  # atualizar com brand.500
  focus_ring: "0 0 0 3px oklch(58% 0.18 195 / 0.5)"  # atualizar com brand.500

# ─────────────────────────────────────────────────────────────────────────────
# MOTION — "Breath of the System"
# ─────────────────────────────────────────────────────────────────────────────
motion:
  easing:
    medical:  "cubic-bezier(0.25, 0.46, 0.45, 0.94)"  # smooth, respeitoso
    spring:   "cubic-bezier(0.34, 1.56, 0.64, 1)"     # leve spring
    out_expo: "cubic-bezier(0.16, 1, 0.3, 1)"         # entradas rápidas
    in_out:   "cubic-bezier(0.65, 0, 0.35, 1)"        # transições de página

  duration:
    instant: "100ms"   # micro-feedbacks (hover, focus ring)
    fast:    "200ms"   # interações UI
    base:    "300ms"   # transições padrão
    slow:    "500ms"   # entradas de seção
    slower:  "700ms"   # hero entrance
    breath:  "800ms"   # animações de "respiro" — identidade do sistema

  # Reduced motion — OBRIGATÓRIO
  reduced_motion: |
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

# ─────────────────────────────────────────────────────────────────────────────
# COMPONENTES — Tokens de componente
# ─────────────────────────────────────────────────────────────────────────────
components:
  button:
    height_sm:  "2.25rem"    # 36px
    height_md:  "2.75rem"    # 44px — padrão, WCAG touch target
    height_lg:  "3.25rem"    # 52px — CTA principal
    padding_sm: "0.5rem 1rem"
    padding_md: "0.75rem 1.5rem"
    padding_lg: "1rem 2rem"

  input:
    height:     "3rem"       # 48px
    padding:    "0 1rem"
    radius:     "${borders.radius.md}"

  card:
    padding_sm: "1.5rem"
    padding_md: "2rem"
    padding_lg: "2.5rem"

  doctor_card:
    photo_size_md: "clamp(200px, 30vw, 320px)"
    photo_ratio: "3/4"   # retrato médico
    photo_radius: "${borders.radius.2xl}"

  whatsapp_button:
    color: "oklch(65% 0.25 145)"    # verde WhatsApp
    glow: "0 0 20px oklch(65% 0.25 145 / 0.4)"
    pulse_ring: "oklch(65% 0.25 145 / 0.3)"

# ─────────────────────────────────────────────────────────────────────────────
# CFM / COMPLIANCE — Tokens de conformidade
# ─────────────────────────────────────────────────────────────────────────────
compliance:
  crm_badge:
    bg:     "oklch(18% 0.05 248)"
    border: "oklch(30% 0.08 195)"
    text:   "${colors.neutral.200}"
    font:   "${typography.fonts.mono}"
    size:   "${typography.scale.sm}"

  disclaimer_text:
    color:  "${colors.neutral.400}"
    size:   "${typography.scale.xs}"
    style:  "italic"

  lgpd_consent:
    checkbox_size: "1.25rem"    # 20px — WCAG touch target mínimo

# ─────────────────────────────────────────────────────────────────────────────
# OUTPUT — Arquivos a gerar
# ─────────────────────────────────────────────────────────────────────────────
output:
  - path: "src/styles/tokens.css"
    description: "CSS Custom Properties — fonte da verdade"
  - path: "tailwind.config.ts"
    description: "Tailwind v4 @theme config"
  - path: "src/styles/globals.css"
    description: "Base styles + @import tokens"
