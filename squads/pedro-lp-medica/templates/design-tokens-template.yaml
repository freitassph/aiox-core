# Design Tokens Template — Clinical Luxury Medical Landing
# Instrução: Copie este arquivo para docs/design-tokens-[projeto].yaml e preencha os campos [CUSTOMIZAR].
# Gerado por: medical-design-system (Valentina Cruz)
# Referência completa: data/design-tokens-clinical-luxury.yaml
# Formato: OKLCH (CSS Color Level 4) — oklch(lightness chroma hue)

metadata:
  project: "[CUSTOMIZAR: Nome do Projeto]"
  doctor: "[CUSTOMIZAR: Dr./Dra. Nome]"
  specialty: "[CUSTOMIZAR: Especialidade]"  # cardiology|dermatology|orthopedics|etc.
  city: "[CUSTOMIZAR: Cidade]"
  generated_at: "[CUSTOMIZAR: YYYY-MM-DD]"
  generated_by: "medical-design-system (Valentina Cruz)"
  version: "2.0.0"

# ─────────────────────────────────────────────────────────────────────────────
# CORES — OKLCH
# Valores padrão baseados no Clinical Luxury base.
# Cada especialidade tem adaptações no campo specialty_adaptation abaixo.
# ─────────────────────────────────────────────────────────────────────────────
colors:
  # Backgrounds (profundidade)
  depth:
    900: "oklch(14% 0.015 248)"   # --color-depth-900 | bg-page padrão
    800: "oklch(18% 0.018 248)"   # --color-depth-800 | surfaces elevados
    700: "oklch(22% 0.02 248)"    # --color-depth-700 | cards
    600: "oklch(26% 0.02 248)"    # --color-depth-600 | hover states
    100: "oklch(97% 0.008 248)"   # --color-depth-100 | modo claro bg

  # Neutros (texto e superfícies)
  neutral:
    50:  "oklch(98% 0.005 248)"   # --neutral-50 | branco quente
    100: "oklch(95% 0.007 248)"   # --neutral-100
    200: "oklch(90% 0.01 248)"    # --neutral-200 | borders
    300: "oklch(80% 0.012 248)"   # --neutral-300 | placeholder
    400: "oklch(65% 0.015 248)"   # --neutral-400 | muted text
    500: "oklch(52% 0.018 248)"   # --neutral-500
    600: "oklch(42% 0.02 248)"    # --neutral-600 | body text claro
    700: "oklch(34% 0.02 248)"    # --neutral-700 | body text escuro
    800: "oklch(26% 0.018 248)"   # --neutral-800
    900: "oklch(18% 0.015 248)"   # --neutral-900

  # Brand Primary — Teal Médico (padrão)
  # [CUSTOMIZAR por especialidade — ver specialty_adaptation]
  brand:
    50:  "oklch(96% 0.04 195)"    # --brand-50  | tint ultra-leve
    100: "oklch(92% 0.07 195)"    # --brand-100 | tint leve
    200: "oklch(85% 0.10 195)"    # --brand-200 | tint médio
    300: "oklch(75% 0.14 195)"    # --brand-300 | tint forte
    400: "oklch(65% 0.16 195)"    # --brand-400 | semi-vivid
    500: "oklch(58% 0.18 195)"    # --brand-500 | PRIMARY — use aqui
    600: "oklch(50% 0.16 195)"    # --brand-600 | hover
    700: "oklch(42% 0.14 195)"    # --brand-700 | pressed
    800: "oklch(34% 0.11 195)"    # --brand-800 | deep
    900: "oklch(26% 0.08 195)"    # --brand-900 | darkest

  # Prestige Gold — Acentos e Trust Signals
  gold:
    300: "oklch(88% 0.12 85)"     # --gold-300 | hover/light
    400: "oklch(82% 0.14 85)"     # --gold-400
    500: "oklch(76% 0.15 85)"     # --gold-500 | PRIMARY GOLD
    600: "oklch(68% 0.14 85)"     # --gold-600 | hover

  # Living Sage — Wellness
  sage:
    200: "oklch(88% 0.07 145)"    # --sage-200 | tint
    400: "oklch(70% 0.12 145)"    # --sage-400
    500: "oklch(60% 0.14 145)"    # --sage-500 | PRIMARY SAGE

  # Semantic
  semantic:
    success:  "oklch(65% 0.18 145)"  # --success | verde
    warning:  "oklch(78% 0.16 85)"   # --warning | âmbar
    error:    "oklch(58% 0.22 25)"   # --error   | vermelho
    info:     "oklch(62% 0.18 248)"  # --info    | azul

  # Semantic Aliases (mapear para tokens acima)
  aliases:
    bg_page:          "${colors.depth.900}"
    bg_surface:       "${colors.depth.800}"
    bg_card:          "${colors.depth.700}"
    text_primary:     "${colors.neutral.50}"
    text_secondary:   "${colors.neutral.300}"
    text_muted:       "${colors.neutral.400}"
    text_on_brand:    "${colors.neutral.50}"
    border_default:   "oklch(30% 0.015 248 / 0.6)"  # com transparência
    border_focus:     "${colors.brand.500}"
    brand_primary:    "${colors.brand.500}"
    brand_hover:      "${colors.brand.600}"
    cta_bg:           "${colors.brand.500}"
    cta_hover:        "${colors.brand.600}"
    cta_text:         "${colors.neutral.50}"
    trust_gold:       "${colors.gold.500}"
    wellness_sage:    "${colors.sage.500}"

