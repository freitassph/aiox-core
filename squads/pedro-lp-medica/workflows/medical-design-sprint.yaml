workflow:
  id: medical-design-sprint
  name: "Medical Design Sprint — S+++ Tier em 5 Dias"
  description: "Sprint focado em design system e componentes. Para quando o cliente precisa de rebrand ou redesign sem refazer tudo."
  version: 1.0.0

  pre_conditions:
    - "Briefing básico já coletado (pode ser express)"
    - "Cliente disponível para validações diárias"
    - "Designer system agent alocado full-time"
    - "Figma ou ferramenta de design configurada"

  post_conditions:
    - "Design system S+++ completo com tokens"
    - "Componentes atômicos especificados"
    - "Guidelines de tipografia, cores, spacing documentadas"
    - "Handoff pronto para UI Artisan implementar"

  error_handler:
    on_design_block: "Revisar com architect, buscar referência adicional, simplificar se necessário"
    on_client_unavailable: "Pausar sprint, notificar orchestrator, reagendar"
    on_scope_creep: "Documentar, avaliar impacto, decidir com orchestrator"
    actions:
      - "Parar sprint se design block crítico"
      - "Notificar orchestrator e cliente"
      - "Simplificar abordagem se necessário"
      - "Re-validar após correção"

  retry_on:
    design_rejection: "Incorporar feedback, redesinhar (máx 2 cycles)"
    quality_fail: "Corrigir tokens/components, re-validar"

  # Flat steps array for orchestration tools (phases below for human readability)
  steps:
    - id: express-briefing
      task: medical-briefing-task.md
      agent: medical-prd-architect
      description: "Briefing express: identidade, público, referências visuais"
      retry: true
      max_iterations: 2

    - id: identity-analysis
      task: medical-design-tokens-task.md
      agent: medical-design-system
      description: "Análise de identidade existente + decisão de paleta base"
      retries: 1
      max_iterations: 2

    - id: generate-tokens
      agent: medical-design-system
      task: medical-design-tokens-task.md
      description: "Geração completa de tokens personalizados"
      retries: 1
      max_iterations: 3

    - id: validate-tokens
      task: medical-design-tokens-task.md
      agent: medical-ui-artisan
      description: "Validação técnica dos tokens (contraste, implementabilidade)"
      retries: 1
      max_iterations: 2

    - id: atoms-spec
      agent: medical-atomic-design-architect
      task: medical-atomic-components-task.md
      description: "Spec de átomos prioritários: buttons, inputs, badges, typography"
      retries: 1
      max_iterations: 2

    - id: atoms-implementation
      task: medical-atomic-components-task.md
      agent: medical-ui-artisan
      description: "Implementação dos átomos em código"
      retries: 1
      max_iterations: 2

    - id: organisms-spec
      task: medical-landing-primary-task.md
      agent: medical-atomic-design-architect
      description: "Spec dos organismos: Hero, DoctorProfile, BookingForm"
      retries: 1
      max_iterations: 2

    - id: organisms-implementation
      task: medical-atomic-components-task.md
      agent: medical-ui-artisan
      description: "Implementação dos organismos principais"
      retries: 1
      max_iterations: 2

    - id: design-review
      task: medical-landing-primary-task.md
      agent: medical-design-system
      description: "Review intermediário — aprovação das seções críticas"
      retries: 1
      max_iterations: 2

    - id: design-qa
      task: medical-landing-primary-task.md
      agent: medical-qa-auditor
      description: "QA de design e acessibilidade"
      checklist: design-quality-s-tier-checklist.md
      retries: 1
      max_iterations: 2

    - id: final-approval
      task: medical-landing-primary-task.md
      agent: medical-design-system
      description: "Aprovação final S+++ tier"
      checklist: design-quality-s-tier-checklist.md
      retries: 1
      max_iterations: 2



  phases:
    - id: day-1-research
      name: "Dia 1: Research & Identity"
      steps:
        - agent: medical-prd-architect
          description: "Briefing express: identidade, público, referências visuais"
        - agent: medical-design-system
          description: "Análise de identidade existente + decisão de paleta base"

    - id: day-2-tokens
      name: "Dia 2: Design Tokens"
      steps:
        - agent: medical-design-system
          task: medical-design-tokens-task.md
          description: "Geração completa de tokens personalizados"
        - agent: medical-ui-artisan
          description: "Validação técnica dos tokens (contraste, implementabilidade)"

    - id: day-3-atoms-molecules
      name: "Dia 3: Átomos e Moléculas"
      steps:
        - agent: medical-atomic-design-architect
          task: medical-atomic-components-task.md
          description: "Spec de átomos prioritários: buttons, inputs, badges, typography"
        - agent: medical-ui-artisan
          description: "Implementação dos átomos em código"

    - id: day-4-organisms
      name: "Dia 4: Organismos"
      steps:
        - agent: medical-atomic-design-architect
          description: "Spec dos organismos: Hero, DoctorProfile, BookingForm"
        - agent: medical-ui-artisan
          description: "Implementação dos organismos principais"
        - agent: medical-design-system
          description: "Review intermediário — aprovação das seções críticas"

    - id: day-5-qa-delivery
      name: "Dia 5: QA e Entrega"
      steps:
        - agent: medical-qa-auditor
          description: "QA de design e acessibilidade"
          checklist: design-quality-s-tier-checklist.md
        - agent: medical-design-system
          description: "Aprovação final S+++ tier"
          checklist: design-quality-s-tier-checklist.md

  deliverables:
    - "styles/tokens.css — tokens completos"
    - "components/atoms/ — implementados"
    - "components/molecules/ — prioritários implementados"
    - "components/organisms/Hero, DoctorProfile, BookingForm — implementados"
    - "Design Quality S+++ Checklist — aprovada"
    - "Storybook ou documentação de componentes"
