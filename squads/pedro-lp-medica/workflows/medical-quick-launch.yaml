workflow:
  id: medical-quick-launch
  name: "Medical Quick Launch — 7 Dias Fast Track"
  description: "Lançamento rápido de landing page médica usando template pré-construído. Adequado para médico autônomo com urgência de presença digital."
  version: 1.0.0

  pre_conditions:
    - "Médico autônomo com CRM/RQE em mãos"
    - "Template pré-construído disponível e atualizado"
    - "Domínio registrado ou subdomínio disponível"
    - "Pagamento quick launch recebido"

  post_conditions:
    - "Landing page médica em produção (template customizado)"
    - "CFM compliance verificado (CRM/RQE visível, sem promessas)"
    - "WhatsApp/telefone CTA funcionando"
    - "GA4 básico configurado"
    - "SSL ativo e domínio configurado"

  error_handler:
    on_compliance_block: "Corrigir imediatamente, quick launch não pode ter compliance issues"
    on_template_issue: "Fallback para template alternativo ou customização manual"
    on_delay: "Notificar cliente, ajustar expectativas, estender se necessário"
    actions:
      - "Parar lançamento se compliance block"
      - "Notificar cliente e ajustar expectativas"
      - "Fallback para template alternativo se necessário"
      - "Corrigir e re-testar antes de prosseguir"

  retry_on:
    compliance_failure: "Corrigir e re-auditar (máx 2 retries)"
    technical_issue: "Debug, corrigir, re-testar"

  # Flat steps array for orchestration tools (phases below for human readability)
  steps:
    - id: quick-briefing
      task: medical-briefing-task.md
      agent: medical-prd-architect
      description: "Briefing em 1h (blocos 1-5 do medical-briefing-task)"
      retry: true
      max_iterations: 1

    - id: compliance-risk-map
      task: medical-compliance-audit-task.md
      agent: cfm-compliance-sentinel
      description: "Risk map rápido para a especialidade"
      retries: 1
      max_iterations: 2

    - id: template-selection
      task: medical-design-tokens-task.md
      agent: medical-design-system
      description: "Selecionar template pré-construído adequado"
      retries: 1
      max_iterations: 1

    - id: template-customization
      task: medical-build-landing-task.md
      agent: medical-ui-artisan
      description: "Customizar template com tokens, copy e identidade do cliente"
      retries: 1
      max_iterations: 3

    - id: copy-production
      task: medical-copy-framework-task.md
      agent: medical-copywriter
      description: "Copy humanizada CFM-compliant para template"
      retries: 1
      max_iterations: 2

    - id: compliance-review
      task: medical-compliance-audit-task.md
      agent: cfm-compliance-sentinel
      description: "Auditoria CFM rápida em copy e layout"
      checklist: cfm-2336-2023-checklist.md
      retries: 1
      max_iterations: 2

    - id: integrations-setup
      task: medical-build-landing-task.md
      agent: medical-integration-engineer
      description: "WhatsApp, telefone, GA4 básico"
      retries: 1
      max_iterations: 2

    - id: technical-qa
      task: medical-build-landing-task.md
      agent: medical-qa-auditor
      description: "QA rápido: mobile, performance, acessibilidade"
      retries: 1
      max_iterations: 2

    - id: deploy
      task: medical-build-landing-task.md
      agent: medical-deployment-agent
      description: "Deploy em produção com domínio e SSL"
      retries: 1
      max_iterations: 2



  constraints:
    max_duration: "7 dias úteis"
    target: "médico autônomo, 1 especialidade, CTA principal: WhatsApp/telefone"
    design_tier: "S++ (ligeiramente abaixo de S+++ por velocidade, sem comprometer compliance)"

  phases:
    - id: day-1
      name: "Dia 1: Briefing Express"
      steps:
        - agent: medical-prd-architect
          description: "Briefing em 1h (blocos 1-5 do medical-briefing-task)"
          time_box: "2 horas"
        - agent: cfm-compliance-sentinel
          description: "Risk map rápido para a especialidade"
          time_box: "1 hora"

    - id: day-2
      name: "Dia 2: Design Tokens + Copy Hero"
      steps:
        - agent: medical-design-system
          description: "Tokens express — paleta + tipografia (customização mínima)"
          time_box: "3 horas"
        - agent: medical-copywriter
          description: "Copy prioritária: hero + sobre + 3 serviços principais + CTA"
          time_box: "3 horas"

    - id: day-3-4
      name: "Dias 3-4: Implementação"
      steps:
        - agent: medical-ui-artisan
          description: "Implementação com template SingleDoctorLanding (seções 1-7)"
          time_box: "2 dias"
        - agent: medical-integration-engineer
          description: "WhatsApp link, GA4, LGPD CMP básico"
          time_box: "paralelo com implementação"

    - id: day-5
      name: "Dia 5: Compliance + QA"
      steps:
        - agent: cfm-compliance-sentinel
          description: "Audit express — focar em Blockers apenas"
          checklist: cfm-2336-2023-checklist.md
        - agent: medical-qa-auditor
          description: "QA técnico express + mobile check"

    - id: day-6
      name: "Dia 6: SEO Mínimo + Correções"
      steps:
        - agent: medical-seo-specialist
          description: "Meta tags + Schema.org + GSC + GMN básico"
        - agent: medical-ui-artisan
          description: "Correções QA"

    - id: day-7
      name: "Dia 7: Launch"
      steps:
        - agent: medical-deployment-agent
          description: "Deploy produção + domínio + monitoramento"
          checklist: launch-readiness-checklist.md

  deliverables:
    - "Landing page publicada em produção"
    - "Compliance Clearance básica"
    - "Google Analytics + Google Search Console configurados"
    - "WhatsApp CTA funcional"
    - "Schema.org válido"

  not_included:
    - "Blog / conteúdo educativo (V2)"
    - "Formulário de agendamento completo (V2)"
    - "Storybook de componentes"
    - "Testes E2E completos"
