workflow:
  id: full-system-build
  name: Full System Build & Orchestration (S+++)
  description: Orquestração completa para construção, auditoria e deploy do
    Sistema Agente Pedro Henrique.
  version: 1.2.0
  pre_conditions:
    - Environment is stable
    - All agents are active
  post_conditions:
    - System is audit-ready
    - Results are verified
  steps:
    - id: init-project
      agent: psa-maestro
      task: Inicializar a arquitetura global e definir o roadmap de entrega.
      retry:
        max_attempts: 3
        delay_ms: 1000
        strategy: exponential
      error_handler:
        - action: notify_owner
          message: Falha crítica na inicialização do sistema.
        - action: abort_workflow
    - id: analyze-requirements
      agent: psa-doc-writer
      task: Consolidar requisitos e gerar especificações funcionais.
      retry:
        max_attempts: 2
        delay_ms: 500
        strategy: fixed
      error_handler:
        - action: retry_with_more_context
        - action: log_error
          severity: high
    - id: setup-infrastructure
      agent: psa-devops
      task: Prover infraestrutura VPS, Docker e Hardening de Segurança.
      retry:
        max_attempts: 3
        delay_ms: 2000
        strategy: exponential
      error_handler:
        - action: rollback_infra
        - action: notify_devops_team
    - id: design-database
      agent: psa-data-engineer
      task: Modelagem de schemas, RLS e índices vetoriais pgvector.
      retry:
        max_attempts: 3
        delay_ms: 1000
        strategy: exponential
      error_handler:
        - action: drop_temporary_schemas
        - action: notify_data_engineer
    - id: build-backend-api
      agent: psa-backend
      task: Implementar APIs de alta performance (p99 < 150ms) e lógica de negócio.
      retry:
        max_attempts: 2
        delay_ms: 500
        strategy: fixed
      error_handler:
        - action: cleanup_build_artifacts
        - action: log_stack_trace
    - id: create-ux-journeys
      agent: psa-ux-designer
      task: Projetar interfaces Premium (Dark Exec) e jornadas de usuário.
      retry:
        max_attempts: 2
        delay_ms: 500
        strategy: fixed
      error_handler:
        - action: fallback_to_wireframes
        - action: notify_ux_team
    - id: develop-frontend
      agent: psa-frontend
      task: Implementar interface Next.js ultra-rápida com Web Vitals 100/100.
      retry:
        max_attempts: 3
        delay_ms: 1000
        strategy: exponential
      error_handler:
        - action: clear_next_cache
        - action: notify_frontend_team
    - id: integrate-ai-core
      agent: psa-ai-builder
      task: Configurar RAG avançado, ferramentas de IA e orquestração de agentes.
      retry:
        max_attempts: 5
        delay_ms: 2000
        strategy: exponential
      error_handler:
        - action: switch_to_backup_llm
        - action: notify_ai_engineer
    - id: external-connections
      agent: psa-integrations
      task: Conectar APIs externas (WhatsApp, Stripe, GitHub) com resiliência.
      retry:
        max_attempts: 3
        delay_ms: 3000
        strategy: exponential
      error_handler:
        - action: deactivate_failing_bridge
        - action: notify_integrations_lead
    - id: full-qa-audit
      agent: psa-qa
      task: Executar suite de testes E2E, performance e regressão visual.
      retry:
        max_attempts: 2
        delay_ms: 1000
        strategy: fixed
      error_handler:
        - action: log_failed_test_cases
        - action: notify_qa_team
    - id: final-compliance-check
      agent: psa-auditor
      task: Auditoria final de segurança, densidade e conformidade S+++.
      retry:
        max_attempts: 3
        delay_ms: 1000
        strategy: fixed
      error_handler:
        - action: block_release
        - action: generate_incident_report
    - id: launch-production
      agent: psa-devops
      task: Deploy atômico (Zero Downtime) e ativação de monitoramento real-time.
      retry:
        max_attempts: 1
        delay_ms: 0
        strategy: fixed
      error_handler:
        - action: instant_rollback
        - action: emergency_notify_stakeholders
    - id: onboarding-deployment
      agent: psa-onboarding
      task: Ativar manuais de uso e concluir integração da squad de operação.
      retry:
        max_attempts: 2
        delay_ms: 1000
        strategy: fixed
      error_handler:
        - action: manual_handoff_trigger
        - action: log_onboarding_incident
  error_handler:
    actions:
      - action: psa-audit-system
        message: Triggering audit system due to failure
      - action: log-error
        message: Logging workflow error to centralized bucket
  retry:
    count: 3
    delay: 10s
