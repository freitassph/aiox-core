workflow:
  id: ai-agent-build
  name: Advanced AI Agent Build System (S+++)
  description: Orquestração para criação, treinamento e validação de novos agentes
    de IA de alta densidade.
  version: 1.1.0
  pre_conditions:
    - Environment is stable
    - All agents are active
  post_conditions:
    - System is audit-ready
    - Results are verified
  steps:
    - id: define-persona
      agent: psa-maestro
      task: Definir a identidade YAML e o papel estratégico do novo agente.
      retry:
        max_attempts: 2
        delay_ms: 500
        strategy: fixed
      error_handler:
        - action: refine_persona_specs
        - action: notify_owner
    - id: write-nuclear-agent
      agent: psa-doc-writer
      task: Redigir as 500+ linhas do agente (.md) com as 7 seções obrigatórias.
      retry:
        max_attempts: 3
        delay_ms: 1000
        strategy: exponential
      error_handler:
        - action: append_technical_appendices
        - action: notify_doc_team
    - id: logic-integration
      agent: psa-ai-builder
      task: Configurar ferramentas (Tools), RAG e parâmetros de inferência do agente.
      retry:
        max_attempts: 3
        delay_ms: 1000
        strategy: exponential
      error_handler:
        - action: reset_agent_config
        - action: notify_ai_engineer
    - id: security-hardening
      agent: psa-auditor
      task: Auditar o agente recém-criado em busca de riscos de segurança ou baixa
        densidade.
      retry:
        max_attempts: 2
        delay_ms: 500
        strategy: fixed
      error_handler:
        - action: reject_and_refactor
        - action: log_compliance_failure
    - id: deployment-activation
      agent: psa-devops
      task: Ativar o agente no sistema de orquestração e configurar monitoramento.
      retry:
        max_attempts: 2
        delay_ms: 1000
        strategy: fixed
      error_handler:
        - action: rollback_activation
        - action: notify_devops
  error_handler:
    actions:
      - action: psa-audit-system
        message: Triggering audit system due to failure
      - action: log-error
        message: Logging workflow error to centralized bucket
  retry:
    count: 3
    delay: 10s
