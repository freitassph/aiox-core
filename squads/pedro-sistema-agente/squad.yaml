name: pedro-sistema-agente
version: 1.0.0
description: "Squad elite de construção de sistemas completos — frontend Apple/Ferrari, backend bulletproof, agentes IA, deploy VPS. Qualidade $50M. Task-first. Auditoria constante."
author: Pedro Henrique Menezes de Freitas
license: MIT
slashPrefix: psa

aiox:
