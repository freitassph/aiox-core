    - psa-integrations.md
    - psa-onboarding.md
    - psa-devops.md
    - psa-auditor.md
    - psa-doc-writer.md
    - psa-qa.md

  tasks:
    - psa-orchestrate-project.md
    - psa-gather-requirements.md
    - psa-design-system.md
    - psa-build-frontend.md
    - psa-build-backend.md
    - psa-setup-database.md
    - psa-build-ai-agents.md
    - psa-setup-integrations.md
    - psa-deploy-vps.md
    - psa-audit-system.md

  workflows:
    - full-system-build.yaml
    - ai-agent-build.yaml
    - audit-cycle.yaml

  checklists:
    - accessibility-checklist.md
    - api-testing-checklist.md
    - code-review-checklist.md
    - deployment-checklist.md
    - performance-audit-checklist.md
    - security-audit-checklist.md
