# AI Agent Builder Tool
# Tool for creating and configuring AI agents within the system

name: ai-agent-builder
version: 1.0.0
type: tool

description: >
  Comprehensive tool for creating, configuring, and managing
  AI agents within the system. Handles agent definitions,
  prompt engineering, tool bindings, and knowledge base setup.

agent_creation:
  required_fields:
    - id: Unique identifier for the agent (kebab-case)
    - name: Display name
    - role: Primary role/responsibility
    - system_prompt: Main system prompt defining behavior
    - model: LLM model to use (gpt-4o, gpt-4o-mini, etc.)

  optional_fields:
    - temperature: 0.0-1.0 (default: 0.7)
    - max_tokens: Maximum tokens per response (default: 4096)
    - tools: List of tool bindings
    - knowledge_base: RAG document IDs
    - memory: Memory configuration
    - fallback_agent: Agent to delegate to if uncertain
    - guardrails: Safety constraints

  prompt_templates:
    customer_support: |
      You are {agent_name}, a {role} for {company}.
      Your primary goal is to help users with {primary_function}.
      Always be helpful, concise, and accurate.
      If you don't know something, say so — never fabricate information.
      Use the following knowledge base for factual answers: {{knowledge_base}}
      Current conversation context: {{context}}

    sales_assistant: |
      You are {agent_name}, a {role} for {company}.
      Your goal is to help potential customers understand {product/service}.
      Be consultative, not pushy. Ask clarifying questions.
      Focus on the customer's needs and pain points.
      Product knowledge: {{product_info}}
      Customer context: {{customer_context}}

    scheduling_assistant: |
      You are {agent_name}, a {role} for {company}.
      Your goal is to manage appointments and schedules efficiently.
      Always confirm details before booking.
      Available slots: {{available_slots}}
      Customer: {{customer_name}}
      Requested service: {{service_type}}

  model_recommendations:
    gpt-4o:
      use_case: Complex reasoning, nuanced conversations, multi-step tasks
      cost: Higher
      latency: Medium
      best_for:
        - Sales conversations
        - Technical support
        - Complex scheduling with constraints
        - Multi-turn reasoning

    gpt-4o-mini:
      use_case: Fast, cost-effective interactions
      cost: Lower
      latency: Low
      best_for:
        - FAQ and knowledge base queries
        - Simple scheduling
        - Message classification
        - Intent detection

    gpt-4-turbo:
      use_case: Large context windows, document processing
      cost: Medium-High
      latency: Medium
      best_for:
        - Document analysis
        - RAG-heavy workflows
        - Long-form content generation

tool_bindings:
  available_tools:
    - name: database_query
      description: Query the PostgreSQL database via Supabase
      parameters:
        - table: string (required)
        - operation: select|insert|update|delete (required)
        - filters: object (optional)
        - limit: number (optional, default: 100)

    - name: whatsapp_send
      description: Send a WhatsApp message to a user
      parameters:
        - phone_number: string (required)
        - message: string (required)
        - template: string (optional, for template messages)

    - name: calendar_check
      description: Check availability in Google Calendar
      parameters:
        - calendar_id: string (required)
        - start_time: ISO8601 datetime (required)
        - end_time: ISO8601 datetime (required)

    - name: calendar_create
      description: Create an event in Google Calendar
      parameters:
        - calendar_id: string (required)
        - title: string (required)
        - start_time: ISO8601 datetime (required)
        - end_time: ISO8601 datetime (required)
        - attendees: array of strings (optional)
        - description: string (optional)

    - name: email_send
      description: Send an email via transactional provider
      parameters:
        - to: string (required)
        - subject: string (required)
        - body: string (required)
        - template_id: string (optional)

    - name: payment_process
      description: Process a payment or generate payment link
      parameters:
        - amount: number (required)
        - currency: string (required, default: BRL)
        - customer_id: string (required)
        - description: string (required)

    - name: rag_query
      description: Query the knowledge base for contextual information
      parameters:
        - query: string (required)
        - top_k: number (optional, default: 5)
        - category: string (optional)

memory_configuration:
  types:
    short_term:
      description: Conversation context within a single session
      storage: In-memory (Redis for persistence across requests)
      max_messages: 20
      ttl: "24 hours"

    long_term:
      description: User preferences, history, and learned patterns
      storage: PostgreSQL (user_profiles table)
      max_entries: 1000
      ttl: "Indefinite (user-controlled)"

    working:
      description: Temporary data for multi-step task execution
      storage: Redis (session-scoped)
      max_entries: 50
      ttl: "1 hour"

guardrails:
  content_filters:
    - block_pii_leakage: Never expose user personal data in responses
    - block_prompt_injection: Sanitize all user inputs before using in prompts
    - block_hallucination: Verify factual claims against knowledge base
    - block_unauthorized_actions: Enforce role-based tool access

  response_validation:
    - max_length: 2000 characters (before truncation warning)
    - language: Match user's language (auto-detect or explicit)
    - tone: Professional, helpful, concise
    - formatting: Markdown supported, no raw HTML

  escalation_rules:
    - rule: Agent uncertain about answer
      action: Fall back to fallback_agent or escalate to human
    - rule: User requests human agent
      action: Transfer to human support with full context
    - rule: Sensitive topic detected (payment disputes, legal)
      action: Flag for human review, provide draft response
    - rule: Conversation exceeds max turns without resolution
      action: Summarize and escalate to human

output_format:
  agent_config_file: |
    # Generated agent configuration
    agent:
      id: "{{agent_id}}"
      name: "{{agent_name}}"
      role: "{{agent_role}}"
      model: "{{model}}"
      temperature: {{temperature}}
      max_tokens: {{max_tokens}}
      system_prompt: |
        {{system_prompt}}
      tools:
        {{#each tools}}
        - {{this}}
        {{/each}}
      knowledge_base: {{knowledge_base_ids}}
      memory:
        short_term: {{short_term_config}}
        long_term: {{long_term_config}}
      guardrails:
        {{#each guardrails}}
        - {{this}}
        {{/each}}

usage:
  command: "ai-agent-builder"
  options:
    - flag: "--create"
      description: "Create a new agent interactively"
    - flag: "--config <file>"
      description: "Create agent from config file (YAML)"
    - flag: "--list"
      description: "List all configured agents"
    - flag: "--test <agent-id>"
      description: "Test an agent with a sample prompt"
    - flag: "--validate <agent-id>"
      description: "Validate agent configuration"
    - flag: "--export <agent-id>"
      description: "Export agent configuration as YAML"

  examples:
    - "ai-agent-builder --create"
    - "ai-agent-builder --config agents/support-agent.yaml"
    - "ai-agent-builder --list"
    - "ai-agent-builder --test scheduling-agent --message 'Can I book for tomorrow at 3pm?'"
    - "ai-agent-builder --validate support-agent"
