name: design-audit-workflow
description: "Workflow de auditoria de design completa — do scope ao improvement backlog"
version: "1.0"
squad: pedro-design

trigger:
  command: "*audit-design"
  event: design-audit-request

steps:
  - id: scope-definition
    agent: pdg-auditor
    action: "Definir escopo da auditoria — o que auditar, criterios, timeline"
    outputs:
      - audit-scope
      - audit-plan
      - evaluation-criteria

  - id: visual-consistency
    agent: pdg-auditor
    depends_on: scope-definition
    action: "Auditar consistência visual — cores, tipografia, spacing, estilo"
    outputs:
      - consistency-report
      - visual-deviations

  - id: component-audit
    agent: pdg-design-system
    depends_on: scope-definition
    action: "Auditar componentes — variants, states, usage, documentation"
    parallel_with: [token-audit]
    outputs:
      - component-audit-report
      - component-issues

  - id: token-audit
    agent: pdg-design-system
    depends_on: scope-definition
    action: "Auditar design tokens — naming, values, usage, consistency"
    parallel_with: [component-audit]
    outputs:
      - token-audit-report
      - token-issues

  - id: accessibility-check
    agent: pdg-auditor
    depends_on: [visual-consistency, component-audit]
    action: "Auditar acessibilidade — WCAG 2.1 AA, colorblind, screen reader"
    outputs:
      - accessibility-audit
      - violations-list

  - id: documentation-review
    agent: pdg-auditor
    depends_on: [component-audit, token-audit]
    action: "Revisar documentação — completeness, accuracy, currency"
    outputs:
      - documentation-score
      - doc-gaps

  - id: report
    agent: pdg-auditor
    depends_on: [visual-consistency, component-audit, token-audit, accessibility-check, documentation-review]
    action: "Compilar relatório final — scores, findings, recommendations"
    outputs:
      - final-audit-report
      - consistency-score
      - executive-summary

  - id: improvement-backlog
    agent: pdg-auditor
    depends_on: report
    action: "Criar backlog de melhorias — priorizado por impacto e esforço"
    outputs:
      - improvement-backlog
      - priority-matrix
      - recommended-timeline

success_criteria:
  - "Escopo definido com critérios claros"
  - "Consistência visual auditada com score"
  - "Componentes auditados com issues documentados"
  - "Tokens auditados com naming e consistency check"
  - "Accessibility check com violations list"
  - "Documentação revisada com score"
  - "Relatório final com executive summary e scores"
  - "Backlog priorizado com impacto e esforço"
