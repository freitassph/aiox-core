name: creative-strategy-workflow
description: "Workflow de estratégia criativa completa — do brief à plataforma criativa"
version: "1.0"
squad: pedro-design

trigger:
  command: "*develop-creative-strategy"
  event: creative-brief-received

steps:
  - id: brief-intake
    agent: pdg-creative-strategist
    action: "Absorver brief criativo, identificar objetivos de negocio, audiencia e contexto competitivo"
    outputs:
      - brief-analysis
      - key-questions

  - id: cultural-research
    agent: pdg-creative-strategist
    depends_on: brief-intake
    action: "Pesquisar tendencias culturais, sociais e de consumo relevantes"
    parallel_with: [competitive-analysis]
    outputs:
      - cultural-trends
      - consumer-insights

  - id: competitive-analysis
    agent: pdg-creative-strategist
    depends_on: brief-intake
    action: "Analisar abordagens criativas de competidores diretos e indiretos"
    parallel_with: [cultural-research]
    outputs:
      - competitive-creative-map
      - whitespace-identification

  - id: creative-platform
    agent: pdg-creative-strategist
    depends_on: [cultural-research, competitive-analysis]
    action: "Definir plataforma criativa — big idea, territories, proof points"
    outputs:
      - creative-platform-doc
      - big-idea
      - creative-territories

  - id: messaging-hierarchy
    agent: pdg-creative-strategist
    depends_on: creative-platform
    action: "Construir hierarquia de mensagens — primary, secondary, support"
    outputs:
      - messaging-hierarchy
      - tone-guidelines

  - id: visual-brief
    agent: pdg-creative-strategist
    depends_on: [creative-platform, messaging-hierarchy]
    action: "Traduzir plataforma criativa em brief visual para direção de arte"
    parallel_with: [campaign-territory]
    outputs:
      - visual-brief
      - mood-references

  - id: campaign-territory
    agent: pdg-creative-strategist
    depends_on: creative-platform
    action: "Definir territorios de campanha e aplicacoes por canal"
    parallel_with: [visual-brief]
    outputs:
      - campaign-territory-map
      - channel-applications

  - id: approval
    agent: pdg-chief
    depends_on: [visual-brief, campaign-territory]
    action: "Revisar e aprovar estratégia criativa completa"
    outputs:
      - approved-creative-strategy
      - handoff-to-execution

success_criteria:
  - "Brief analisado com insights documentados"
  - "Pesquisa cultural com minimum 10 trends relevantes"
  - "Análise competitiva de minimum 5 competidores"
  - "Plataforma criativa com big idea clara e 3+ creative territories"
  - "Hierarquia de mensagens com primary, secondary e support definidos"
  - "Brief visual com referencias e moodboard"
  - "Mapa de territorio de campanha com aplicacoes por canal"
  - "Aprovacao de pdg-chief documentada"
