name: creative-strategy-workflow
description: Workflow de estratégia criativa completa — do brief à plataforma criativa
version: "1.0"
squad: pedro-design
trigger:
  command: "*develop-creative-strategy"
  event: creative-brief-received
steps:
  - id: brief-intake
    agent: pdg-creative-strategist
    task: pdg-creative-brief-analysis.md
    retry:
      max_attempts: 2
      backoff: linear
    action: Absorver brief criativo, identificar objetivos de negocio, audiencia e
      contexto competitivo
    outputs:
      - brief-analysis
      - key-questions
    on_success: cultural-research
    on_failure: error-handler
  - id: cultural-research
    agent: pdg-creative-strategist
    task: pdg-cultural-research.md
    retry:
      max_attempts: 2
      backoff: linear
    depends_on: brief-intake
    action: Pesquisar tendencias culturais, sociais e de consumo relevantes
    parallel_with:
      - competitive-analysis
    outputs:
      - cultural-trends
      - consumer-insights
    on_success: competitive-analysis
    on_failure: error-handler
  - id: competitive-analysis
    agent: pdg-creative-strategist
    task: pdg-competitive-analysis.md
    retry:
      max_attempts: 2
      backoff: linear
    depends_on: brief-intake
    action: Analisar abordagens criativas de competidores diretos e indiretos
    parallel_with:
      - cultural-research
    outputs:
      - competitive-creative-map
      - whitespace-identification
    on_success: creative-platform
    on_failure: error-handler
  - id: creative-platform
    agent: pdg-creative-strategist
    task: pdg-creative-platform.md
    retry:
      max_attempts: 2
      backoff: linear
    depends_on:
      - cultural-research
      - competitive-analysis
    action: Definir plataforma criativa — big idea, territories, proof points
    outputs:
      - creative-platform-doc
      - big-idea
      - creative-territories
    on_success: messaging-hierarchy
    on_failure: error-handler
  - id: messaging-hierarchy
    agent: pdg-creative-strategist
    task: pdg-messaging-hierarchy.md
    retry:
      max_attempts: 2
      backoff: linear
    depends_on: creative-platform
    action: Construir hierarquia de mensagens — primary, secondary, support
    outputs:
      - messaging-hierarchy
      - tone-guidelines
    on_success: visual-brief
    on_failure: error-handler
  - id: visual-brief
    agent: pdg-creative-strategist
    task: pdg-visual-brief.md
    retry:
      max_attempts: 2
      backoff: linear
    depends_on:
      - creative-platform
      - messaging-hierarchy
    action: Traduzir plataforma criativa em brief visual para direção de arte
    parallel_with:
      - campaign-territory
    outputs:
      - visual-brief
      - mood-references
    on_success: campaign-territory
    on_failure: error-handler
  - id: campaign-territory
    agent: pdg-creative-strategist
    task: pdg-campaign-territory.md
    retry:
      max_attempts: 2
      backoff: linear
    depends_on: creative-platform
    action: Definir territorios de campanha e aplicacoes por canal
    parallel_with:
      - visual-brief
    outputs:
      - campaign-territory-map
      - channel-applications
    on_success: approval
    on_failure: error-handler
  - id: approval
    agent: pdg-chief
    task: pdg-creative-strategy-approval.md
    retry:
      max_attempts: 2
      backoff: linear
    depends_on:
      - visual-brief
      - campaign-territory
    action: Revisar e aprovar estratégia criativa completa
    outputs:
      - approved-creative-strategy
      - handoff-to-execution
    on_success: complete
    on_failure: error-handler
success_criteria:
  - Brief analisado com insights documentados
  - Pesquisa cultural com minimum 10 trends relevantes
  - Análise competitiva de minimum 5 competidores
  - Plataforma criativa com big idea clara e 3+ creative territories
  - Hierarquia de mensagens com primary, secondary e support definidos
  - Brief visual com referencias e moodboard
  - Mapa de territorio de campanha com aplicacoes por canal
  - Aprovacao de pdg-chief documentada
error_handler:
  id: error-handler
  name: Error Handler
  actions:
    - action: log
      message: "Workflow failed at {step_id}: {error}"
    - action: notify
      channel: design-creator-log
pre_conditions:
  - All required agents available and activated
  - Design brief approved by pdg-chief
  - Budget and timeline validated
post_conditions:
  - All design assets delivered
  - Quality gates passed
  - Client or stakeholder sign-off received
