# Photography Production Workflow
# Produção fotográfica completa — real e IA, com direção e pós-produção

name: photography-production
version: 1.0.0
description: "Workflow de produção fotográfica — desde o brief até a entrega em múltiplos formatos"
squad: pedro-design

metadata:
  created: 2026-03-25
  author: pdg-photo-director (Frame)
  tags:
    - photography
    - 8k
    - editorial
    - product
    - pedro-design

triggers:
  - type: manual
    command: "*create-photo"

inputs:
  - name: photo_type
    type: string
    required: true
    description: "portrait | product | lifestyle | editorial | fashion | food | architectural"
  - name: brief
    type: string
    required: true
  - name: quantity
    type: integer
    required: false
    default: 5
  - name: resolution
    type: string
    required: false
    default: "8K"
  - name: style
    type: string
    required: false
    default: "editorial"
  - name: color_grading
    type: string
    required: false
    default: "natural-editorial"

steps:
  - id: creative-brief
    name: "Creative Brief"
    agent: pdg-chief
    action: task
    inputs:
      brief: "{{inputs.brief}}"
      type: "photography"

  - id: mood-board
    name: "Mood Board & Shot List"
    agent: pdg-photo-director
    action: task
    depends_on:
      - creative-brief
    inputs:
      photo_type: "{{inputs.photo_type}}"
      brief: "{{inputs.brief}}"

  - id: photo-production
    name: "Photo Production"
    agent: pdg-photo-director
    action: task
    task: pdg-create-photo-8k.md
    depends_on:
      - mood-board
    inputs:
      photo_type: "{{inputs.photo_type}}"
      brief: "{{inputs.brief}}"
      output_resolution: "{{inputs.resolution}}"
      color_grading: "{{inputs.color_grading}}"

  - id: ai-generation
    name: "AI Image Generation"
    agent: pdg-ai-image-director
    action: task
    task: pdg-generate-ai-image.md
    depends_on:
      - mood-board
    inputs:
      brief: "{{inputs.brief}}"
      style: "{{inputs.style}}"
    on_error: continue

  - id: selection-curation
    name: "Selection & Curation"
    description: "Selecionar os melhores resultados"
    agent: pdg-photo-director
    action: review
    depends_on:
      - photo-production
      - ai-generation

  - id: post-processing
    name: "Post-Processing"
    description: "Color grading final e ajustes"
    agent: pdg-photo-director
    action: task
    depends_on:
      - selection-curation

outputs:
  - name: photo_master_files
    from: "{{steps.post-processing.output}}"
    description: "Fotografias finais em alta resolução"

completion:
  on_success:
    message: "Produção fotográfica concluída — {{inputs.quantity}} imagens em {{inputs.resolution}}."
  on_failure:
    message: "Falha na produção fotográfica."
