# Editorial Production Workflow
# Produção completa de ebooks, PDFs, relatórios e materiais editoriais

name: editorial-production
version: 1.0.0
description: "Workflow de produção editorial — ebook, whitepaper, relatório, catálogo, magazine"
squad: pedro-design

metadata:
  created: 2026-03-25
  author: pdg-print-editorial (Press)
  tags:
    - ebook
    - pdf
    - editorial
    - print
    - pedro-design

triggers:
  - type: manual
    command: "*create-editorial"

inputs:
  - name: document_type
    type: string
    required: true
    description: "ebook | whitepaper | annual-report | catalog | magazine | proposal | guide"
  - name: title
    type: string
    required: true
  - name: content
    type: string
    required: true
    description: "Conteúdo completo ou outline"
  - name: brand
    type: object
    required: false
    description: "Brand system (cores, fontes, logo)"
  - name: pages_target
    type: integer
    required: false
    default: 20

steps:
  - id: editorial-brief
    name: "Editorial Brief"
    agent: pdg-chief
    action: task
    inputs:
      brief: "{{inputs.title}} — {{inputs.document_type}}"
      type: "editorial"

  - id: editorial-system
    name: "Design System Editorial"
    description: "Definir grid, tipografia, componentes do documento"
    agent: pdg-print-editorial
    action: task
    depends_on:
      - editorial-brief

  - id: visual-assets
    name: "Visual Assets"
    description: "Criar/selecionar visuais necessários"
    agent: pdg-illustration-artist
    action: conditional
    depends_on:
      - editorial-system
    on_error: continue

  - id: photo-direction
    name: "Photo Direction"
    description: "Direção fotográfica para imagens do documento"
    agent: pdg-photo-director
    action: conditional
    depends_on:
      - editorial-system
    on_error: continue

  - id: layout-production
    name: "Layout Production"
    agent: pdg-print-editorial
    action: task
    task: pdg-create-ebook.md
    depends_on:
      - editorial-system
      - visual-assets
      - photo-direction
    inputs:
      ebook_type: "{{inputs.document_type}}"
      title: "{{inputs.title}}"
      content: "{{inputs.content}}"

  - id: quality-gate
    name: "Quality Gate"
    agent: pdg-auditor
    action: task
    depends_on:
      - layout-production
    on_error: continue

outputs:
  - name: pdf_digital
    from: "{{steps.layout-production.output.ebook_pdf_digital}}"
  - name: pdf_print
    from: "{{steps.layout-production.output.ebook_pdf_print}}"

completion:
  on_success:
    message: "{{inputs.document_type}} '{{inputs.title}}' produzido com excelência editorial."
  on_failure:
    message: "Falha na produção editorial."
