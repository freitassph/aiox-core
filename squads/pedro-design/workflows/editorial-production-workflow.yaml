name: editorial-production
version: 1.0.0
description: Workflow de produção editorial — ebook, whitepaper, relatório,
  catálogo, magazine
squad: pedro-design
metadata:
  created: 2026-03-25
  author: pdg-print-editorial (Press)
  tags:
    - ebook
    - pdf
    - editorial
    - print
    - pedro-design
triggers:
  - type: manual
    command: "*create-editorial"
inputs:
  - name: document_type
    type: string
    required: true
    description: ebook | whitepaper | annual-report | catalog | magazine | proposal | guide
  - name: title
    type: string
    required: true
  - name: content
    type: string
    required: true
    description: Conteúdo completo ou outline
  - name: brand
    type: object
    required: false
    description: Brand system (cores, fontes, logo)
  - name: pages_target
    type: integer
    required: false
    default: 20
steps:
  - id: editorial-brief
    name: Editorial Brief
    agent: pdg-chief
    task: pdg-editorial-brief.md
    retry:
      max_attempts: 2
      backoff: linear
    action: task
    inputs:
      brief: "{{inputs.title}} — {{inputs.document_type}}"
      type: editorial
    on_success: editorial-system
    on_failure: error-handler
  - id: editorial-system
    name: Design System Editorial
    description: Definir grid, tipografia, componentes do documento
    agent: pdg-print-editorial
    task: pdg-editorial-system.md
    retry:
      max_attempts: 2
      backoff: linear
    action: task
    depends_on:
      - editorial-brief
    on_success: visual-assets
    on_failure: error-handler
  - id: visual-assets
    name: Visual Assets
    description: Criar/selecionar visuais necessários
    agent: pdg-illustration-artist
    task: pdg-editorial-visual-assets.md
    retry:
      max_attempts: 2
      backoff: linear
    action: conditional
    depends_on:
      - editorial-system
    on_error: continue
    on_success: photo-direction
    on_failure: error-handler
  - id: photo-direction
    name: Photo Direction
    description: Direção fotográfica para imagens do documento
    agent: pdg-photo-director
    task: pdg-editorial-photo-direction.md
    retry:
      max_attempts: 2
      backoff: linear
    action: conditional
    depends_on:
      - editorial-system
    on_error: continue
    on_success: layout-production
    on_failure: error-handler
  - id: layout-production
    name: Layout Production
    agent: pdg-print-editorial
    task: pdg-create-ebook.md
    retry:
      max_attempts: 2
      backoff: linear
    action: task
    depends_on:
      - editorial-system
      - visual-assets
      - photo-direction
    inputs:
      ebook_type: "{{inputs.document_type}}"
      title: "{{inputs.title}}"
      content: "{{inputs.content}}"
    on_success: quality-gate
    on_failure: error-handler
  - id: quality-gate
    name: Quality Gate
    agent: pdg-auditor
    task: pdg-editorial-audit.md
    retry:
      max_attempts: 2
      backoff: linear
    action: task
    depends_on:
      - layout-production
    on_error: continue
    on_success: complete
    on_failure: error-handler
outputs:
  - name: pdf_digital
    from: "{{steps.layout-production.output.ebook_pdf_digital}}"
  - name: pdf_print
    from: "{{steps.layout-production.output.ebook_pdf_print}}"
completion:
  on_success:
    message: "{{inputs.document_type}} '{{inputs.title}}' produzido com excelência
      editorial."
  on_failure:
    message: Falha na produção editorial.
error_handler:
  id: error-handler
  name: Error Handler
  actions:
    - action: log
      message: "Workflow failed at {step_id}: {error}"
    - action: notify
      channel: design-creator-log
pre_conditions:
  - All required agents available and activated
  - Design brief approved by pdg-chief
  - Budget and timeline validated
post_conditions:
  - All design assets delivered
  - Quality gates passed
  - Client or stakeholder sign-off received
