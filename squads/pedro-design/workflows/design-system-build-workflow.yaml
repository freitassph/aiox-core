name: design-system-build-workflow
description: Workflow de construção de design system completo — do audit à library
version: "1.0"
squad: pedro-design
trigger:
  command: "*build-design-system"
  event: design-system-request
steps:
  - id: audit-existing
    agent: pdg-design-system
    task: pdg-design-system-audit.md
    retry:
      max_attempts: 2
      backoff: linear
    action: Auditar estado atual — inconsistências, duplicações, gaps
    outputs:
      - audit-report
      - inconsistency-map
    on_success: token-definition
    on_failure: error-handler
  - id: token-definition
    agent: pdg-design-system
    task: pdg-design-tokens.md
    retry:
      max_attempts: 2
      backoff: linear
    depends_on: audit-existing
    action: Definir design tokens — colors, typography, spacing, shadows, borders,
      radius
    outputs:
      - design-tokens
      - token-naming-convention
    on_success: color-system
    on_failure: error-handler
  - id: color-system
    agent: pdg-design-system
    task: pdg-color-system.md
    retry:
      max_attempts: 2
      backoff: linear
    depends_on: token-definition
    action: Construir sistema de cores — primary, secondary, semantic, neutral palettes
    parallel_with:
      - typography
    outputs:
      - color-palette
      - color-usage-guidelines
      - accessibility-contrast-matrix
    on_success: typography
    on_failure: error-handler
  - id: typography
    agent: pdg-design-system
    task: pdg-typography-system.md
    retry:
      max_attempts: 2
      backoff: linear
    depends_on: token-definition
    action: Definir sistema tipográfico — font families, scale, weights, line heights
    parallel_with:
      - color-system
    outputs:
      - typography-scale
      - font-usage-guidelines
      - responsive-typography
    on_success: component-inventory
    on_failure: error-handler
  - id: component-inventory
    agent: pdg-design-system
    task: pdg-component-inventory.md
    retry:
      max_attempts: 2
      backoff: linear
    depends_on: audit-existing
    action: Inventariar componentes existentes e identificar necessidades
    outputs:
      - component-inventory
      - component-gap-analysis
    on_success: component-design
    on_failure: error-handler
  - id: component-design
    agent: pdg-design-system
    task: pdg-component-design.md
    retry:
      max_attempts: 2
      backoff: linear
    depends_on:
      - component-inventory
      - color-system
      - typography
    action: Design de componentes — buttons, inputs, cards, modals, navigation
    outputs:
      - component-specs
      - component-variants
      - interaction-states
    on_success: documentation
    on_failure: error-handler
  - id: documentation
    agent: pdg-design-system
    task: pdg-component-documentation.md
    retry:
      max_attempts: 2
      backoff: linear
    depends_on: component-design
    action: Documentar cada componente com props, variants, examples e usage guidelines
    outputs:
      - component-docs
      - usage-examples
      - do-dont-guide
    on_success: library-build
    on_failure: error-handler
  - id: library-build
    agent: pdg-design-system
    task: pdg-component-library.md
    retry:
      max_attempts: 2
      backoff: linear
    depends_on: documentation
    action: Construir library de componentes em ferramenta selecionada (Figma, code)
    outputs:
      - component-library
      - design-tokens-export
    on_success: adoption-guide
    on_failure: error-handler
  - id: adoption-guide
    agent: pdg-design-system
    task: pdg-adoption-guide.md
    retry:
      max_attempts: 2
      backoff: linear
    depends_on: library-build
    action: Criar guia de adoção — como usar, quando estender, governança
    outputs:
      - adoption-guide
      - governance-model
      - contribution-process
    on_success: complete
    on_failure: error-handler
success_criteria:
  - Audit report com inconsistencies e gaps documentados
  - Design tokens definidos e nomeados consistentemente
  - Sistema de cores com minimum 5 paletas (primary, secondary, semantic,
    neutrals, data-viz)
  - Escala tipográfica responsiva definida
  - Minimum 15 componentes documentados com variants e states
  - Documentação completa com exemplos de uso
  - Library funcional em Figma e/ou código
  - Guia de adoção com governança definida
error_handler:
  id: error-handler
  name: Error Handler
  actions:
    - action: log
      message: "Workflow failed at {step_id}: {error}"
    - action: notify
      channel: design-creator-log
pre_conditions:
  - All required agents available and activated
  - Design brief approved by pdg-chief
  - Budget and timeline validated
post_conditions:
  - All design assets delivered
  - Quality gates passed
  - Client or stakeholder sign-off received
