name: motion-design-workflow
description: Workflow de produção de motion design — do storyboard ao export final
version: "1.0"
squad: pedro-design
trigger:
  command: "*motion-design"
  event: motion-brief-received
steps:
  - id: brief
    agent: pdg-motion-designer
    action: Analisar brief de motion — objetivo, audiencia, plataforma, mensagem
    outputs:
      - motion-requirements
      - platform-specs
    task: pdg-develop-creative-strategy
    retry:
      max_attempts: 2
      backoff: linear
    on_success: storyboard
    on_failure: error-handler
  - id: storyboard
    agent: pdg-motion-designer
    depends_on: brief
    action: Criar storyboard — sequência de frames com timing e narrativa
    outputs:
      - storyboard-frames
      - narrative-flow
    task: pdg-create-motion-spec
    retry:
      max_attempts: 2
      backoff: linear
    on_success: animatic
    on_failure: error-handler
  - id: animatic
    agent: pdg-motion-designer
    depends_on: storyboard
    action: Criar animatic — versão rough com timing real e placeholders
    outputs:
      - animatic-video
      - timing-notes
    task: pdg-create-motion-spec
    retry:
      max_attempts: 2
      backoff: linear
    on_success: styleframes
    on_failure: error-handler
  - id: styleframes
    agent: pdg-motion-designer
    depends_on: animatic
    action: Criar styleframes — frames chave com visual final definido
    parallel_with:
      - sound-design
    outputs:
      - key-styleframes
      - visual-direction-approved
    task: pdg-create-mockup
    retry:
      max_attempts: 2
      backoff: linear
    on_success: animation
    on_failure: error-handler
  - id: animation
    agent: pdg-motion-designer
    depends_on: styleframes
    action: Animar — keyframes, easing, secondary motion, polish
    outputs:
      - animated-video
      - animation-notes
    task: pdg-create-motion-spec
    retry:
      max_attempts: 2
      backoff: linear
    on_success: sound-design
    on_failure: error-handler
  - id: sound-design
    agent: pdg-motion-designer
    depends_on: animatic
    action: Design de som — music, SFX, voiceover, mix
    outputs:
      - sound-track
      - audio-mix
    task: pdg-create-motion-spec
    retry:
      max_attempts: 2
      backoff: linear
    on_success: review
    on_failure: error-handler
  - id: review
    agent: pdg-motion-designer
    depends_on:
      - animation
      - sound-design
    action: Review de qualidade — timing, smoothness, brand alignment, sound sync
    outputs:
      - review-notes
      - iteration-list
    task: pdg-audit-design
    retry:
      max_attempts: 2
      backoff: linear
    on_success: export-multi-format
    on_failure: error-handler
  - id: export-multi-format
    agent: pdg-motion-designer
    depends_on: review
    action: Exportar em múltiplos formatos — plataforma-specific specs
    outputs:
      - export-1080p
      - export-4k
      - export-social-cutdowns
      - export-loop-versions
    task: pdg-create-svg-assets
    retry:
      max_attempts: 2
      backoff: linear
    on_success: complete
    on_failure: error-handler
success_criteria:
  - Brief de motion documentado com plataforma specs
  - Storyboard com minimum 12 frames
  - Animatic com timing validado
  - Minimum 6 styleframes aprovados
  - Animação smooth a 60fps (ou 30fps para web)
  - Sound design integrado e mixado
  - Review passed com zero critical issues
  - Export em todos os formatos requeridos
error_handler:
  actions:
    - action: log
      message: "Workflow failed at {step_id} with error: {error}"
    - action: notify
      channel: pedro-design-alerts
      recipient: pdg-chief
pre_conditions:
  - All required agents available and activated
  - Design brief approved by pdg-chief
  - Budget and timeline validated
post_conditions:
  - All design assets delivered
  - Quality gates passed
  - Client or stakeholder sign-off received
