name: UI Design Workflow
description: Fluxo completo de design de interface — do brief ao handoff
version: 1.0.0
gates:
  brief_complete:
    criteria:
      - Objetivo claro e mensurado
      - Audiência definida
      - Entregáveis listados
      - Agentes necessários identificados
  flows_validated:
    criteria:
      - Happy path documentado
      - Todos os estados mapeados
      - Mobile wireframes incluídos
      - Validação com 3+ usuários (ou aprovação do usuário)
  visual_approved:
    criteria:
      - 3 direções criativas apresentadas
      - Direção selecionada aprovada
      - Sistema de tokens definido
      - Telas principais finalizadas
  copy_approved:
    criteria:
      - Todos os labels, placeholders, erros escritos
      - CTAs em voz ativa
      - Tom alinhado com brand voice
  motion_approved:
    criteria:
      - Micro-interactions definidas
      - Page transitions especificadas
      - Loading states animados
  implementation_complete:
    criteria:
      - Todos os componentes implementados
      - Design pixel-perfect em todos os breakpoints
      - Todos os estados implementados
      - Acessibilidade verificada
  audit_passed:
    criteria:
      - Zero CRIT issues
      - MAJ issues documentados com plano
      - WCAG 2.1 AA compliance
      - Performance Lighthouse > 90
steps:
  - id: brief
    agent: pdg-chief
    task: pdg-orchestrate-design
    retry:
      max_attempts: 2
      backoff: linear
    on_success: ux
    on_failure: error-handler
    outputs:
      - design-brief.md
      - moodboard.fig
    gate: brief_complete
  - id: ux
    agent: pdg-ux-designer
    task: pdg-orchestrate-design
    retry:
      max_attempts: 2
      backoff: linear
    on_success: visual
    on_failure: error-handler
    depends_on: brief
    outputs:
      - user-flows.fig
      - wireframes-lo-fi.fig
      - wireframes-hi-fi.fig
    gate: flows_validated
  - id: visual
    agent: pdg-visual-designer
    task: pdg-orchestrate-design
    retry:
      max_attempts: 2
      backoff: linear
    on_success: copy
    on_failure: error-handler
    depends_on: ux
    outputs:
      - visual-direction.fig
      - design-screens.fig
      - design-tokens.json
    gate: visual_approved
  - id: copy
    agent: pdg-ux-writer
    task: pdg-orchestrate-design
    retry:
      max_attempts: 2
      backoff: linear
    on_success: motion
    on_failure: error-handler
    depends_on: visual
    outputs:
      - ui-copy.md
      - content-guide.md
    gate: copy_approved
  - id: motion
    agent: pdg-motion-designer
    task: pdg-orchestrate-design
    retry:
      max_attempts: 2
      backoff: linear
    on_success: implementation
    on_failure: error-handler
    depends_on: visual
    outputs:
      - animation-spec.md
      - prototype.fig
    gate: motion_approved
  - id: implementation
    agent: pdg-frontend-designer
    task: pdg-orchestrate-design
    retry:
      max_attempts: 2
      backoff: linear
    on_success: audit
    on_failure: error-handler
    depends_on:
      - copy
      - motion
    outputs:
      - components/
      - pages/
      - design-tokens.css
    gate: implementation_complete
  - id: audit
    agent: pdg-auditor
    task: pdg-orchestrate-design
    retry:
      max_attempts: 2
      backoff: linear
    on_success: complete
    on_failure: error-handler
    depends_on: implementation
    outputs:
      - audit-report.md
    gate: audit_passed
error_handler:
  actions:
    - action: log
      message: Workflow failed at {step_id}
    - action: notify
      channel: pedro-design-alerts
      recipient: pdg-chief
pre_conditions:
  - All required agents available and activated
  - Design brief approved by pdg-chief
  - Budget and timeline validated
post_conditions:
  - All design assets delivered
  - Quality gates passed
  - Client or stakeholder sign-off received
