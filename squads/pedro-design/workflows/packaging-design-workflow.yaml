name: packaging-design-workflow
description: "Workflow de design de embalagem completa — estrutural, gráfico e produção"
version: "1.0"
squad: pedro-design

trigger:
  command: "*design-packaging"
  event: packaging-brief-received

steps:
  - id: brief
    agent: pdg-packaging-designer
    action: "Analisar brief de embalagem — produto, categoria, audiencia, canais"
    outputs:
      - packaging-requirements
      - shelf-context-analysis

  - id: shelf-audit
    agent: pdg-packaging-designer
    depends_on: brief
    action: "Auditar gôndola competitiva — identificar padroes e oportunidades"
    outputs:
      - competitive-shelf-map
      - differentiation-opportunities

  - id: structural-design
    agent: pdg-packaging-designer
    depends_on: [brief, shelf-audit]
    action: "Definir formato estrutural — tipo, material, dimensões, funcionalidade"
    outputs:
      - structural-concept
      - dieline
      - material-spec

  - id: graphic-design
    agent: pdg-packaging-designer
    depends_on: structural-design
    action: "Design gráfico da embalagem — front, back, laterais, regulatory"
    outputs:
      - front-of-pack-design
      - back-of-pack-design
      - regulatory-compliance

  - id: 3d-mockup
    agent: pdg-mockup-3d-artist
    depends_on: graphic-design
    action: "Gerar renders 3D fotorrealistas em múltiplos ângulos"
    outputs:
      - hero-render
      - shelf-context-render
      - hand-scale-render
      - open-experience-render

  - id: print-spec
    agent: pdg-packaging-designer
    depends_on: [graphic-design, 3d-mockup]
    action: "Especificação de impressão — processo, cores, acabamentos"
    outputs:
      - print-specification
      - color-specs
      - finishing-specs

  - id: regulatory-check
    agent: pdg-packaging-designer
    depends_on: graphic-design
    action: "Verificar conformidade regulatoria por categoria"
    outputs:
      - regulatory-compliance-report

  - id: production-handoff
    agent: pdg-packaging-designer
    depends_on: [print-spec, regulatory-check]
    action: "Handoff para produção — files, specs, contato grafico"
    outputs:
      - production-ready-files
      - printer-brief
      - proof-review-schedule

success_criteria:
  - "Brief analisado com requisitos documentados"
  - "Auditoria de gôndola com minimum 5 competidores"
  - "Design estrutural com dieline preciso"
  - "Design gráfico completo (front, back, laterais)"
  - "Minimum 4 renders 3D em ângulos diferentes"
  - "Especificação de impressão completa"
  - "Conformidade regulatoria verificada"
  - "Files production-ready entregues"
