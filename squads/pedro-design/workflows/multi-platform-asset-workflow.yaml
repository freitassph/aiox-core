name: multi-platform-asset-workflow
description: "Workflow de produção de assets multi-plataforma — do master ao delivery"
version: "1.0"
squad: pedro-design

trigger:
  command: "*multi-platform-assets"
  event: multi-platform-request

steps:
  - id: master-design
    agent: pdg-visual-designer
    action: "Criar design master — highest resolution, all elements, source file"
    outputs:
      - master-design-file
      - design-specs

  - id: platform-specs
    agent: pdg-visual-designer
    depends_on: master-design
    action: "Mapear specs de cada plataforma — sizes, formats, constraints"
    outputs:
      - platform-matrix
      - size-requirements
      - format-specs

  - id: resize-adapt
    agent: pdg-visual-designer
    depends_on: [master-design, platform-specs]
    action: "Adaptar design para cada plataforma — resize, reflow, reposition"
    outputs:
      - instagram-1080x1080
      - instagram-stories-1080x1920
      - facebook-1200x628
      - linkedin-1200x627
      - twitter-1600x900
      - youtube-thumbnail-1280x720
      - email-header-600x200

  - id: quality-check-each-platform
    agent: pdg-visual-designer
    depends_on: resize-adapt
    action: "Verificar qualidade em cada plataforma — legibilidade, cropping, safe zones"
    outputs:
      - quality-checklist
      - platform-specific-issues
      - fixes-applied

  - id: export-all
    agent: pdg-visual-designer
    depends_on: quality-check-each-platform
    action: "Exportar todos os assets — formats, resolutions, color spaces"
    outputs:
      - png-assets
      - svg-assets
      - webp-assets
      - pdf-assets

  - id: delivery
    agent: pdg-visual-designer
    depends_on: export-all
    action: "Entregar assets organizados — folder structure, naming convention, manifest"
    outputs:
      - asset-delivery-folder
      - asset-manifest
      - usage-guide

success_criteria:
  - "Master design em alta resolução com source file"
  - "Platform matrix com minimum 5 plataformas"
  - "Assets adaptados para cada plataforma e size"
  - "Quality check passed em todos os assets"
  - "Zero legibility issues em qualquer plataforma"
  - "Assets exportados em formatos requeridos"
  - "Delivery organizado com manifest e usage guide"
