name: Brand Identity Workflow
description: Fluxo completo de criação de identidade visual — do discovery ao brandbook
version: 1.0.0
gates:
  discovery_complete:
    criteria:
      - Brand discovery questions respondidas
      - Competidores analisados
      - Audiência definida
  strategy_approved:
    criteria:
      - Purpose, Vision, Mission definidos
      - Brand personality com 5 adjetivos
      - Posicionamento diferenciado
  direction_chosen:
    criteria:
      - 3 moodboards distintos criados
      - Direção escolhida pelo usuário
  logo_approved:
    criteria:
      - Funciona em 16px e 400px
      - Funciona em P&B
      - Funciona em fundos claro e escuro
      - Diferente dos competidores
      - Usuário aprovou
  system_approved:
    criteria:
      - Sistema de cor completo (HEX, RGB, CMYK)
      - Tipografia com escala completa
      - Tokens definidos
  applications_complete:
    criteria:
      - Mínimo 10 aplicações diferentes
      - Todas consistentes com o sistema
  brandbook_complete:
    criteria:
      - Todos os 8 capítulos do brandbook presentes
      - Exemplos corretos x incorretos documentados
      - Versao PDF exportada
error_handler:
  id: error-handler
  name: Error Handler
  actions:
    - action: log
      message: "Workflow failed at {step_id}: {error}"
    - action: notify
      channel: design-creator-log
steps:
  - id: discovery
    agent: pdg-brand-identity
    task: pdg-brand-discovery.md
    retry:
      max_attempts: 2
      backoff: linear
    on_success: strategy
    on_failure: error-handler
    outputs:
      - brand-discovery.md
      - competitor-analysis.md
    gate: discovery_complete
  - id: strategy
    agent: pdg-brand-identity
    task: pdg-brand-strategy.md
    retry:
      max_attempts: 2
      backoff: linear
    on_success: visual_direction
    on_failure: error-handler
    depends_on: discovery
    outputs:
      - brand-platform.md
      - brand-personality.md
    gate: strategy_approved
  - id: visual_direction
    agent: pdg-visual-designer
    task: pdg-visual-direction.md
    retry:
      max_attempts: 2
      backoff: linear
    on_success: logo_design
    on_failure: error-handler
    depends_on: strategy
    outputs:
      - moodboard-a.fig
      - moodboard-b.fig
      - moodboard-c.fig
    gate: direction_chosen
  - id: logo_design
    agent: pdg-brand-identity
    task: pdg-logo-design.md
    retry:
      max_attempts: 2
      backoff: linear
    on_success: identity_system
    on_failure: error-handler
    depends_on: visual_direction
    outputs:
      - logo-concepts.fig
      - logo-final.fig
      - logo-files/
    gate: logo_approved
  - id: identity_system
    agent: pdg-visual-designer
    task: pdg-visual-identity-system.md
    retry:
      max_attempts: 2
      backoff: linear
    on_success: ai_imagery
    on_failure: error-handler
    depends_on: logo_design
    outputs:
      - color-system.fig
      - typography-system.fig
      - iconography.fig
    gate: system_approved
  - id: ai_imagery
    agent: pdg-ai-image-director
    task: pdg-generate-ai-image.md
    retry:
      max_attempts: 2
      backoff: linear
    on_success: voice
    on_failure: error-handler
    depends_on: visual_direction
    outputs:
      - brand-imagery/
      - prompt-archive.md
    gate: imagery_approved
  - id: voice
    agent: pdg-ux-writer
    task: pdg-brand-voice.md
    retry:
      max_attempts: 2
      backoff: linear
    on_success: applications
    on_failure: error-handler
    depends_on: strategy
    outputs:
      - brand-voice-guide.md
      - tagline-options.md
    gate: voice_approved
  - id: applications
    agent: pdg-brand-identity
    task: pdg-brand-applications.md
    retry:
      max_attempts: 2
      backoff: linear
    on_success: brandbook
    on_failure: error-handler
    depends_on:
      - identity_system
      - ai_imagery
      - voice
    outputs:
      - business-card.fig
      - social-profiles.fig
      - email-signature.fig
      - presentations-template.fig
    gate: applications_complete
  - id: brandbook
    agent: pdg-brand-identity
    task: pdg-create-brandbook.md
    retry:
      max_attempts: 2
      backoff: linear
    on_success: audit
    on_failure: error-handler
    depends_on: applications
    outputs:
      - brandbook.pdf
      - brandbook.fig
    gate: brandbook_complete
  - id: audit
    agent: pdg-auditor
    task: pdg-audit-design.md
    retry:
      max_attempts: 2
      backoff: linear
    on_success: complete
    on_failure: error-handler
    depends_on: brandbook
    outputs:
      - brand-audit-report.md
    gate: audit_passed
pre_conditions:
  - All required agents available and activated
  - Design brief approved by pdg-chief
  - Budget and timeline validated
post_conditions:
  - All design assets delivered
  - Quality gates passed
  - Client or stakeholder sign-off received
