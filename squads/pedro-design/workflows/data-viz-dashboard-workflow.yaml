name: data-viz-dashboard-workflow
description: Workflow de criação de dashboard de dados — do audit ao user testing
version: "1.0"
squad: pedro-design
trigger:
  command: "*data-viz-dashboard"
  event: dashboard-request
steps:
  - id: data-audit
    agent: pdg-data-viz-specialist
    task: pdg-data-audit.md
    retry:
      max_attempts: 2
      backoff: linear
    action: Auditar dados disponíveis — fontes, qualidade, atualização, acessos
    outputs:
      - data-profile
      - data-quality-report
      - available-metrics
    on_success: kpi-definition
    on_failure: error-handler
  - id: kpi-definition
    agent: pdg-data-viz-specialist
    task: pdg-kpi-definition.md
    retry:
      max_attempts: 2
      backoff: linear
    depends_on: data-audit
    action: Definir KPIs com stakeholders — o que importa, por que, como medir
    outputs:
      - kpi-list
      - kpi-definitions
      - success-metrics
    on_success: chart-selection
    on_failure: error-handler
  - id: chart-selection
    agent: pdg-data-viz-specialist
    task: pdg-chart-selection.md
    retry:
      max_attempts: 2
      backoff: linear
    depends_on:
      - data-audit
      - kpi-definition
    action: Selecionar tipos de gráfico ideais para cada métrica
    outputs:
      - chart-map
      - visualization-specs
    on_success: wireframe
    on_failure: error-handler
  - id: wireframe
    agent: pdg-data-viz-specialist
    task: pdg-dashboard-wireframe.md
    retry:
      max_attempts: 2
      backoff: linear
    depends_on:
      - kpi-definition
      - chart-selection
    action: Criar wireframe de dashboard — layout, hierarchy, grouping
    parallel_with:
      - visual-system
    outputs:
      - dashboard-wireframe
      - layout-spec
    on_success: visual-design
    on_failure: error-handler
  - id: visual-design
    agent: pdg-data-viz-specialist
    task: pdg-dataviz-visual-design.md
    retry:
      max_attempts: 2
      backoff: linear
    depends_on: wireframe
    action: Aplicar design system — cores, tipografia, spacing, componentes
    parallel_with:
      - visual-system
    outputs:
      - visual-dashboard
      - color-palette-applied
    on_success: visual-system
    on_failure: error-handler
  - id: visual-system
    agent: pdg-design-system
    task: pdg-dataviz-style-guide.md
    retry:
      max_attempts: 2
      backoff: linear
    depends_on: chart-selection
    action: Definir sistema visual específico para data viz — paletas, tipografia
    outputs:
      - dataviz-style-guide
    on_success: accessibility-check
    on_failure: error-handler
  - id: accessibility-check
    agent: pdg-data-viz-specialist
    task: pdg-dataviz-accessibility.md
    retry:
      max_attempts: 2
      backoff: linear
    depends_on: visual-design
    action: Verificar acessibilidade — colorblind, contrast, screen reader
    outputs:
      - accessibility-report
      - remediation-list
    on_success: build
    on_failure: error-handler
  - id: build
    agent: pdg-data-viz-specialist
    task: pdg-dashboard-build.md
    retry:
      max_attempts: 2
      backoff: linear
    depends_on:
      - visual-design
      - accessibility-check
    action: Construir dashboard em ferramenta selecionada
    outputs:
      - live-dashboard
      - data-connections
    on_success: user-testing
    on_failure: error-handler
  - id: user-testing
    agent: pdg-ux-designer
    task: pdg-dashboard-user-testing.md
    retry:
      max_attempts: 2
      backoff: linear
    depends_on: build
    action: Testar com usuários — comprehension, speed, satisfaction
    outputs:
      - test-results
      - improvement-list
      - dashboard-approved
    on_success: complete
    on_failure: error-handler
success_criteria:
  - Data audit com fontes e qualidade documentadas
  - KPIs definidos com stakeholders e documentados
  - Chart selection justificada por tipo de dado
  - Wireframe de dashboard com layout aprovado
  - Visual design aplicado com sistema consistente
  - Accessibility check passed (WCAG AA minimo)
  - Dashboard funcional com dados reais
  - User testing com minimum 5 usuários, 80% comprehension
error_handler:
  id: error-handler
  name: Error Handler
  actions:
    - action: log
      message: "Workflow failed at {step_id}: {error}"
    - action: notify
      channel: design-creator-log
pre_conditions:
  - All required agents available and activated
  - Design brief approved by pdg-chief
  - Budget and timeline validated
post_conditions:
  - All design assets delivered
  - Quality gates passed
  - Client or stakeholder sign-off received
