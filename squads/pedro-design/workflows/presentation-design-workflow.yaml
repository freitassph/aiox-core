# Presentation Design Workflow
# Criação de apresentações profissionais de alto impacto

name: presentation-design
version: 1.0.0
description: "Workflow de design de apresentações — pitch deck, corporate deck, sales deck, keynote"
squad: pedro-design

metadata:
  created: 2026-03-25
  author: pdg-slide-designer (Stage)
  tags:
    - presentation
    - pitch-deck
    - slides
    - pedro-design

triggers:
  - type: manual
    command: "*create-presentation"

inputs:
  - name: deck_type
    type: string
    required: true
    description: "pitch-deck | corporate | sales | report | training | keynote"
  - name: company
    type: string
    required: true
  - name: content
    type: string
    required: true
  - name: audience
    type: string
    required: false
    default: "general"
  - name: slides_target
    type: integer
    required: false
    default: 12

steps:
  - id: story-outline
    name: "Story Outline"
    description: "Criar o arco narrativo antes de qualquer slide"
    agent: pdg-slide-designer
    action: task
    inputs:
      deck_type: "{{inputs.deck_type}}"
      content: "{{inputs.content}}"

  - id: visual-assets
    name: "Visual Assets Preparation"
    description: "Preparar visuais, ícones, fotos necessários"
    agent: pdg-illustration-artist
    action: task
    depends_on:
      - story-outline
    on_error: continue

  - id: photo-direction
    name: "Photography Direction"
    agent: pdg-photo-director
    action: conditional
    depends_on:
      - story-outline
    on_error: continue

  - id: deck-production
    name: "Deck Production"
    agent: pdg-slide-designer
    action: task
    task: pdg-create-pitch-deck.md
    depends_on:
      - story-outline
      - visual-assets
      - photo-direction
    inputs:
      deck_type: "{{inputs.deck_type}}"
      company_name: "{{inputs.company}}"
      content_brief: "{{inputs.content}}"
      audience: "{{inputs.audience}}"
      slides_target: "{{inputs.slides_target}}"

  - id: quality-review
    name: "Quality Review"
    agent: pdg-auditor
    depends_on:
      - deck-production
    on_error: continue

outputs:
  - name: deck_pdf
    from: "{{steps.deck-production.output.deck_pdf}}"
  - name: deck_pptx
    from: "{{steps.deck-production.output.deck_pptx}}"

completion:
  on_success:
    message: "Apresentação '{{inputs.company}}' entregue — {{inputs.slides_target}} slides de alto impacto."
  on_failure:
    message: "Falha na produção da apresentação."
