name: AI Content Workflow
description: Fluxo de produção de conteúdo visual com IA — imagens, social media, campanhas
version: 1.0.0
gates:
  brief_complete:
    criteria:
      - Objetivo da campanha definido
      - Plataformas-alvo especificadas
      - Tom e paleta definidos
      - Formatos necessários listados
  images_selected:
    criteria:
      - Mínimo 3-5 imagens aprovadas
      - Prompts arquivados
      - Upscale realizado nas selecionadas
  photos_approved:
    criteria:
      - Color grading consistente aplicado
      - Imagens em resolução adequada para uso
  social_approved:
    criteria:
      - Dimensões corretas por plataforma
      - Hierarquia visual clara
      - Legibilidade em mobile verificada
      - Consistência de brand
  copy_approved:
    criteria:
      - Legendas com hook + valor + CTA
      - Hashtags estratégicas incluídas
      - Tom alinhado com brand voice
  audit_passed:
    criteria:
      - Todas as dimensões corretas
      - Textos legíveis em mobile (390px preview)
      - Identidade visual consistente
      - Nenhum elemento de copyright problemático
error_handler:
  id: error-handler
  name: Error Handler
  actions:
    - action: log
      message: "Workflow failed at {step_id}: {error}"
    - action: notify
      channel: design-creator-log
steps:
  - id: brief
    agent: pdg-chief
    task: pdg-creative-brief.md
    retry:
      max_attempts: 2
      backoff: linear
    on_success: ai_generation
    on_failure: error-handler
    outputs:
      - creative-brief.md
      - reference-board/
    gate: brief_complete
  - id: ai_generation
    agent: pdg-ai-image-director
    task: pdg-generate-ai-image.md
    retry:
      max_attempts: 2
      backoff: linear
    on_success: photo_direction
    on_failure: error-handler
    depends_on: brief
    outputs:
      - generated-images/
      - prompt-archive.md
    gate: images_selected
  - id: photo_direction
    agent: pdg-photo-director
    task: pdg-photo-direction.md
    retry:
      max_attempts: 2
      backoff: linear
    on_success: social_design
    on_failure: error-handler
    depends_on: brief
    outputs:
      - color-graded-images/
      - shot-notes.md
    gate: photos_approved
  - id: social_design
    agent: pdg-social-media
    task: pdg-create-social-media.md
    retry:
      max_attempts: 2
      backoff: linear
    on_success: copy
    on_failure: error-handler
    depends_on:
      - ai_generation
      - photo_direction
    outputs:
      - instagram-posts/
      - stories/
      - linkedin-posts/
      - youtube-thumbnails/
    gate: social_approved
  - id: copy
    agent: pdg-ux-writer
    task: pdg-write-copy.md
    retry:
      max_attempts: 2
      backoff: linear
    on_success: audit
    on_failure: error-handler
    depends_on: social_design
    outputs:
      - captions.md
      - hashtags.md
      - cta-variants.md
    gate: copy_approved
  - id: audit
    agent: pdg-auditor
    task: pdg-audit-design.md
    retry:
      max_attempts: 2
      backoff: linear
    on_success: complete
    on_failure: error-handler
    depends_on:
      - social_design
      - copy
    outputs:
      - content-audit.md
    gate: audit_passed
pre_conditions:
  - All required agents available and activated
  - Design brief approved by pdg-chief
  - Budget and timeline validated
post_conditions:
  - All design assets delivered
  - Quality gates passed
  - Client or stakeholder sign-off received
