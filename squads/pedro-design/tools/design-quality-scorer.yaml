# design-quality-scorer.yaml
# Tool: Visual Quality Scorer for design artifacts
# Usage: Evaluate visual quality of any design output across multiple dimensions

tool:
  id: design-quality-scorer
  name: "Design Quality Scorer"
  version: 1.0.0
  description: >
    Comprehensive visual quality scoring tool that evaluates design artifacts
    across 8 dimensions: hierarchy, consistency, typography, color, spacing,
    accessibility, polish, and brand alignment. Returns a score from 0-100
    with detailed breakdown per dimension.

  inputs:
    - name: design_artifact
      type: string
      required: true
      description: "Path or description of the design artifact to evaluate"
    - name: artifact_type
      type: string
      required: false
      default: "interface"
      enum: ["interface", "brand-identity", "print", "presentation", "social-media", "packaging", "illustration", "motion"]
      description: "Type of design artifact for context-aware scoring"
    - name: brand_context
      type: string
      required: false
      description: "Brand guidelines or context for brand alignment scoring"
    - name: target_audience
      type: string
      required: false
      description: "Target audience for accessibility and appropriateness scoring"
    - name: strict_mode
      type: boolean
      required: false
      default: true
      description: "Enable strict Tier S+++++ scoring (harsher thresholds)"

  outputs:
    - name: quality_report
      type: object
      schema:
        overall_score: number
        grade: string
        dimensions: object
        critical_issues: array<string>
        recommendations: array<string>
        pass_fail: boolean

  scoring_dimensions:
    visual_hierarchy:
      weight: 0.20
      criteria:
        - "Clear focal point established within 3 seconds"
        - "Information flow follows natural reading pattern"
        - "Size/weight/color communicate importance correctly"
        - "No competing elements fighting for attention"
      thresholds:
        excellent: "Hierarchy is intuitive and guides eye effortlessly"
        good: "Minor hierarchy issues that do not impact comprehension"
        poor: "Multiple competing focal points, unclear priority"

    consistency:
      weight: 0.15
      criteria:
        - "Spacing follows established scale (4px/8px grid)"
        - "Colors from defined palette only"
        - "Typography uses approved type scale"
        - "Component patterns are repeatable"
      thresholds:
        excellent: "Zero inconsistencies detectable"
        good: "1-2 minor inconsistencies that do not break system"
        poor: "Multiple spacing, color, or type deviations"

    typography:
      weight: 0.15
      criteria:
        - "Font choices appropriate for context and brand"
        - "Type scale is mathematical and consistent"
        - "Line length optimal (45-75 characters)"
        - "Kerning/tracking professional quality"
        - "Contrast ratios meet WCAG requirements"
      thresholds:
        excellent: "Typography system is elegant and functional"
        good: "Minor typographic issues that do not impact readability"
        poor: "Font conflicts, poor sizing, or readability issues"

    color_usage:
      weight: 0.10
      criteria:
        - "Color palette is cohesive and limited"
        - "Color communicates hierarchy and status"
        - "Sufficient contrast for all text/background pairs"
        - "Colorblind-safe combinations"
      thresholds:
        excellent: "Color system is sophisticated and accessible"
        good: "Minor color issues that do not impact usability"
        poor: "Poor contrast, too many colors, or inaccessible combinations"

    spacing_and_layout:
      weight: 0.10
      criteria:
        - "Consistent spacing scale applied"
        - "Layout respects grid and alignment"
        - "White space used intentionally"
        - "No accidental alignments or gaps"
      thresholds:
        excellent: "Spacing is rhythmic and intentional throughout"
        good: "Minor spacing inconsistencies"
        poor: "Arbitrary spacing, misaligned elements, cramped or loose"

    accessibility:
      weight: 0.15
      criteria:
        - "WCAG 2.1 AA contrast ratios met (4.5:1 text, 3:1 UI)"
        - "Touch targets minimum 44x44px"
        - "Focus states visible and clear"
        - "Reduced motion support"
        - "Semantic structure present"
      thresholds:
        excellent: "Full WCAG 2.1 AA compliance with AAA where feasible"
        good: "Minor accessibility issues that do not block compliance"
        poor: "Multiple accessibility violations"

    polish_and_finish:
      weight: 0.10
      criteria:
        - "Pixel-perfect alignment and spacing"
        - "All states designed (hover, active, focus, disabled, error, loading, empty)"
        - "Edge cases handled (long text, missing data, overflow)"
        - "No placeholder or temporary elements"
      thresholds:
        excellent: "Production-ready with zero visible rough edges"
        good: "Minor polish items that do not impact user experience"
        poor: "Multiple unfinished states or rough edges"

    brand_alignment:
      weight: 0.05
      criteria:
        - "Design reflects brand personality and values"
        - "Brand colors and typography used correctly"
        - "Tone matches brand voice guidelines"
        - "Differentiation from competitors maintained"
      thresholds:
        excellent: "Perfectly embodies brand identity"
        good: "Minor brand deviations that do not dilute identity"
        poor: "Design conflicts with or ignores brand guidelines"

  grading_scale:
    S_plus_plus: "95-100 — Legendary quality, indistinguishable from top agencies"
    S_plus: "88-94 — Exceptional quality, minor improvements possible"
    A: "80-87 — Strong quality, some refinements recommended"
    B: "70-79 — Good quality, several improvements needed"
    C: "60-69 — Acceptable, significant improvements required"
    D: "50-59 — Below standard, major rework needed"
    F: "0-49 — Unacceptable, complete redesign required"

  execution:
    steps:
      - step: analyze_artifact
        action: "Parse and analyze the design artifact"
      - step: score_dimensions
        action: "Score each of the 8 dimensions independently"
      - step: calculate_weighted_score
        action: "Apply weights and calculate overall score"
      - step: identify_issues
        action: "Flag critical and warning issues"
      - step: generate_recommendations
        action: "Provide actionable improvement suggestions"
      - step: output_report
        action: "Generate comprehensive quality report"

  error_handling:
    ARTIFACT_NOT_FOUND: "Design artifact path does not exist"
    ARTIFACT_NOT_PARSEABLE: "Unable to parse design artifact format"
    INSUFFICIENT_CONTEXT: "Not enough context to evaluate (provide more details)"
    BRAND_CONTEXT_MISSING: "Brand context required for brand_alignment dimension"

  tags:
    - quality-scoring
    - visual-audit
    - design-evaluation
    - tier-s-plus-plus-plus-plus-plus
    - automated-review
    - dimension-scoring
    - wcag-compliance
