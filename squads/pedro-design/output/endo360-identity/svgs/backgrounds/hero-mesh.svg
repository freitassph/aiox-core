<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <!-- Background Base: Obsidian Midnight -->
  <rect width="1920" height="1080" fill="#0A0A0C" />

  <defs>
    <!-- Ambient Gold Glow (Left/Top) -->
    <radialGradient id="aurumGlow" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.08" />
      <stop offset="50%" stop-color="#D4AF37" stop-opacity="0.02" />
      <stop offset="100%" stop-color="#0A0A0C" stop-opacity="0" />
    </radialGradient>
    
    <!-- Ambient Silver Glow (Bottom/Right) -->
    <radialGradient id="platinumGlow" cx="80%" cy="80%" r="70%">
      <stop offset="0%" stop-color="#F8FAFC" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <!-- Deep Space Abysm (Center depth) -->
    <radialGradient id="abysm" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#050505" stop-opacity="0" />
      <stop offset="100%" stop-color="#030304" stop-opacity="0.4" />
    </radialGradient>
  </defs>

  <!-- Mesh Gradients Layers -->
  <rect width="1920" height="1080" fill="url(#aurumGlow)" />
  <rect width="1920" height="1080" fill="url(#platinumGlow)" />
  <rect width="1920" height="1080" fill="url(#abysm)" />

  <!-- The 360 Grid Protocol (Corporate/Clinical Precision) -->
  <g stroke="#ffffff" stroke-opacity="0.015" stroke-width="1">
    <line x1="0" y1="270" x2="1920" y2="270" />
    <line x1="0" y1="540" x2="1920" y2="540" />
    <line x1="0" y1="810" x2="1920" y2="810" />
    <line x1="480" y1="0" x2="480" y2="1080" />
    <line x1="960" y1="0" x2="960" y2="1080" />
    <line x1="1440" y1="0" x2="1440" y2="1080" />
  </g>

  <!-- Fine geometric circles subtle motif (The Infinity Loop) -->
  <circle cx="1500" cy="540" r="400" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.05" />
  <circle cx="1500" cy="540" r="500" fill="none" stroke="#F8FAFC" stroke-width="0.5" stroke-opacity="0.02" />
  
  <!-- Subtle typography watermark for scale -->
  <text x="50" y="1030" font-family="'Inter', sans-serif" font-weight="400" font-size="12" fill="#64748B" letter-spacing="0.5em" opacity="0.4" text-transform="uppercase">
    Endodontics Institute / V2.0 / The Apex Infinity
  </text>
</svg>
