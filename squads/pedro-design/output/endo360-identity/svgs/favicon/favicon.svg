<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <!-- Transparent background for Favicon / App Icon use -->

  <defs>
    <!-- Solid Gold for Small Scale Readability -->
    <linearGradient id="solidGoldFav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2D184" />
      <stop offset="100%" stop-color="#D4AF37" />
    </linearGradient>
  </defs>

  <!-- Scaled Infinity Root for 128x128 bounding box -->
  <!-- Centered and optimized for small pixels -->
  <g transform="translate(64, 60) scale(0.6)">
    <!-- Right Root Cut -->
    <path d="M 0 -60 C 50 -60, 80 -30, 80 10 C 80 80, 40 120, 20 160 C 15 170, 0 170, 0 150 C 0 80, 30 60, 30 10 C 30 -20, 15 -40, 0 -40" 
          fill="none" stroke="url(#solidGoldFav)" stroke-width="8" stroke-linecap="round" />
    <!-- Left Root Cut -->
    <path d="M 0 -60 C -50 -60, -80 -30, -80 10 C -80 80, -40 120, -20 160 C -25 170, -40 170, -40 150 C -40 80, -70 60, -70 10 C -70 -20, -55 -40, -40 -40" 
          fill="none" stroke="#F8FAFC" stroke-width="8" stroke-linecap="round" />
    
    <!-- Bold Center Apex Pin -->
    <circle cx="0" cy="65" r="9" fill="url(#solidGoldFav)" />
  </g>
</svg>
