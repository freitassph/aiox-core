<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="100%" height="100%">
  <!-- Background: Deep Obsidian -->
  <rect width="1080" height="1080" fill="#0A0A0C" />

  <!-- Frame Gold/Silver Border (Very fine, inside padding) -->
  <rect x="40" y="40" width="1000" height="1000" fill="none" stroke="#D4AF37" stroke-opacity="0.2" stroke-width="1" />
  
  <defs>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2D184" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#8C7326" />
    </linearGradient>
  </defs>

  <!-- Typography Grid Setup -->
  
  <!-- Topic/Eyebrow Text -->
  <text x="80" y="240" font-family="'Inter', sans-serif" font-weight="600" font-size="24" fill="#64748B" letter-spacing="0.3em" text-transform="uppercase">
    Clinical Case 017
  </text>
  
  <line x1="80" y1="280" x2="160" y2="280" stroke="#D4AF37" stroke-width="2" />

  <!-- Headline High Impact -->
  <text x="80" y="400" font-family="'Outfit', 'Helvetica Neue', sans-serif" font-weight="800" font-size="76" fill="#F8FAFC" letter-spacing="-0.02em">
    <tspan x="80" dy="0">THE ABSOLUTE</tspan>
    <tspan x="80" dy="85">MASTERY OF THE</tspan>
    <tspan x="80" dy="85" fill="url(#goldText)">APEX ZONE</tspan>
  </text>

  <!-- Body copy abstract -->
  <text x="80" y="660" font-family="'Inter', sans-serif" font-weight="300" font-size="32" fill="#94A3B8" letter-spacing="0.01em">
    <tspan x="80" dy="0">Exploring millimeter-perfect</tspan>
    <tspan x="80" dy="48">endodontic navigation inside</tspan>
    <tspan x="80" dy="48">complex anatomies.</tspan>
  </text>

  <!-- Subtle Logo mark bottom right -->
  <!-- Scaled Infinity Root for 128x128 bounding box, translated to bottom right -->
  <!-- We simply draw the SVG logo as a stamp -->
  <g transform="translate(940, 960) scale(0.3)">
    <!-- Right Root -->
    <path d="M 0 -60 C 50 -60, 80 -30, 80 10 C 80 80, 40 120, 20 160 C 15 170, 0 170, 0 150 C 0 80, 30 60, 30 10 C 30 -20, 15 -40, 0 -40" 
          fill="none" stroke="url(#goldText)" stroke-width="6" stroke-linecap="round" />
    <!-- Left Root -->
    <path d="M 0 -60 C -50 -60, -80 -30, -80 10 C -80 80, -40 120, -20 160 C -25 170, -40 170, -40 150 C -40 80, -70 60, -70 10 C -70 -20, -55 -40, -40 -40" 
          fill="none" stroke="#F8FAFC" stroke-width="6" stroke-linecap="round" />
    <circle cx="0" cy="65" r="5" fill="url(#goldText)" />
  </g>
  
  <text x="910" y="990" font-family="'Inter', sans-serif" font-weight="400" font-size="16" fill="#64748B" text-anchor="end" letter-spacing="0.4em" text-transform="uppercase">
    ENDO360 Institute
  </text>
  
  <!-- Subtle Grid crosshairs -->
  <path d="M 70 40 L 90 40 M 80 30 L 80 50" stroke="#F8FAFC" stroke-opacity="0.3" stroke-width="1" />
  <path d="M 990 40 L 1010 40 M 1000 30 L 1000 50" stroke="#F8FAFC" stroke-opacity="0.3" stroke-width="1" />
</svg>
