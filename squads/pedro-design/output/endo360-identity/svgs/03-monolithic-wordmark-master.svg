<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <!-- Background: Stealth Charcoal -->
  <rect width="800" height="800" fill="#111827" />

  <defs>
    <!-- Crisp White to subtle silver -->
    <linearGradient id="solidWhite" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </linearGradient>

    <!-- Deep Ruby / Rose Gold for clinical luxury -->
    <linearGradient id="roseGold" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B91C1C" />
      <stop offset="100%" stop-color="#EF4444" />
    </linearGradient>

    <!-- Drop Shadow for monolith presence -->
    <filter id="monolithShadow">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Central Emblem block -->
  <!-- A perfectly balanced square with negative space carving -->
  <g transform="translate(400, 320)" filter="url(#monolithShadow)">
    <rect x="-80" y="-80" width="160" height="160" rx="30" fill="url(#solidWhite)" />
    
    <!-- The Root Canal Negative Space Cut -->
    <path d="M 0 -80 V 0" stroke="#111827" stroke-width="12" stroke-linecap="round" />
    <path d="M 0 0 C 30 50, 40 80, -20 120" stroke="#111827" stroke-width="12" stroke-linecap="round" fill="none" />
    <path d="M 0 0 C -30 50, -40 80, 20 120" stroke="#111827" stroke-width="12" stroke-linecap="round" fill="none" />
    
    <!-- Fine surgical indicator -->
    <circle cx="0" cy="10" r="4" fill="url(#roseGold)" />
  </g>

  <!-- Typography: Pure Authority Wordmark -->
  <text x="400" y="600" font-family="'Outfit', 'Helvetica Neue', sans-serif" font-weight="800" font-size="64" fill="url(#solidWhite)" text-anchor="middle" letter-spacing="0.15em">
    ENDO<tspan fill="#EF4444" font-weight="900">360</tspan>
  </text>
  
  <text x="400" y="640" font-family="'Inter', sans-serif" font-weight="400" font-size="14" fill="#9CA3AF" text-anchor="middle" letter-spacing="0.4em" text-transform="uppercase">
    Institute of Endodontics
  </text>
</svg>
