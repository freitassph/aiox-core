<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <!-- Background: Deep Tech/Clinical Azure -->
  <rect width="800" height="800" fill="#050814" />

  <defs>
    <!-- Clinical Cyan to Deep Blue Gradient -->
    <linearGradient id="cyberAzure" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0284C7" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>

    <linearGradient id="silverChrome" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>

    <filter id="neonSubtle">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dynamic 360 Arch (Incomplete ring indicating continuous motion) -->
  <path d="M 400 130 A 230 230 0 1 1 200 240" fill="none" stroke="url(#cyberAzure)" stroke-width="1.5" stroke-linecap="round" opacity="0.6" />
  <path d="M 400 110 A 250 250 0 0 0 150 360" fill="none" stroke="url(#silverChrome)" stroke-width="1" stroke-linecap="round" opacity="0.3" />

  <!-- Abstract Root/Apex (The Continuous Force) -->
  <g transform="translate(400, 350) scale(1.3)">
    <!-- Main swooping root shape encapsulating the canal -->
    <path d="M 0 -70 C 40 -70, 60 -40, 60 10 C 60 60, 25 100, 5 140 C 0 150, -20 150, -20 130 C -20 80, 15 50, 15 0 C 15 -30, -10 -50, -30 -50 C -50 -50, -60 -30, -60 10 C -60 50, -40 80, -30 110" 
          fill="none" stroke="url(#silverChrome)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Precision file striking the center -->
    <path d="M -5 -90 L 5 40 L 0 50 Z" fill="url(#cyberAzure)" filter="url(#neonSubtle)" />
  </g>

  <!-- Typography: Advanced Geometric -->
  <text x="400" y="650" font-family="'Outfit', 'Helvetica Neue', sans-serif" font-weight="700" font-size="56" fill="#F8FAFC" text-anchor="middle" letter-spacing="0.1em">
    ENDO<tspan fill="url(#cyberAzure)">360</tspan>
  </text>
  
  <text x="400" y="690" font-family="'Inter', sans-serif" font-weight="500" font-size="11" fill="#475569" text-anchor="middle" letter-spacing="0.8em" text-transform="uppercase">
    Advanced Clinical Mastery
  </text>
</svg>
