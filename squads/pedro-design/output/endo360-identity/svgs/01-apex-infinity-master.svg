<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <!-- Background: Deep Obsidian Midnight -->
  <rect width="800" height="800" fill="#0A0A0C" />

  <defs>
    <!-- Premium Gold Gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2D184" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#8C7326" />
    </linearGradient>

    <linearGradient id="subtleGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#0A0A0C" stop-opacity="0" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Halo -->
  <circle cx="400" cy="360" r="180" fill="url(#subtleGlow)" />

  <!-- Outer 360 Ring - Precision Marks (Minimalist) -->
  <g stroke="#ffffff" stroke-opacity="0.15" stroke-width="1.5" stroke-linecap="round">
    <!-- N, E, S, W -->
    <line x1="400" y1="120" x2="400" y2="140" stroke-opacity="0.4" stroke="url(#gold)" />
    <line x1="400" y1="580" x2="400" y2="600" />
    <line x1="160" y1="360" x2="180" y2="360" />
    <line x1="620" y1="360" x2="640" y2="360" />
  </g>

  <!-- The Apex Infinity - Abstract Geometric Tooth / Infinity Root -->
  <g transform="translate(400, 360) scale(1.15)">
    <!-- Right Root Cut -->
    <path d="M 0 -60 C 50 -60, 80 -30, 80 10 C 80 80, 40 120, 20 160 C 15 170, 0 170, 0 150 C 0 80, 30 60, 30 10 C 30 -20, 15 -40, 0 -40" 
          fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round" />
    <!-- Left Root Cut -->
    <path d="M 0 -60 C -50 -60, -80 -30, -80 10 C -80 80, -40 120, -20 160 C -25 170, -40 170, -40 150 C -40 80, -70 60, -70 10 C -70 -20, -55 -40, -40 -40" 
          fill="none" stroke="#F8FAFC" stroke-width="2.5" stroke-linecap="round" />
    <!-- Center Apex Pin (File representation) -->
    <line x1="0" y1="-80" x2="0" y2="60" stroke="#F8FAFC" stroke-opacity="0.3" stroke-width="1" />
    <circle cx="0" cy="65" r="2.5" fill="url(#gold)" filter="url(#glow)" />
  </g>

  <!-- Monolithic Typography -->
  <text x="400" y="660" font-family="'Inter', 'Helvetica Neue', sans-serif" font-weight="300" font-size="52" fill="#F8FAFC" text-anchor="middle" letter-spacing="0.3em">
    <tspan fill="#F8FAFC">ENDO</tspan><tspan fill="url(#gold)" font-weight="600">360</tspan>
  </text>
  
  <text x="400" y="700" font-family="'Inter', 'Outfit', sans-serif" font-weight="400" font-size="12" fill="#64748B" text-anchor="middle" letter-spacing="0.6em" text-transform="uppercase">
    Urgências Endodônticas
  </text>
</svg>
