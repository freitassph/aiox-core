<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" width="100%" height="100%">
  <defs>
    <!-- Background: Ultimate Luxury Obsidian -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1A1B1E"/>
      <stop offset="60%" stop-color="#090A0C"/>
      <stop offset="100%" stop-color="#020202"/>
    </radialGradient>

    <!-- Exquisite Gold Gradients -->
    <linearGradient id="gold-polished" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF2CA"/>
      <stop offset="20%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#8a6327"/>
      <stop offset="80%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>

    <linearGradient id="platinum-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#D1D9E1"/>
      <stop offset="60%" stop-color="#A9B2BC"/>
      <stop offset="100%" stop-color="#7B858F"/>
    </linearGradient>

    <filter id="metal-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000" flood-opacity="0.9"/>
    </filter>

    <filter id="golden-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- THE LUXURY STAR SYMBOL (8 Points) -->
    <symbol id="luxury-star" viewBox="0 0 100 100">
      <g stroke-width="0">
        <polygon points="50,0 51.5,48.5 48.5,48.5" fill="url(#platinum-grad)"/>
        <polygon points="50,100 51.5,51.5 48.5,51.5" fill="url(#platinum-grad)"/>
        <polygon points="100,50 51.5,51.5 51.5,48.5" fill="url(#platinum-grad)"/>
        <polygon points="0,50 48.5,51.5 48.5,48.5" fill="url(#platinum-grad)"/>
        <polygon points="80,20 51.5,47 47,51.5" fill="url(#platinum-grad)" opacity="0.8"/>
        <polygon points="20,20 48.5,47 53,51.5" fill="url(#platinum-grad)" opacity="0.8"/>
        <polygon points="20,80 48.5,53 53,48.5" fill="url(#platinum-grad)" opacity="0.8"/>
        <polygon points="80,80 51.5,53 47,48.5" fill="url(#platinum-grad)" opacity="0.8"/>
        <circle cx="50" cy="50" r="3" fill="#FFFFFF"/>
      </g>
    </symbol>

    <clipPath id="right-half-clip">
      <path d="M 600,0 L 1200,0 L 1200,1200 L 600,1200 Z"/>
    </clipPath>
  </defs>

  <rect width="1600" height="500" fill="url(#bg-grad)"/>

  <!-- Ornate Luxury Filigree Divider linking left and right -->
  <line x1="100" y1="250" x2="1500" y2="250" stroke="url(#gold-polished)" stroke-width="0.5" opacity="0.15"/>
  <use href="#luxury-star" x="796" y="246" width="8" height="8" filter="url(#golden-glow)"/>

  <!-- LEFT: The Ultra-Luxury Crest Scaled Down -->
  <g transform="translate(60, 40) scale(0.35)">
    <circle cx="600" cy="600" r="480" fill="none" stroke="url(#gold-polished)" stroke-width="1.5" opacity="0.6"/>
    <circle cx="600" cy="600" r="472" fill="none" stroke="url(#gold-polished)" stroke-width="2.5" opacity="0.9"/>
    
    <g filter="url(#metal-shadow)">
      <text x="600" y="820" font-family="'Didot', 'Bodoni MT', 'Times New Roman', serif" font-size="640" font-weight="normal" text-anchor="middle" fill="url(#gold-polished)" opacity="0.7">G</text>
      <text x="600" y="820" font-family="'Didot', 'Bodoni MT', 'Times New Roman', serif" font-size="640" font-weight="normal" text-anchor="middle" fill="url(#gold-polished)">A</text>
      <text x="600" y="820" font-family="'Didot', 'Bodoni MT', 'Times New Roman', serif" font-size="640" font-weight="normal" text-anchor="middle" fill="url(#gold-polished)" clip-path="url(#right-half-clip)">G</text>

      <!-- 8-Point Star inside the A -->
      <use href="#luxury-star" x="580" y="590" width="40" height="40"/>
    </g>
  </g>

  <!-- RIGHT: Typographic Lockup -->
  <g transform="translate(560, 220)">
    <text x="0" y="30" font-family="'Didot', 'Bodoni MT', 'Times New Roman', serif" font-size="72" font-weight="400" fill="#EAE5DA" letter-spacing="18">ANDRÉ GOMIDE</text>
    <line x1="4" y1="65" x2="680" y2="65" stroke="url(#gold-polished)" stroke-width="0.5" opacity="0.5"/>
    <use href="#luxury-star" x="340" y="60" width="10" height="10"/>
    <text x="4" y="105" font-family="'Helvetica Neue', 'Arial', sans-serif" font-size="18" font-weight="300" fill="#D4AF37" letter-spacing="28">ODONTOLOGIA HIGH-END</text>
  </g>

</svg>
