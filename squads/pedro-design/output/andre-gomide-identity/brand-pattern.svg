<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <!-- Background: Ultimate Luxury Obsidian -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1A1B1E"/>
      <stop offset="60%" stop-color="#090A0C"/>
      <stop offset="100%" stop-color="#020202"/>
    </radialGradient>

    <!-- Exquisite Gold Gradients -->
    <linearGradient id="gold-wire" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF2CA" stop-opacity="0.2"/>
      <stop offset="30%" stop-color="#D4AF37" stop-opacity="0.08"/>
      <stop offset="70%" stop-color="#8a6327" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#3A280D" stop-opacity="0.01"/>
    </linearGradient>

    <linearGradient id="platinum" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#B0B6BE" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6F757D" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Luxury Guilloche Pattern -->
    <pattern id="guilloche-grid" width="400" height="400" patternUnits="userSpaceOnUse">
      <g stroke="url(#gold-wire)" stroke-width="0.3" fill="none">
        <circle cx="200" cy="200" r="180"/>
        <circle cx="200" cy="200" r="176"/>
        <circle cx="200" cy="200" r="172"/>
        <circle cx="0" cy="0" r="180"/><circle cx="400" cy="0" r="180"/><circle cx="0" cy="400" r="180"/><circle cx="400" cy="400" r="180"/>
      </g>
      
      <!-- 8-POINT LUXURY STAR NODES -->
      <g transform="translate(192, 192) scale(0.16)">
        <polygon points="50,0 52,48 48,48" fill="url(#platinum)"/>
        <polygon points="50,100 52,52 48,52" fill="url(#platinum)"/>
        <polygon points="100,50 52,52 52,48" fill="url(#platinum)"/>
        <polygon points="0,50 48,52 48,48" fill="url(#platinum)"/>
        <polygon points="80,20 52,45 45,52" fill="url(#platinum)" opacity="0.6"/>
        <polygon points="20,20 48,45 55,52" fill="url(#platinum)" opacity="0.6"/>
        <polygon points="20,80 48,55 55,48" fill="url(#platinum)" opacity="0.6"/>
        <polygon points="80,80 52,55 45,48" fill="url(#platinum)" opacity="0.6"/>
      </g>
    </pattern>

    <filter id="soft-spot">
      <feGaussianBlur stdDeviation="80" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg-grad)"/>
  <rect width="1920" height="1080" fill="url(#guilloche-grid)"/>

  <circle cx="960" cy="540" r="700" fill="#FFF2CA" opacity="0.02" filter="url(#soft-spot)"/>
  <rect x="60" y="60" width="1800" height="960" fill="none" stroke="url(#gold-wire)" stroke-width="1" opacity="0.3"/>
</svg>
