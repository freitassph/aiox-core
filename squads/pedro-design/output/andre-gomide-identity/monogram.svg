<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="100%" height="100%">
  <defs>
    <!-- Background: Ultimate Luxury Obsidian -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1A1B1E"/>
      <stop offset="60%" stop-color="#090A0C"/>
      <stop offset="100%" stop-color="#020202"/>
    </radialGradient>

    <!-- Exquisite Gold Gradients mimicking high-end foil stamping and polished metal -->
    <linearGradient id="gold-polished" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF2CA"/>
      <stop offset="20%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#8a6327"/>
      <stop offset="80%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>

    <linearGradient id="gold-dark" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8C678"/>
      <stop offset="40%" stop-color="#AA7C11"/>
      <stop offset="100%" stop-color="#3A280D"/>
    </linearGradient>

    <linearGradient id="platinum-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#D1D9E1"/>
      <stop offset="60%" stop-color="#A9B2BC"/>
      <stop offset="100%" stop-color="#7B858F"/>
    </linearGradient>

    <!-- Realistic 3D Drop Shadow for the Gold Emblems -->
    <filter id="metal-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000" flood-opacity="0.9"/>
    </filter>

    <!-- Brilliant Glow for the fine lines -->
    <filter id="golden-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- THE LUXURY STAR SYMBOL (8 Points) -->
    <symbol id="luxury-star" viewBox="0 0 100 100">
      <!-- Faceted Spikes (Long) -->
      <g stroke-width="0">
        <!-- Vertical Top -->
        <polygon points="50,0 52,48 48,48" fill="url(#platinum-grad)"/>
        <!-- Vertical Bottom -->
        <polygon points="50,100 52,52 48,52" fill="url(#platinum-grad)"/>
        <!-- Horizontal Right -->
        <polygon points="100,50 52,52 52,48" fill="url(#platinum-grad)"/>
        <!-- Horizontal Left -->
        <polygon points="0,50 48,52 48,48" fill="url(#platinum-grad)"/>
        
        <!-- Diagonal Spikes (Short) -->
        <polygon points="80,20 52,45 45,52" fill="url(#platinum-grad)" opacity="0.8"/>
        <polygon points="20,20 48,45 55,52" fill="url(#platinum-grad)" opacity="0.8"/>
        <polygon points="20,80 48,55 55,48" fill="url(#platinum-grad)" opacity="0.8"/>
        <polygon points="80,80 52,55 45,48" fill="url(#platinum-grad)" opacity="0.8"/>
        
        <!-- Brilliant Core Glow -->
        <circle cx="50" cy="50" r="4" fill="#FFFFFF" filter="url(#golden-glow)"/>
      </g>
    </symbol>

    <!-- Interlocking Clip Mask -->
    <clipPath id="right-half-clip">
      <path d="M 600,0 L 1200,0 L 1200,1200 L 600,1200 Z"/>
    </clipPath>
    
    <path id="circle-text-path" d="M 600, 220 A 380, 380 0 1, 1 599.9, 220" />
  </defs>

  <rect width="1200" height="1200" fill="url(#bg-grad)"/>

  <!-- 1. EXTREME FINE-LINE MÍNICOS DETALHES -->
  <g opacity="0.85">
    <g stroke="url(#gold-polished)" stroke-width="0.3" opacity="0.15">
      <!-- 72 Rays for extra density/luxury -->
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(0 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(5 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(10 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(15 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(20 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(25 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(30 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(35 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(40 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(45 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(50 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(55 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(60 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(65 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(70 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(75 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(80 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(85 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(90 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(95 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(100 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(105 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(110 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(115 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(120 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(125 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(130 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(135 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(140 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(145 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(150 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(155 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(160 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(165 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(170 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(175 600 600)"/>
      <!-- ... Rest of 72 rays implicitly similar -->
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(180 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(185 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(190 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(195 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(200 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(205 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(210 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(215 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(220 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(225 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(230 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(235 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(240 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(245 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(250 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(255 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(260 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(265 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(270 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(275 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(280 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(285 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(290 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(295 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(300 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(305 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(310 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(315 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(320 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(325 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(330 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(335 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(340 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(345 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(350 600 600)"/>
      <line x1="600" y1="600" x2="600" y2="50" transform="rotate(355 600 600)"/>
    </g>

    <circle cx="600" cy="600" r="480" fill="none" stroke="url(#gold-polished)" stroke-width="0.5" opacity="0.6"/>
    <circle cx="600" cy="600" r="472" fill="none" stroke="url(#gold-polished)" stroke-width="1.5" opacity="0.9"/>
    <circle cx="600" cy="600" r="464" fill="none" stroke="url(#gold-polished)" stroke-width="0.5" opacity="0.6"/>
  </g>

  <!-- 2. HIGH-END ORNAMENTAL CREST (DIAMONDS) -->
  <!-- 4 REFINED 8-POINT LUXURY STARS -->
  <use href="#luxury-star" x="576" y="70" width="48" height="48" filter="url(#golden-glow)"/>
  <use href="#luxury-star" x="576" y="1082" width="48" height="48" filter="url(#golden-glow)"/>
  <use href="#luxury-star" x="70" y="576" width="48" height="48" filter="url(#golden-glow)"/>
  <use href="#luxury-star" x="1082" y="576" width="48" height="48" filter="url(#golden-glow)"/>

  <!-- Circular Signature Text orbiting the monogram -->
  <text font-family="'Didot', 'Times New Roman', serif" font-size="28" font-weight="400" fill="#EAE5DA" letter-spacing="14" opacity="0.7">
    <textPath href="#circle-text-path" startOffset="50%" text-anchor="middle">ANDRÉ GOMIDE • ODONTOLOGIA</textPath>
  </text>
  
  <!-- 3. THE $50M WOVEN MONOGRAM (A & G) -->
  <g filter="url(#metal-shadow)">
    <text x="600" y="820" font-family="'Didot', 'Bodoni MT', 'Times New Roman', serif" font-size="640" font-weight="normal" text-anchor="middle" fill="url(#gold-dark)">G</text>
    <text x="600" y="820" font-family="'Didot', 'Bodoni MT', 'Times New Roman', serif" font-size="640" font-weight="normal" text-anchor="middle" fill="url(#gold-polished)">A</text>
    <text x="600" y="820" font-family="'Didot', 'Bodoni MT', 'Times New Roman', serif" font-size="640" font-weight="normal" text-anchor="middle" fill="url(#gold-dark)" clip-path="url(#right-half-clip)">G</text>

    <!-- NEW 8-POINT STAR AT THE HEART -->
    <use href="#luxury-star" x="580" y="590" width="40" height="40"/>
  </g>

</svg>
