<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="100%" height="100%">
  <defs>
    <!-- Premium Dark Background -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#141920"/>
      <stop offset="100%" stop-color="#05070A"/>
    </radialGradient>

    <!-- Refined Medical Gold Gradients -->
    <linearGradient id="gold-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9E2A0"/>
      <stop offset="30%" stop-color="#C69C4A"/>
      <stop offset="70%" stop-color="#A57F3A"/>
      <stop offset="100%" stop-color="#6F5222"/>
    </linearGradient>

    <linearGradient id="gold-light" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFEBB8"/>
      <stop offset="50%" stop-color="#D9AB55"/>
      <stop offset="100%" stop-color="#8C672B"/>
    </linearGradient>

    <!-- Subtle shadows for depth -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg-grad)"/>

  <!-- Subtle geometric framing (classic and elegant) -->
  <circle cx="600" cy="550" r="380" fill="none" stroke="url(#gold-main)" stroke-width="2" opacity="0.3"/>
  <circle cx="600" cy="550" r="360" fill="none" stroke="#FAF8F5" stroke-width="1" opacity="0.1"/>

  <g filter="url(#shadow)">
    <!-- THE LETTER "A" -->
    <!-- Center Peak -> Left Base -->
    <polygon points="600,250 560,320 330,800 410,800" fill="url(#gold-light)"/>
    <!-- Center Peak -> Right Base -->
    <polygon points="600,250 640,320 870,800 790,800" fill="url(#gold-main)"/>
    <!-- The Crossbar of "A" -->
    <polygon points="440,650 760,650 740,700 460,700" fill="url(#gold-light)"/>

    <!-- THE LETTER "M" -->
    <!-- Left Vertical Leg -->
    <polygon points="330,800 330,400 400,400 400,800" fill="url(#gold-main)"/>
    <!-- Left Diagonal -->
    <polygon points="330,400 400,400 600,600 550,650" fill="url(#gold-light)"/>
    <!-- Right Diagonal -->
    <polygon points="870,400 800,400 600,600 650,650" fill="url(#gold-main)"/>
    <!-- Right Vertical Leg -->
    <polygon points="870,800 870,400 800,400 800,800" fill="url(#gold-light)"/>

    <!-- Subtle Medical Integration -->
    <!-- Tiny abstract minimalist Asclepius rod intersecting the A crossbar -->
    <rect x="592" y="580" width="16" height="150" fill="url(#gold-light)"/>
    <!-- Small geometric diamond on top of the rod (classic medical star shape suggestion) -->
    <polygon points="600,560 615,575 600,590 585,575" fill="#FAF8F5" opacity="0.8"/>
  </g>

  <!-- Typography: Clear, Premium, Medical Quality -->
  <g text-anchor="middle" font-family="'Didot', 'Times New Roman', serif">
    <text x="600" y="1020" font-size="36" font-weight="400" fill="#EAE5DA" letter-spacing="12">MARCOS ANTÔNIO</text>
    <text x="600" y="1070" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600" fill="#C69C4A" letter-spacing="18">MEDICINA</text>
  </g>

</svg>
