<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" width="100%" height="100%">
  <defs>
    <!-- Dark Background -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#05070A"/>
      <stop offset="100%" stop-color="#141920"/>
    </linearGradient>

    <!-- Refined Medical Gold Gradients -->
    <linearGradient id="gold-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9E2A0"/>
      <stop offset="30%" stop-color="#C69C4A"/>
      <stop offset="70%" stop-color="#A57F3A"/>
      <stop offset="100%" stop-color="#6F5222"/>
    </linearGradient>

    <linearGradient id="gold-light" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFEBB8"/>
      <stop offset="50%" stop-color="#D9AB55"/>
      <stop offset="100%" stop-color="#8C672B"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="1600" height="600" fill="url(#bg-grad)"/>

  <!-- Geometric Accent Line -->
  <line x1="0" y1="300" x2="1600" y2="300" stroke="#C69C4A" stroke-width="1" opacity="0.1"/>
  
  <!-- Left Side: Scaled Down Clear Monogram -->
  <g transform="translate(100, 50) scale(0.4)" filter="url(#shadow)">
    <!-- THE LETTER "A" -->
    <!-- Center Peak -> Left Base -->
    <polygon points="600,250 560,320 330,800 410,800" fill="url(#gold-light)"/>
    <!-- Center Peak -> Right Base -->
    <polygon points="600,250 640,320 870,800 790,800" fill="url(#gold-main)"/>
    <!-- The Crossbar of "A" -->
    <polygon points="440,650 760,650 740,700 460,700" fill="url(#gold-light)"/>

    <!-- THE LETTER "M" -->
    <!-- Left Vertical Leg -->
    <polygon points="330,800 330,400 400,400 400,800" fill="url(#gold-main)"/>
    <!-- Left Diagonal -->
    <polygon points="330,400 400,400 600,600 550,650" fill="url(#gold-light)"/>
    <!-- Right Diagonal -->
    <polygon points="870,400 800,400 600,600 650,650" fill="url(#gold-main)"/>
    <!-- Right Vertical Leg -->
    <polygon points="870,800 870,400 800,400 800,800" fill="url(#gold-light)"/>

    <!-- Subtle Medical Integration -->
    <rect x="592" y="580" width="16" height="150" fill="url(#gold-light)"/>
    <polygon points="600,560 615,575 600,590 585,575" fill="#FAF8F5" opacity="0.8"/>
  </g>

  <!-- Divider Line -->
  <line x1="580" y1="150" x2="580" y2="450" stroke="#C69C4A" stroke-width="2" opacity="0.4"/>

  <!-- Right Side: Clean Classic Typography Lockup -->
  <g text-anchor="start" font-family="'Didot', 'Times New Roman', serif" transform="translate(640, 0)">
    <text x="0" y="320" font-size="64" font-weight="400" fill="#EAE5DA" letter-spacing="16">MARCOS ANTÔNIO</text>
    
    <text x="4" y="380" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#C69C4A" letter-spacing="24">MEDICINA</text>
  </g>

</svg>
