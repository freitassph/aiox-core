<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <!-- Deep premium dark background -->
    <radialGradient id="space-grad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#141920"/>
      <stop offset="60%" stop-color="#0E1218"/>
      <stop offset="100%" stop-color="#05070A"/>
    </radialGradient>

    <!-- Medical Gold Stroke -->
    <linearGradient id="gold-wire" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEBB8" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#C69C4A" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#6F5222" stop-opacity="0.02"/>
    </linearGradient>

    <!-- Elegant, Organized Medical/Geometric Grid Pattern -->
    <pattern id="medical-grid" width="200" height="200" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
      <!-- Main structure: diamonds and squares intersecting -->
      <line x1="100" y1="0" x2="100" y2="200" stroke="url(#gold-wire)" stroke-width="1"/>
      <line x1="0" y1="100" x2="200" y2="100" stroke="url(#gold-wire)" stroke-width="1"/>
      
      <!-- Classic diamond overlay -->
      <polygon points="100,20 180,100 100,180 20,100" fill="none" stroke="url(#gold-wire)" stroke-width="0.5"/>
      
      <!-- Small medical cross motifs on intersections -->
      <path d="M96,100 L104,100 M100,96 L100,104" stroke="#C69C4A" stroke-opacity="0.3" stroke-width="1.5"/>
      <path d="M196,0 L204,0 M200,-4 L200,4" stroke="#C69C4A" stroke-opacity="0.2" stroke-width="1"/>
      <path d="M-4,100 L4,100 M0,96 L0,104" stroke="#C69C4A" stroke-opacity="0.2" stroke-width="1"/>
    </pattern>

    <filter id="glow-light">
      <feGaussianBlur stdDeviation="50" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#space-grad)"/>

  <!-- Organized Pattern Overlay -->
  <rect width="1920" height="1080" fill="url(#medical-grid)"/>

  <!-- Elegant Vignette lighting (center) -->
  <ellipse cx="960" cy="540" rx="600" ry="400" fill="#C69C4A" opacity="0.02" filter="url(#glow-light)"/>
  
  <!-- Edge framing lines (Premium Box Aesthetic) -->
  <line x1="80" y1="80" x2="1840" y2="80" stroke="#FAF8F5" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="80" y1="1000" x2="1840" y2="1000" stroke="#FAF8F5" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="80" y1="80" x2="80" y2="1000" stroke="#FAF8F5" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="1840" y1="80" x2="1840" y2="1000" stroke="#FAF8F5" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Corner details -->
  <path d="M80,100 L100,100 M100,80 L100,100" stroke="#C69C4A" stroke-opacity="0.4" stroke-width="1"/>
  <path d="M1840,100 L1820,100 M1820,80 L1820,100" stroke="#C69C4A" stroke-opacity="0.4" stroke-width="1"/>
  <path d="M80,980 L100,980 M100,1000 L100,980" stroke="#C69C4A" stroke-opacity="0.4" stroke-width="1"/>
  <path d="M1840,980 L1820,980 M1820,1000 L1820,980" stroke="#C69C4A" stroke-opacity="0.4" stroke-width="1"/>

</svg>
