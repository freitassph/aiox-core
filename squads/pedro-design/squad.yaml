name: pedro-design
version: 2.0.0
short-title: "Pedro Design — O Squad de Design Mais Completo e Poderoso"
description: "O squad de design mais completo, detalhado e poderoso já criado para o framework AIOX. Cobre TODAS as dimensões do design: UI/UX premium Apple/Ferrari, geração de imagens IA tier S, direção de fotografia profissional, branding de $500M, motion design cirúrgico, design systems escaláveis, social media que converte, packaging, game UI, environmental design, data visualization, creative strategy, art direction, illustration avançada e UX writing. Os maiores gênios do design vivos e mortos em 20 agentes ultra-detalhados (500+ linhas cada). Zero mediocridade tolerada. Tier S+++++"
author: "Pedro Henrique Menezes de Freitas"
license: MIT
slashPrefix: pdg

aiox:
  minVersion: "2.1.0"
  type: squad

meta:
  domain: design-completo
  target: Cobertura de todas as areas do design com especializacao profunda
  orchestrator: pdg-chief
  standards:
    - task-first-architecture
    - cli-first
    - agent-authority
    - story-driven
    - no-invention
    - quality-first
    - absolute-imports
    - wcag-2.1-aa-compliance
    - design-system-governance
    - ai-image-prompt-archive
  design_tier: S+++++
  quality_level: legendary
  min_agent_lines: 500
  validation_gates: 9

