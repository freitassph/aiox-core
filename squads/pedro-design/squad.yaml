name: pedro-design
version: 1.0.0
description: "Squad elite de design em todas as dimensões — UI/UX premium Apple/Ferrari, geração de imagens IA tier S, direção de fotografia profissional, branding de $500M, motion design cirúrgico, design systems escaláveis, social media que converte. Os maiores gênios do design vivos e mortos em um único squad. Zero mediocridade tolerada."
author: Pedro Henrique Menezes de Freitas
license: MIT
slashPrefix: pdg

aiox:
  minVersion: "2.1.0"
  type: squad

components:
  agents:
    - pdg-chief.md
    - pdg-ux-designer.md
    - pdg-visual-designer.md
    - pdg-frontend-designer.md
    - pdg-ai-image-director.md
    - pdg-photo-director.md
    - pdg-brand-identity.md
    - pdg-social-media.md
    - pdg-motion-designer.md
    - pdg-design-system.md
    - pdg-ux-writer.md
    - pdg-auditor.md

  tasks:
    - pdg-orchestrate-design.md
    - pdg-create-brand-identity.md
    - pdg-design-ui-screen.md
    - pdg-generate-ai-image.md
    - pdg-create-social-pack.md
    - pdg-build-design-system.md
    - pdg-create-motion-spec.md
    - pdg-audit-design.md

  workflows:
    - brand-identity-workflow.yaml
    - ui-design-workflow.yaml
    - ai-content-workflow.yaml

  checklists:
    - design-quality-checklist.md
    - brand-identity-checklist.md

  templates: []
  tools: []
  scripts: []

config:
