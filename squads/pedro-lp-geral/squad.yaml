name: pedro-lp-geral
version: 1.0.0
description: "Squad universal de landing pages de altíssima conversão — Prestige Design System S+++ (Universal Archetypes), copy de classe mundial (Ogilvy × Schwartz × Hormozi), performance técnica impecável. Adapta-se a qualquer nicho, segmento ou indústria."
author: synkra-aios
license: MIT
slashPrefix: pedro-lp-geral

aiox:
  minVersion: "2.1.0"
  type: squad

meta:
  domain: universal-digital-marketing
  target: qualquer negócio, produto, serviço ou profissional que precise de uma landing page de alta conversão
  orchestrator: lp-geral-orchestrator
  standards:
    - LGPD Lei 13.709/2018
    - WCAG 2.1 AA
    - Core Web Vitals (Green)
    - Schema.org Universal Markup
    - Brad Frost Atomic Design System
    - Google E-E-A-T (Expertise, Experience, Authoritativeness, Trustworthiness)
    - Cialdini 7 Principles of Influence
    - Eugene Schwartz 5 Awareness Levels
    - Direct Response Marketing (Kennedy, Halbert, Ogilvy)
  design_system: Prestige Universal — Adaptive Brand Archetypes S+++
  design_tier: S+++ (beyond Apple, Ferrari, Porsche, Vercel — adapted to any industry)

components:
  agents:
    # Orchestrator — ponto de entrada único
    - lp-geral-orchestrator.md
    # Strategy & Planning
    - lp-prd-architect.md
    # Design System S+++ Tier — Universal
    - lp-prestige-design-system.md
    - lp-atomic-design-architect.md
    - lp-ui-artisan.md
    - lp-motion-designer.md
    # Copy & Content — World Class
    - lp-world-class-copywriter.md
    - lp-conversion-psychologist.md
    - lp-seo-specialist.md
    # Engineering
    - lp-integration-engineer.md
    # Quality & Launch
    - lp-qa-auditor.md
    - lp-deployment-agent.md

  tasks:
    - lp-briefing-task.md
    - lp-design-tokens-task.md
    - lp-atomic-components-task.md
    - lp-copy-framework-task.md
    - lp-build-landing-task.md
    - lp-seo-strategy-task.md
    - lp-cro-audit-task.md
    - lp-legal-compliance-task.md

  workflows:
    - lp-geral-primary.yaml
    - lp-design-sprint.yaml
    - lp-quick-launch.yaml

  checklists:
    - design-quality-prestige-s-tier-checklist.md
    - launch-readiness-checklist.md
    - accessibility-wcag21-checklist.md
    - lgpd-compliance-checklist.md
    - cro-conversion-checklist.md
    - performance-core-web-vitals-checklist.md

  templates:
    - lp-briefing-template.md
    - landing-page-sections-template.md
    - copy-framework-universal-template.md
    - design-tokens-template.yaml
    - cta-conversion-template.md

  tools:
    - conversion-optimization-matrix.md
    - industry-adaptation-guide.md
  scripts:
    - lp-quality-audit.sh
    - copy-framework-analyzer.sh

  data:
    - prestige-design-system-tokens.yaml
    - industry-adaptation-map.yaml
    - copy-frameworks-reference.md

config:
  coding-standards: config/coding-standards.md
  tech-stack: config/tech-stack.md
  source-tree: config/source-tree.md

requires:
  node: ">=18.0.0"
  aiox: ">=2.1.0"

dependencies:
  node:
    - yaml
    - zod
    - chalk
    - commander
    - glob
  squads:
    - pedro-sistema-agente

tags:
