name: pedro-lp-geral
version: "1.0.0"
description: >-
  Squad universal de landing pages S+++ para qualquer segmento — "Prestige Universal".
  Design com 5 Brand Archetypes adaptativos (LUXURY, BOLD, HUMAN, TECHNICAL, PLAYFUL),
  copy de classe mundial (Ogilvy × Schwartz × Hormozi × Cialdini), Atomic Design Brad Frost,
  CRO & psicologia da conversão, LGPD compliance. Stack: Next.js 15+ · Tailwind v4 · TypeScript 5.
  Orquestrado por Vega — ponto de entrada único para qualquer projeto de landing page.
