workflow:
  id: lp-design-sprint
  name: "Design Sprint — 5 dias"
  description: "Sprint focado exclusivamente na identidade visual completa. Tokens → Atoms → Organisms. Output: Design System S+++ completo, pronto para implementação."
  version: 1.0.0

  pre_conditions:
    - "Briefing completo aprovado"
    - "Brand Archetype definido"
    - "Acesso aos agentes de design"

  post_conditions:
    - "Design tokens completos e validados"
    - "Atomic component specs definidos"
    - "Style guide documentado"
    - "Motion profile definido"

  error_handler: |
    Em caso de falha: identificar blocker, iterar max 2x, escalar para orchestrator.

  retry_policy:
    max_retries: 2
    backoff: "30s → 60s"

  phases:
    - id: day-1
      name: "Dia 1: Descoberta & Archetype"
      steps:
        - agent: lp-prd-architect
          description: "Briefing express (90 min) + Brand Archetype detection"
          output: brand-archetype-report.md

    - id: day-2
      name: "Dia 2: Design Tokens & Identidade"
      steps:
        - agent: lp-prestige-design-system
          description: "Tokens completos: cores, tipografia, espaçamento, shadows, motion"
          depends_on: [brand-archetype-report.md]
          output: styles/design-tokens.css
          quality_gate: design-quality-prestige-s-tier-checklist.md

    - id: day-3
      name: "Dia 3: Componentes Atômicos"
      steps:
        - agent: lp-atomic-design-architect
          description: "Especificação de todos os átomos e moléculas"
          depends_on: [design-tokens]
          output: component-specs.md

    - id: day-4
      name: "Dia 4: Organismos & Layout"
      steps:
        - agent: lp-atomic-design-architect
          description: "Especificação de todos os organismos (seções)"
          depends_on: [component-specs.md]
          output: section-wireframes.md

    - id: day-5
      name: "Dia 5: Motion Profile & Entrega"
      steps:
        - agent: lp-motion-designer
          description: "Definir motion profile completo por archetype"
          depends_on: [design-tokens]
          output: motion-profile.md

        - agent: lp-prestige-design-system
          description: "Revisão final do design system + brand identity report"
          output: brand-identity-report.md

  deliverables:
    - styles/design-tokens.css
    - component-specs.md
    - section-wireframes.md
    - motion-profile.md
    - brand-identity-report.md
    - typography-spec.md
    - imagery-guidelines.md
