workflow:
  id: lp-geral-primary
  name: "Landing Page Universal — Full Project Workflow"
  description: "Workflow completo para criação de landing page S+++ para qualquer segmento. Briefing → Brand Archetype → Design → Copy → Build → CRO → QA → Launch."
  version: 1.0.0

  phases:
    - id: phase-1-strategy
      name: "Fase 1: Descoberta Estratégica"
      duration: "3–5 dias"
      parallel: false
      steps:
        - id: briefing
          task: lp-briefing-task.md
          agent: lp-prd-architect
          description: "Briefing completo + identificação de Brand Archetype"
          output: briefing-document.md
          output_also:
            - brand-archetype-report.md
            - avatar-profile.md
            - project-scope.md
            - awareness-strategy.md
          retries: 1

        - id: seo-strategy
          task: lp-seo-strategy-task.md
          agent: lp-seo-specialist
          description: "Keyword research + on-page spec + Schema markup"
          depends_on: [briefing]
          output: seo-strategy.md
          output_also:
            - on-page-spec.md
            - schema-markup.json

    - id: phase-2-design
      name: "Fase 2: Design System Prestige S+++"
      duration: "3–5 dias"
      parallel: false
      steps:
        - id: design-tokens
          task: lp-design-tokens-task.md
          agent: lp-prestige-design-system
          description: "Gerar design tokens completos adaptados ao Brand Archetype"
          depends_on: [briefing]
          output: styles/design-tokens.css
          output_also:
            - brand-identity-report.md
            - typography-spec.md
            - motion-profile.md
          quality_gate: design-quality-prestige-s-tier-checklist.md

        - id: atomic-specs
          task: lp-atomic-components-task.md
          agent: lp-atomic-design-architect
          description: "Especificação de todos os componentes atômicos"
          depends_on: [design-tokens]
          output: component-specs.md

    - id: phase-3-content
      name: "Fase 3: Copy de Classe Mundial"
      duration: "3–5 dias"
      parallel: true
      steps:
        - id: copy-production
          task: lp-copy-framework-task.md
          agent: lp-world-class-copywriter
          description: "Copy completa usando Ogilvy × Schwartz × Hormozi"
          depends_on: [briefing, awareness-strategy.md]
          output: sections-copy.md
          output_also:
            - hero-copy.md
            - headline-bank.md
            - cta-variants.md
            - meta-copy.md

        - id: legal-compliance
          task: lp-legal-compliance-task.md
          agent: lp-integration-engineer
          description: "Mapeamento LGPD e regulatórios por setor"
          depends_on: [briefing]
          output: lgpd-compliance-report.md

    - id: phase-4-build
      name: "Fase 4: Implementação Next.js"
      duration: "5–8 dias"
      parallel: false
      steps:
        - id: build-landing
          task: lp-build-landing-task.md
          agent: lp-ui-artisan
          description: "Implementação pixel-perfect de todos os componentes e seções"
          depends_on: [atomic-specs, design-tokens, sections-copy.md, seo-strategy]
          output: "site implementado"

        - id: motion-layer
          agent: lp-motion-designer
          description: "Aplicar camada de animações conforme motion-profile.md"
          depends_on: [build-landing]
          output: "site com animações"

        - id: integrations
          agent: lp-integration-engineer
          description: "GA4, Meta Pixel, WhatsApp, CMP LGPD, CRM, agendamento"
          depends_on: [build-landing]
          checklist: lgpd-compliance-checklist.md
          output: "site com integrações"

    - id: phase-5-optimization
      name: "Fase 5: CRO & Otimização"
      duration: "2–3 dias"
      parallel: true
      steps:
        - id: cro-audit
          task: lp-cro-audit-task.md
          agent: lp-conversion-psychologist
          description: "Auditoria completa das 7 camadas de conversão"
          depends_on: [build-landing, motion-layer, integrations]
          output: cro-audit.md
          output_also:
            - conversion-blockers.md
            - ab-test-roadmap.md

        - id: design-qa
          agent: lp-prestige-design-system
          description: "Validação design S+++ tier: pixels, tokens, spacing, hierarquia"
          depends_on: [build-landing, motion-layer]
          checklist: design-quality-prestige-s-tier-checklist.md

    - id: phase-6-qa
      name: "Fase 6: Quality Assurance Completo"
      duration: "2–3 dias"
      parallel: false
      steps:
        - id: technical-qa
          agent: lp-qa-auditor
          description: "QA técnico: performance, acessibilidade, cross-browser, mobile"
          depends_on: [cro-audit, design-qa]
          checklist: accessibility-wcag21-checklist.md
          output: qa-report.md
          output_also:
            - performance-report.md
            - bug-list.md
          blocking: true  # NADA lança com bugs CRITICAL ou HIGH

        - id: cro-fixes
          agent: lp-ui-artisan
          description: "Corrigir issues do cro-audit e qa-report"
          depends_on: [technical-qa]
          condition: "se bug-list.md tiver itens CRITICAL ou HIGH"

    - id: phase-7-launch
      name: "Fase 7: Launch"
      duration: "1–2 dias"
      parallel: false
      steps:
        - id: pre-launch-check
          agent: lp-deployment-agent
          description: "Verificação técnica pré-lançamento + configuração Vercel"
          depends_on: [technical-qa]
          checklist: launch-readiness-checklist.md
          blocking: true

        - id: deploy-production
          agent: lp-deployment-agent
          description: "Deploy em produção + DNS + monitoramento + Google Search Console"
          depends_on: [pre-launch-check]
          output: "site em produção com URL final"

        - id: post-launch-monitoring
          agent: lp-deployment-agent
          description: "Configurar UptimeRobot + verificar Analytics + submeter sitemap"
          depends_on: [deploy-production]

  kpis:
    conversion_rate_organic: "> 3.5%"
    conversion_rate_paid: "> 7%"
    lighthouse_mobile_performance: ">= 95"
    lighthouse_accessibility: ">= 95"
    lighthouse_seo: ">= 95"
    core_web_vitals: "LCP < 2.5s | CLS < 0.1 | INP < 200ms"
    lgpd_compliance: "100% — zero infrações"

  timeline:
    minimum: "14 dias (projeto simples, archetype definido, fotos disponíveis)"
    standard: "21 dias (projeto completo, recursos disponíveis)"
    complex: "30 dias (e-commerce, integrações pesadas, vídeo production)"
