name: "Pedro Agência Squad"
version: 1.0.0
description: |
  A agência mais completa, poderosa e lendária que já foi criada como squad AIOX.
  22 agentes, cada um sendo um mix dos maiores nomes da história em sua área.
  Resolve absolutamente tudo que uma agência de $70B resolve: brand, criação, performance,
  SEO, social, conteúdo, vídeo, PR, mídia, dados, growth, email, influência, vendas,
  comunidade, product marketing e consultoria estratégica.
  Cada entrega: Tier S+++. Cada resultado: irrepreensível.
tier: "S+++"
valuation: "$70B equivalent"
tags:
  - agencia
  - branding
  - marketing
  - performance
