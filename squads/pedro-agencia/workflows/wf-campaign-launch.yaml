name: wf-campaign-launch
description: "Workflow de lançamento de campanha integrada 360° — do brief ao go-live"
version: "1.0"
squad: pedro-agencia

steps:
  - id: brief-intake
    agent: pa-empire
    action: "Receber e validar brief da campanha com todos os objetivos e restrições"
    outputs:
      - validated-brief
      - campaign-scope

  - id: strategy
    agent: pa-oracle
    depends_on: brief-intake
    action: "Validar posicionamento e definir mensagem central da campanha"
    parallel_with: [media-planning]
    outputs:
      - campaign-positioning
      - core-message
      - audience-segments

  - id: media-planning
    agent: pa-compass
    depends_on: brief-intake
    action: "Criar plano de mídia com alocação de budget por canal"
    parallel_with: [strategy]
    outputs:
      - media-plan
      - channel-specs
      - creative-specs

  - id: creative-concept
    agent: pa-genesis
    depends_on: strategy
    action: "Desenvolver 3 conceitos criativos baseados no posicionamento aprovado"
    outputs:
      - creative-concepts
      - approved-direction

  - id: copy-production
    agent: pa-quill
    depends_on: creative-concept
    action: "Produzir copy completa para todos os canais e formatos"
    parallel_with: [visual-production]
    outputs:
      - ad-copy
      - email-copy
      - social-copy
      - landing-page-copy

  - id: visual-production
    agent: pa-canvas
    depends_on: creative-concept
    action: "Criar assets visuais para todos os canais e formatos especificados"
    parallel_with: [copy-production]
    outputs:
      - banner-ads
      - social-creatives
      - landing-page-design

  - id: landing-page
    agent: pa-nexus
    depends_on: [copy-production, visual-production]
    action: "Montar e otimizar landing page da campanha para conversão máxima"
    outputs:
      - landing-page-live
      - conversion-setup

  - id: tracking-setup
    agent: pa-prism
    depends_on: landing-page
    action: "Configurar tracking completo: UTMs, pixels, eventos e dashboard"
    outputs:
      - tracking-configured
      - campaign-dashboard

  - id: campaign-activation
    agent: pa-profit
    depends_on: [tracking-setup, media-planning]
    action: "Ativar campanhas pagas em todos os canais (Google, Meta, TikTok, etc.)"
    parallel_with: [social-activation, email-activation]
    outputs:
      - campaigns-live

  - id: social-activation
    agent: pa-pulse
    depends_on: [tracking-setup]
    action: "Publicar e programar conteúdo orgânico de campanha em todos os canais"
    parallel_with: [campaign-activation]
    outputs:
      - social-content-live

  - id: email-activation
    agent: pa-inbox
    depends_on: [tracking-setup, copy-production]
    action: "Ativar sequência de email de lançamento para a lista segmentada"
    parallel_with: [campaign-activation]
    outputs:
      - email-sequence-live

  - id: pr-activation
    agent: pa-aegis
    depends_on: brief-intake
    action: "Enviar press release e pitches para imprensa selecionada"
    outputs:
      - press-coverage

  - id: monitoring
    agent: pa-prism
    depends_on: [campaign-activation, social-activation, email-activation]
    action: "Monitorar performance diária e enviar alertas de anomalias"
    recurring: true
    frequency: daily
    outputs:
      - daily-report

success_criteria:
  - "Todos os canais ativados dentro do prazo"
  - "Tracking funcionando em 100% dos canais"
  - "Relatório D+1 entregue para o cliente"
