name: wf-campaign-launch
description: Workflow de lançamento de campanha integrada 360° — do brief ao go-live
version: "1.0"
squad: pedro-agencia
steps:
  - id: brief-intake
    agent: pa-empire
    task: pa-orchestrate-campaign
    action: Receber e validar brief da campanha com todos os objetivos e restrições
    retry:
      max_attempts: 2
      backoff: linear
    on_success: strategy
    on_failure: error-handler
    outputs:
      - validated-brief
      - campaign-scope
  - id: strategy
    agent: pa-oracle
    task: pa-brand-strategy
    depends_on: brief-intake
    action: Validar posicionamento e definir mensagem central da campanha
    retry:
      max_attempts: 2
      backoff: linear
    on_success: creative-concept
    on_failure: error-handler
    parallel_with:
      - media-planning
    outputs:
      - campaign-positioning
      - core-message
      - audience-segments
  - id: media-planning
    agent: pa-compass
    task: pa-media-plan
    depends_on: brief-intake
    action: Criar plano de mídia com alocação de budget por canal
    retry:
      max_attempts: 2
      backoff: linear
    on_success: campaign-activation
    on_failure: error-handler
    parallel_with:
      - strategy
    outputs:
      - media-plan
      - channel-specs
      - creative-specs
  - id: creative-concept
    agent: pa-genesis
    task: pa-campaign-concept
    depends_on: strategy
    action: Desenvolver 3 conceitos criativos baseados no posicionamento aprovado
    retry:
      max_attempts: 2
      backoff: linear
    on_success: copy-production
    on_failure: error-handler
    outputs:
      - creative-concepts
      - approved-direction
  - id: copy-production
    agent: pa-quill
    task: pa-content-copy
    depends_on: creative-concept
    action: Produzir copy completa para todos os canais e formatos
    retry:
      max_attempts: 2
      backoff: linear
    on_success: landing-page
    on_failure: error-handler
    parallel_with:
      - visual-production
    outputs:
      - ad-copy
      - email-copy
      - social-copy
      - landing-page-copy
  - id: visual-production
    agent: pa-canvas
    task: pa-ad-creatives
    depends_on: creative-concept
    action: Criar assets visuais para todos os canais e formatos especificados
    retry:
      max_attempts: 2
      backoff: linear
    on_success: landing-page
    on_failure: error-handler
    parallel_with:
      - copy-production
    outputs:
      - banner-ads
      - social-creatives
      - landing-page-design
  - id: landing-page
    agent: pa-nexus
    task: pa-landing-design
    depends_on:
      - copy-production
      - visual-production
    action: Montar e otimizar landing page da campanha para conversão máxima
    retry:
      max_attempts: 2
      backoff: linear
    on_success: tracking-setup
    on_failure: error-handler
    outputs:
      - landing-page-live
      - conversion-setup
  - id: tracking-setup
    agent: pa-prism
    task: pa-analytics-audit
    depends_on: landing-page
    action: "Configurar tracking completo: UTMs, pixels, eventos e dashboard"
    retry:
      max_attempts: 2
      backoff: linear
    on_success: campaign-activation
    on_failure: error-handler
    outputs:
      - tracking-configured
      - campaign-dashboard
  - id: campaign-activation
    agent: pa-profit
    task: pa-ad-campaign-launch
    depends_on:
      - tracking-setup
      - media-planning
    action: Ativar campanhas pagas em todos os canais (Google, Meta, TikTok, etc.)
    retry:
      max_attempts: 3
      backoff: exponential
    on_success: monitoring
    on_failure: error-handler
    parallel_with:
      - social-activation
      - email-activation
    outputs:
      - campaigns-live
  - id: social-activation
    agent: pa-pulse
    task: pa-social-strategy
    depends_on:
      - tracking-setup
    action: Publicar e programar conteúdo orgânico de campanha em todos os canais
    retry:
      max_attempts: 2
      backoff: linear
    on_success: monitoring
    on_failure: error-handler
    parallel_with:
      - campaign-activation
    outputs:
      - social-content-live
  - id: email-activation
    agent: pa-inbox
    task: pa-email-sequence
    depends_on:
      - tracking-setup
      - copy-production
    action: Ativar sequência de email de lançamento para a lista segmentada
    retry:
      max_attempts: 2
      backoff: linear
    on_success: monitoring
    on_failure: error-handler
    parallel_with:
      - campaign-activation
    outputs:
      - email-sequence-live
  - id: pr-activation
    agent: pa-aegis
    task: pa-pr-strategy
    depends_on: brief-intake
    action: Enviar press release e pitches para imprensa selecionada
    retry:
      max_attempts: 2
      backoff: linear
    on_success: monitoring
    on_failure: error-handler
    outputs:
      - press-coverage
  - id: monitoring
    agent: pa-prism
    task: pa-analytics-audit
    depends_on:
      - campaign-activation
      - social-activation
      - email-activation
    action: Monitorar performance diária e enviar alertas de anomalias
    retry:
      max_attempts: 3
      backoff: exponential
    on_success: complete
    on_failure: error-handler
    recurring: true
    frequency: daily
    outputs:
      - daily-report
pre_conditions:
  - All required agents available and activated
  - Client brief approved by pa-empire
  - Budget and timeline validated
post_conditions:
  - All campaign assets delivered
  - Quality gates passed
  - Client sign-off received
error_handler:
  strategy: escalate-to-orchestrator
  escalation:
    - Agent self-corrects and retries
    - Escalate to pa-empire for resolution
    - Pause workflow and request client input
  rollback:
    trigger: Critical failure after 3 attempts
    action: Revert to last approved state
  actions:
    - action: log
      message: "Workflow failed at {step_id} with error: {error}"
    - action: notify
      channel: pedro-agencia-alerts
      recipient: pa-empire
    - action: escalate
      to: pa-empire
      after: 2 failures
retry:
  max_attempts: 3
  backoff: exponential
  retry_on:
    - network_error
    - agent_timeout
  do_not_retry:
    - validation_error
    - client_rejection
success_criteria:
  - Todos os canais ativados dentro do prazo
  - Tracking funcionando em 100% dos canais
  - Relatório D+1 entregue para o cliente
