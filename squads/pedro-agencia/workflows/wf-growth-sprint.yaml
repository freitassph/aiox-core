name: wf-growth-sprint
description: Sprint de 90 dias de crescimento acelerado com experimentos estruturados
version: "1.0"
squad: pedro-agencia
trigger:
  command: "*growth-sprint"
  event: growth-sprint-activated
steps:
  - id: baseline-audit
    agent: pa-prism
    task: pa-analytics-audit
    action: "Auditoria completa de métricas: funil AARRR, cohort analysis, baseline
      de todas as KPIs"
    retry:
      max_attempts: 2
      backoff: linear
    on_success: north-star-definition
    on_failure: error-handler
    parallel_with:
      - business-health
    outputs:
      - funnel-analysis
      - cohort-data
      - baseline-metrics
      - anomaly-report
  - id: business-health
    agent: pa-sage
    task: pa-business-strategy
    action: "Diagnóstico de saúde do negócio: unit economics, PMF, principais
      alavancas de crescimento"
    retry:
      max_attempts: 2
      backoff: linear
    on_success: north-star-definition
    on_failure: error-handler
    parallel_with:
      - baseline-audit
    outputs:
      - unit-economics-report
      - pmf-score
      - growth-levers-identified
  - id: north-star-definition
    agent: pa-rocket
    task: pa-growth-strategy
    depends_on:
      - baseline-audit
      - business-health
    action: Definir North Star Metric, OKRs do sprint e frameworks de priorização
      ICE/RICE
    retry:
      max_attempts: 2
      backoff: linear
    on_success: seo-opportunity
    on_failure: error-handler
    outputs:
      - north-star-metric
      - sprint-okrs
      - success-definition
      - ice-scoring-framework
  - id: seo-opportunity
    agent: pa-vertex
    task: pa-seo-strategy
    depends_on: baseline-audit
    action: "Mapeamento de oportunidades SEO: keyword gaps, quick wins, conteúdo de
      alto impacto"
    retry:
      max_attempts: 2
      backoff: linear
    on_success: experiment-backlog
    on_failure: error-handler
    parallel_with:
      - paid-opportunity
      - email-opportunity
      - content-opportunity
    outputs:
      - seo-quick-wins
      - keyword-opportunity-map
      - content-gap-analysis
  - id: paid-opportunity
    agent: pa-profit
    task: pa-paid-media-strategy
    depends_on: baseline-audit
    action: "Análise de oportunidades em mídia paga: ROAS gaps, audiências não
      exploradas, creative testing"
    retry:
      max_attempts: 2
      backoff: linear
    on_success: experiment-backlog
    on_failure: error-handler
    parallel_with:
      - seo-opportunity
      - email-opportunity
      - content-opportunity
    outputs:
      - paid-quick-wins
      - audience-expansion-opportunities
      - creative-test-hypotheses
  - id: email-opportunity
    agent: pa-inbox
    task: pa-email-sequence
    depends_on: baseline-audit
    action: "Análise de oportunidades em email: segmentação, automações faltantes,
      win-back potential"
    retry:
      max_attempts: 2
      backoff: linear
    on_success: experiment-backlog
    on_failure: error-handler
    parallel_with:
      - seo-opportunity
      - paid-opportunity
      - content-opportunity
    outputs:
      - email-quick-wins
      - automation-gaps
      - list-health-analysis
  - id: content-opportunity
    agent: pa-chronicle
    task: pa-content-strategy
    depends_on: baseline-audit
    action: "Oportunidades de conteúdo: viral potential, formatos sub-utilizados,
      distribuição ineficiente"
    retry:
      max_attempts: 2
      backoff: linear
    on_success: experiment-backlog
    on_failure: error-handler
    parallel_with:
      - seo-opportunity
      - paid-opportunity
      - email-opportunity
    outputs:
      - content-quick-wins
      - viral-content-opportunities
      - distribution-gaps
  - id: experiment-backlog
    agent: pa-rocket
    task: pa-growth-sprint
    depends_on:
      - north-star-definition
      - seo-opportunity
      - paid-opportunity
      - email-opportunity
      - content-opportunity
    action: Compilar e priorizar backlog de 30+ experimentos usando scoring ICE/RICE
    retry:
      max_attempts: 2
      backoff: linear
    on_success: sprint-1-execution
    on_failure: error-handler
    outputs:
      - experiment-backlog-prioritized
      - sprint-1-experiments
      - sprint-2-experiments
      - sprint-3-experiments
  - id: sprint-1-execution
    agent: pa-rocket
    task: pa-growth-sprint
    depends_on: experiment-backlog
    action: "Executar experimentos do Sprint 1 (dias 1-30): ativar, monitorar e iterar"
    retry:
      max_attempts: 2
      backoff: linear
    on_success: sprint-1-review
    on_failure: error-handler
    parallel_with:
      - seo-sprint-1
      - paid-sprint-1
      - email-sprint-1
    outputs:
      - sprint-1-results
      - wins-and-losses
      - learnings-s1
  - id: seo-sprint-1
    agent: pa-vertex
    task: pa-seo-audit
    depends_on: experiment-backlog
    action: "Executar experimentos SEO do Sprint 1: on-page, conteúdo, link building"
    retry:
      max_attempts: 2
      backoff: linear
    on_success: sprint-1-review
    on_failure: error-handler
    parallel_with:
      - sprint-1-execution
      - paid-sprint-1
      - email-sprint-1
    outputs:
      - seo-experiments-s1
      - ranking-changes
      - organic-traffic-delta
  - id: paid-sprint-1
    agent: pa-profit
    task: pa-ad-campaign-launch
    depends_on: experiment-backlog
    action: "Executar experimentos de mídia paga Sprint 1: creative tests, audience
      expansion"
    retry:
      max_attempts: 2
      backoff: linear
    on_success: sprint-1-review
    on_failure: error-handler
    parallel_with:
      - sprint-1-execution
      - seo-sprint-1
      - email-sprint-1
    outputs:
      - paid-experiments-s1
      - roas-delta
      - cpa-improvements
  - id: email-sprint-1
    agent: pa-inbox
    task: pa-email-sequence
    depends_on: experiment-backlog
    action: "Executar experimentos email Sprint 1: segmentação, subject lines,
      automações"
    retry:
      max_attempts: 2
      backoff: linear
    on_success: sprint-1-review
    on_failure: error-handler
    parallel_with:
      - sprint-1-execution
      - seo-sprint-1
      - paid-sprint-1
    outputs:
      - email-experiments-s1
      - open-rate-delta
      - conversion-rate-delta
  - id: sprint-1-review
    agent: pa-prism
    task: pa-analytics-audit
    depends_on:
      - sprint-1-execution
      - seo-sprint-1
      - paid-sprint-1
      - email-sprint-1
    action: Análise de resultados do Sprint 1 com stat. sig., effect size e decisão
      escalar/matar
    retry:
      max_attempts: 3
      backoff: exponential
    on_success: sprint-2-execution
    on_failure: error-handler
    outputs:
      - sprint-1-analysis
      - winners-to-scale
      - losers-to-kill
      - sprint-2-adjustments
  - id: sprint-2-execution
    agent: pa-rocket
    task: pa-growth-sprint
    depends_on: sprint-1-review
    action: Executar Sprint 2 (dias 31-60) com winners escalados e novos experimentos
    retry:
      max_attempts: 2
      backoff: linear
    on_success: sprint-3-execution
    on_failure: error-handler
    outputs:
      - sprint-2-results
      - growth-trajectory
  - id: sprint-3-execution
    agent: pa-rocket
    task: pa-growth-sprint
    depends_on: sprint-2-execution
    action: "Sprint 3 (dias 61-90): consolidar wins, escalar ao máximo, preparar
      próximo ciclo"
    retry:
      max_attempts: 2
      backoff: linear
    on_success: sprint-final-report
    on_failure: error-handler
    outputs:
      - sprint-3-results
      - growth-achieved
      - next-sprint-plan
  - id: sprint-final-report
    agent: pa-empire
    task: pa-orchestrate-campaign
    depends_on: sprint-3-execution
    action: "Relatório final do sprint: crescimento total, ROI dos experimentos,
      recomendações"
    retry:
      max_attempts: 3
      backoff: exponential
    on_success: complete
    on_failure: error-handler
    outputs:
      - final-growth-report
      - experiment-log-complete
      - roi-calculation
      - next-90-days-roadmap
pre_conditions:
  - All required agents available and activated
  - Client brief approved by pa-empire
  - Budget and timeline validated
post_conditions:
  - All campaign assets delivered
  - Quality gates passed
  - Client sign-off received
error_handler:
  strategy: escalate-to-orchestrator
  escalation:
    - Agent self-corrects and retries
    - Escalate to pa-empire for resolution
    - Pause workflow and request client input
  rollback:
    trigger: Critical failure after 3 attempts
    action: Revert to last approved state
  actions:
    - action: log
      message: "Workflow failed at {step_id} with error: {error}"
    - action: notify
      channel: pedro-agencia-alerts
      recipient: pa-empire
    - action: escalate
      to: pa-empire
      after: 2 failures
retry:
  max_attempts: 3
  backoff: exponential
  retry_on:
    - network_error
    - agent_timeout
  do_not_retry:
    - validation_error
    - client_rejection
success_criteria:
  - North Star Metric definida e acompanhada semanalmente
  - Mínimo de 15 experimentos executados nos 90 dias
  - ROI do sprint positivo vs investimento realizado
  - Backlog do próximo sprint já priorizado ao final
  - Dashboard de crescimento atualizado em tempo real
  - Crescimento de ao menos 30% na North Star Metric
