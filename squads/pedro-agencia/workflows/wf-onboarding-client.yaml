name: wf-onboarding-client
description: Workflow completo de onboarding de novo cliente da pedro-agencia
version: "1.0"
squad: pedro-agencia
steps:
  - id: kickoff
    agent: pa-empire
    action: Conduzir reunião de kickoff e alinhar objetivos
    task: pa-campaign-full
    outputs:
      - project-brief
      - goals-document
      - team-assignments
    retry:
      max_attempts: 2
      backoff: linear
    on_success: strategic-audit
    on_failure: error-handler
  - id: strategic-audit
    agent: pa-sage
    depends_on: kickoff
    action: Diagnóstico estratégico do negócio do cliente
    parallel_with:
      - brand-audit
    outputs:
      - business-diagnosis
      - unit-economics
      - strategic-priorities
    task: pa-business-strategy
    retry:
      max_attempts: 2
      backoff: linear
    on_success: brand-audit
    on_failure: error-handler
  - id: brand-audit
    agent: pa-oracle
    depends_on: kickoff
    action: Auditoria completa de marca e posicionamento
    parallel_with:
      - strategic-audit
    outputs:
      - brand-audit-report
      - positioning-gaps
    task: pa-brand-audit
    retry:
      max_attempts: 2
      backoff: linear
    on_success: data-baseline
    on_failure: error-handler
  - id: data-baseline
    agent: pa-prism
    depends_on: kickoff
    action: Configurar analytics e coletar baseline de métricas
    parallel_with:
      - strategic-audit
      - brand-audit
    outputs:
      - analytics-setup
      - baseline-metrics
      - measurement-plan
    task: pa-analytics-audit
    retry:
      max_attempts: 2
      backoff: linear
    on_success: strategy-synthesis
    on_failure: error-handler
  - id: strategy-synthesis
    agent: pa-empire
    depends_on:
      - strategic-audit
      - brand-audit
      - data-baseline
    action: Sintetizar diagnósticos em plano estratégico de 90 dias
    outputs:
      - strategic-plan-90d
      - priority-roadmap
    task: pa-go-to-market
    retry:
      max_attempts: 2
      backoff: linear
    on_success: team-briefing
    on_failure: error-handler
  - id: team-briefing
    agent: pa-empire
    depends_on: strategy-synthesis
    action: Briefar todos os agentes com suas responsabilidades
    outputs:
      - agent-briefs
      - delivery-schedule
    task: pa-client-onboarding
    retry:
      max_attempts: 2
      backoff: linear
    on_success: success-plan
    on_failure: error-handler
  - id: success-plan
    agent: pa-anchor
    depends_on: team-briefing
    action: Criar Success Plan e configurar touchpoints com o cliente
    outputs:
      - success-plan
      - touchpoint-calendar
      - health-score-setup
    task: pa-community-strategy
    retry:
      max_attempts: 3
      backoff: exponential
    on_success: complete
    on_failure: error-handler
triggers:
  - event: new-client-signed
    auto_start: true
pre_conditions:
  - All required agents available and activated
  - Client brief approved by pa-empire
  - Budget and timeline validated
post_conditions:
  - All campaign assets delivered
  - Quality gates passed
  - Client sign-off received
error_handler:
  strategy: escalate-to-orchestrator
  escalation:
    - Agent self-corrects and retries
    - Escalate to pa-empire for resolution
    - Pause workflow and request client input
  rollback:
    trigger: Critical failure after 3 attempts
    action: Revert to last approved state
  actions:
    - action: log
      message: "Workflow failed at {step_id} with error: {error}"
    - action: notify
      channel: pedro-agencia-alerts
      recipient: pa-empire
    - action: escalate
      to: pa-empire
      after: 2 failures
retry:
  max_attempts: 3
  backoff: exponential
  retry_on:
    - network_error
    - agent_timeout
  do_not_retry:
    - validation_error
    - client_rejection
success_criteria:
  - Cliente aprovou Strategic Plan em até 5 dias úteis
  - Analytics configurado e baseline coletado
  - Success Plan compartilhado com o cliente
  - Primeiro relatório semanal entregue
