name: wf-content-machine
description: "Máquina de produção de conteúdo mensal — do planejamento à publicação em todos os canais"
version: "1.0"
squad: pedro-agencia

trigger:
  command: "*content-machine"
  frequency: monthly
  auto_start: true

steps:
  - id: performance-review
    agent: pa-prism
    action: "Revisar performance do conteúdo do mês anterior: top performers, underperformers, insights"
    outputs:
      - content-performance-report
      - top-performers
      - underperformers
      - audience-insights
      - format-recommendations

  - id: keyword-opportunities
    agent: pa-vertex
    depends_on: performance-review
    action: "Pesquisa mensal de keywords: novas oportunidades, trends, seasonality, intent mapping"
    parallel_with: [audience-insights]
    outputs:
      - monthly-keyword-opportunities
      - trending-topics
      - seasonal-content-map

  - id: audience-insights
    agent: pa-prism
    depends_on: performance-review
    action: "Análise profunda da audiência: comportamento, preferências, jornada e engajamento"
    parallel_with: [keyword-opportunities]
    outputs:
      - audience-behavior-report
      - content-preference-analysis
      - engagement-patterns

  - id: editorial-planning
    agent: pa-chronicle
    depends_on: [keyword-opportunities, audience-insights]
    action: "Planejar editorial calendar do mês: temas, formatos, canais, frequência, briefings"
    outputs:
      - editorial-calendar-monthly
      - content-briefs
      - repurposing-plan
      - distribution-strategy

  - id: social-calendar
    agent: pa-pulse
    depends_on: editorial-planning
    action: "Criar calendário de social media: posts por plataforma, stories, reels, lives"
    parallel_with: [email-calendar, blog-calendar]
    outputs:
      - social-calendar
      - platform-specific-briefs
      - engagement-strategy
      - hashtag-strategy

  - id: email-calendar
    agent: pa-inbox
    depends_on: editorial-planning
    action: "Planejar calendário de emails: newsletters, campanhas, automações, segmentação"
    parallel_with: [social-calendar, blog-calendar]
    outputs:
      - email-calendar
      - newsletter-briefs
      - campaign-schedule

  - id: blog-calendar
    agent: pa-chronicle
    depends_on: editorial-planning
    action: "Planejar conteúdo de blog: artigos SEO, pillar content, guest posts, featured snippets"
    parallel_with: [social-calendar, email-calendar]
    outputs:
      - blog-calendar
      - article-briefs
      - seo-briefs
      - internal-linking-plan

  - id: copy-production
    agent: pa-quill
    depends_on: [social-calendar, email-calendar, blog-calendar]
    action: "Produzir toda a copy do mês: artigos, posts, emails, captions, scripts"
    parallel_with: [visual-production]
    outputs:
      - articles-copy
      - social-copy-all-platforms
      - email-copy
      - video-scripts

  - id: visual-production
    agent: pa-canvas
    depends_on: [social-calendar, email-calendar, blog-calendar]
    action: "Criar todos os assets visuais: posts, thumbnails, infográficos, email visuals"
    parallel_with: [copy-production]
    outputs:
      - social-visuals-all-platforms
      - email-visuals
      - blog-featured-images
      - infographics

  - id: video-production
    agent: pa-frame
    depends_on: [copy-production]
    action: "Produzir scripts de vídeo e briefings de produção: reels, shorts, tutoriais"
    outputs:
      - video-scripts-monthly
      - reels-briefs
      - yt-shorts-briefs
      - production-schedule

  - id: seo-optimization
    agent: pa-vertex
    depends_on: [copy-production]
    action: "Otimizar SEO de cada peça de conteúdo antes da publicação"
    outputs:
      - seo-optimized-content
      - meta-tags
      - schema-markup
      - internal-links

  - id: qa-review
    agent: pa-chronicle
    depends_on: [copy-production, visual-production, seo-optimization]
    action: "Revisão editorial de qualidade: brand voice, accuracy, consistency, guidelines"
    outputs:
      - content-qa-approved
      - revisions-list
      - quality-score

  - id: scheduling
    agent: pa-pulse
    depends_on: qa-review
    action: "Agendar e publicar conteúdo em todas as plataformas conforme o calendário"
    outputs:
      - content-scheduled-all-platforms
      - publication-log

  - id: email-scheduling
    agent: pa-inbox
    depends_on: qa-review
    action: "Programar todos os emails e newsletters do mês com segmentação correta"
    parallel_with: [scheduling]
    outputs:
      - emails-scheduled
      - automation-live

  - id: amplification
    agent: pa-network
    depends_on: [scheduling, email-scheduling]
    action: "Amplificar conteúdo via influencers, parceiros e distribuição estratégica"
    outputs:
      - amplification-executed
      - partnership-content-live
      - reach-amplified

  - id: monthly-report
    agent: pa-prism
    depends_on: amplification
    action: "Relatório completo de performance do conteúdo: alcance, engajamento, conversões, ROI"
    outputs:
      - monthly-content-report
      - roi-content
      - top-content-pieces
      - next-month-recommendations

success_criteria:
  - "Editorial calendar aprovado pelo cliente até dia 25 do mês anterior"
  - "100% do conteúdo revisado e aprovado antes da publicação"
  - "Zero falhas de postagem — todos os canais publicados no horário"
  - "Taxa de engajamento acima de 5% por plataforma"
  - "Relatório mensal entregue até dia 5 do mês seguinte"
  - "Crescimento mês a mês de alcance orgânico >= 10%"
