name: wf-full-campaign
description: Do brief ao ar — campanha completa de alta conversão em todos os canais
version: "1.0"
squad: pedro-agencia
trigger:
  command: "*orchestrate-campaign"
  event: campaign-brief-received
steps:
  - id: brief-validation
    agent: pa-empire
    task: pa-orchestrate-campaign
    action: Validar brief, definir KPIs, alocar budget e montar war room da campanha
    retry:
      max_attempts: 2
      backoff: linear
    on_success: positioning-review
    on_failure: error-handler
    outputs:
      - validated-brief
      - kpi-matrix
      - budget-allocation
      - team-assignments
  - id: positioning-review
    agent: pa-oracle
    task: pa-brand-strategy
    depends_on: brief-validation
    action: Revisar posicionamento de marca, garantir fit com campanha, validar
      mensagem central
    retry:
      max_attempts: 2
      backoff: linear
    on_success: creative-direction
    on_failure: error-handler
    parallel_with:
      - business-alignment
    outputs:
      - brand-positioning-confirmed
      - campaign-message-framework
      - tone-of-voice-guide
  - id: business-alignment
    agent: pa-sage
    task: pa-business-strategy
    depends_on: brief-validation
    action: Alinhar campanha com objetivos de negócio, validar unit economics e
      timing estratégico
    retry:
      max_attempts: 2
      backoff: linear
    on_success: creative-direction
    on_failure: error-handler
    parallel_with:
      - positioning-review
    outputs:
      - business-case
      - success-metrics
      - risk-assessment
  - id: creative-direction
    agent: pa-genesis
    task: pa-creative-brief
    depends_on:
      - positioning-review
      - business-alignment
    action: Desenvolver 3 direções criativas completas com moodboard, conceito e
      rationale
    retry:
      max_attempts: 2
      backoff: linear
    on_success: media-strategy
    on_failure: error-handler
    outputs:
      - creative-concepts
      - approved-direction
      - brand-guidelines-applied
  - id: media-strategy
    agent: pa-compass
    task: pa-media-plan
    depends_on: brief-validation
    action: Criar plano de mídia estratégico com mix de canais, alocação de budget e
      projeções
    retry:
      max_attempts: 2
      backoff: linear
    on_success: copywriting
    on_failure: error-handler
    parallel_with:
      - seo-strategy
    outputs:
      - media-plan
      - channel-mix
      - budget-by-channel
      - reach-frequency-projections
  - id: seo-strategy
    agent: pa-vertex
    task: pa-seo-strategy
    depends_on: brief-validation
    action: "Definir estratégia SEO da campanha: keywords, pages, link building plan"
    retry:
      max_attempts: 2
      backoff: linear
    on_success: copywriting
    on_failure: error-handler
    parallel_with:
      - media-strategy
    outputs:
      - keyword-strategy
      - seo-landing-pages-plan
      - organic-traffic-projections
  - id: copywriting
    agent: pa-quill
    task: pa-content-copy
    depends_on: creative-direction
    action: "Produzir copy completa para todos os canais: ads, email, social,
      landing page, PR"
    retry:
      max_attempts: 2
      backoff: linear
    on_success: visual-design
    on_failure: error-handler
    parallel_with:
      - visual-design
    outputs:
      - ads-copy-all-channels
      - email-copy
      - social-copy
      - landing-page-copy
      - pr-copy
  - id: visual-design
    agent: pa-canvas
    task: pa-visual-identity
    depends_on: creative-direction
    action: "Criar sistema visual completo: ads em todos os formatos, social,
      display, OOH"
    retry:
      max_attempts: 2
      backoff: linear
    on_success: landing-page
    on_failure: error-handler
    parallel_with:
      - copywriting
    outputs:
      - ad-creatives-all-formats
      - social-visuals
      - banner-system
      - brand-assets
  - id: landing-page
    agent: pa-nexus
    task: pa-landing-design
    depends_on:
      - copywriting
      - visual-design
    action: Projetar e estruturar landing page de alta conversão com UX otimizado
    retry:
      max_attempts: 2
      backoff: linear
    on_success: video-content
    on_failure: error-handler
    parallel_with:
      - video-content
    outputs:
      - landing-page-wireframe
      - landing-page-spec
      - conversion-flow-design
  - id: video-content
    agent: pa-frame
    task: pa-video-production
    depends_on: creative-direction
    action: "Produzir roteiros e direção de vídeos: hero video, depoimentos, ads em
      vídeo"
    retry:
      max_attempts: 2
      backoff: linear
    on_success: tracking-setup
    on_failure: error-handler
    parallel_with:
      - landing-page
    outputs:
      - video-scripts
      - storyboards
      - video-production-brief
      - video-specs-by-platform
  - id: tracking-setup
    agent: pa-prism
    task: pa-analytics-audit
    depends_on: landing-page
    action: "Configurar analytics completo: GA4, pixels, UTMs, dashboard de campanha
      em tempo real"
    retry:
      max_attempts: 2
      backoff: linear
    on_success: email-automation
    on_failure: error-handler
    outputs:
      - analytics-configured
      - pixel-setup
      - utm-structure
      - campaign-dashboard
  - id: email-automation
    agent: pa-inbox
    task: pa-email-sequence
    depends_on:
      - copywriting
      - tracking-setup
    action: Montar sequência de email de lançamento com automação completa e
      segmentação
    retry:
      max_attempts: 2
      backoff: linear
    on_success: paid-media-launch
    on_failure: error-handler
    parallel_with:
      - paid-media-launch
      - social-launch
    outputs:
      - email-sequence-live
      - automation-flows
      - segmentation-rules
  - id: paid-media-launch
    agent: pa-profit
    task: pa-ad-campaign-launch
    depends_on:
      - tracking-setup
      - media-strategy
    action: Ativar e otimizar campanhas pagas em todos os canais com bid strategy e
      audiências
    retry:
      max_attempts: 3
      backoff: exponential
    on_success: social-launch
    on_failure: error-handler
    parallel_with:
      - email-automation
      - social-launch
    outputs:
      - campaigns-live-all-channels
      - audiences-configured
      - bid-strategies-set
      - initial-performance-report
  - id: social-launch
    agent: pa-pulse
    task: pa-social-strategy
    depends_on:
      - tracking-setup
    action: Publicar e programar conteúdo orgânico, stories, reels e interações de
      lançamento
    retry:
      max_attempts: 2
      backoff: linear
    on_success: pr-launch
    on_failure: error-handler
    parallel_with:
      - email-automation
      - paid-media-launch
    outputs:
      - organic-content-live
      - content-schedule
      - engagement-protocol
  - id: pr-launch
    agent: pa-aegis
    task: pa-pr-strategy
    depends_on: brief-validation
    action: "Executar estratégia de PR: press release, pitches, assessoria de
      imprensa e crises"
    retry:
      max_attempts: 2
      backoff: linear
    on_success: influencer-activation
    on_failure: error-handler
    parallel_with:
      - influencer-activation
    outputs:
      - press-coverage
      - media-mentions
      - pr-report
  - id: influencer-activation
    agent: pa-network
    task: pa-influencer-strategy
    depends_on: creative-direction
    action: Ativar parceiros influenciadores com briefing, conteúdo e tracking de
      resultados
    retry:
      max_attempts: 2
      backoff: linear
    on_success: campaign-optimization
    on_failure: error-handler
    parallel_with:
      - pr-launch
    outputs:
      - influencer-content-live
      - partnership-reports
      - reach-metrics
  - id: campaign-optimization
    agent: pa-profit
    task: pa-growth-sprint
    depends_on:
      - paid-media-launch
      - email-automation
      - social-launch
    action: "Otimização contínua de performance: A/B tests, bid adjustments,
      reallocation"
    recurring: true
    frequency: daily
    retry:
      max_attempts: 2
      backoff: linear
    on_success: performance-reporting
    on_failure: error-handler
    outputs:
      - optimization-log
      - budget-reallocations
      - ab-test-results
  - id: performance-reporting
    agent: pa-prism
    task: pa-analytics-audit
    depends_on:
      - campaign-optimization
    action: Relatórios diários de performance com insights, anomalias e recomendações
    recurring: true
    frequency: daily
    retry:
      max_attempts: 3
      backoff: exponential
    on_success: final-report
    on_failure: error-handler
    outputs:
      - daily-performance-report
      - anomaly-alerts
      - pacing-report
  - id: final-report
    agent: pa-empire
    task: pa-orchestrate-campaign
    depends_on:
      - performance-reporting
    action: Compilar relatório final completo com resultados vs KPIs, ROI e
      recomendações
    retry:
      max_attempts: 3
      backoff: exponential
    on_success: complete
    on_failure: error-handler
    outputs:
      - final-campaign-report
      - roi-analysis
      - learnings-document
      - next-campaign-recommendations
pre_conditions:
  - All required agents available and activated
  - Client brief approved by pa-empire
  - Budget and timeline validated
post_conditions:
  - All campaign assets delivered
  - Quality gates passed
  - Client sign-off received
error_handler:
  strategy: escalate-to-orchestrator
  escalation:
    - Agent self-corrects and retries
    - Escalate to pa-empire for resolution
    - Pause workflow and request client input
  rollback:
    trigger: Critical failure after 3 attempts
    action: Revert to last approved state
  actions:
    - action: log
      message: "Workflow failed at {step_id} with error: {error}"
    - action: notify
      channel: pedro-agencia-alerts
      recipient: pa-empire
    - action: escalate
      to: pa-empire
      after: 2 failures
retry:
  max_attempts: 3
  backoff: exponential
  retry_on:
    - network_error
    - agent_timeout
  do_not_retry:
    - validation_error
    - client_rejection
success_criteria:
  - ROAS mínimo de 4x em canais de performance
  - Todos os canais ativados no go-live day
  - Dashboard live antes do primeiro dia de campanha
  - CTR acima de benchmark do setor por canal
  - Relatório final entregue em D+5 após encerramento
  - NPS do cliente acima de 8 em todas as entregas
