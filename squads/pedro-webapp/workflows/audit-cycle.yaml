workflow:
  id: audit-cycle
  name: "Continuous Audit Cycle"
  description: |
    Ciclo de auditoria contínua para webapps em produção.
    Executar semanalmente ou após qualquer deploy significativo.
  version: 1.0.0

  trigger:
    schedule: "weekly"
    on_deploy: true

  sequence:
    - task: pwb-audit-system
      agent: pwb-auditor
      description: "Auditoria completa: segurança, performance, CRO, billing, monitoring"
      outputs: ["docs/audit-reports/audit-{date}.md"]

    - task: qa-regression
      agent: pwb-qa
      description: "Suite de regressão: unit + E2E + caminhos críticos"
      depends_on: [pwb-audit-system]
      outputs: ["tests/results/regression-{date}.json"]

    - task: delivery-status
      agent: pwb-maestro
      description: "Resumo executivo: métricas, issues, recomendações"
      depends_on: [qa-regression]
      outputs: ["docs/weekly-reports/report-{date}.md"]

  escalation:
    on_critical_finding:
      notify: ["pwb-maestro", "pwb-backend"]
      action: "STOP_DEPLOY"
    on_lighthouse_regression:
      notify: ["pwb-frontend", "pwb-seo"]
      action: "INVESTIGATE_PERFORMANCE"
    on_conversion_drop:
      notify: ["pwb-landing", "pwb-analytics"]
      action: "REVIEW_CRO"
