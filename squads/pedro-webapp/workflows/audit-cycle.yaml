workflow:
  id: audit-cycle
  name: "Audit Cycle — Continuous Quality Assurance"
  description: |
    Workflow de auditoria recorrente para garantir que o squad e o sistema
    mantenham 100/100 de qualidade e segurança.
  version: 1.0.0

  pre_conditions:
    - "Codebase estável (build passando)"
    - "Ambiente de Staging ou Prod disponível para testes de fumaça"
  
  post_conditions:
    - "Audit report gerado em docs/audit-reports/"
    - "Pontuação mínima de 95/100 mantida"

  error_handler:
    actions:
      - "Notificar @pwb-maestro sobre falhas críticas"
      - "Gerar ticket de correção imediata em docs/CRISIS.md"
  
  steps:
    - task: pwb-audit-system
      agent: pwb-auditor
      retry: 1
      description: "Executar auditoria de segurança, performance, código e CRO"
      outputs: ["docs/audit-reports/"]
    
    - task: qa-gate
      agent: pwb-qa
      retry: 1
      description: "Rodar suíte de testes E2E e sanitização"
      depends_on: [pwb-audit-system]

    - task: delivery-report
      agent: pwb-maestro
      retry: 1
      description: "Compilar resultados e notificar stakeholders"
      depends_on: [qa-gate]
      outputs: ["docs/DELIVERY.md"]
