workflow:
  id: saas-build
  name: "SaaS Build — Auth + Billing + Analytics"
  description: |
    Workflow para adicionar capacidades SaaS a um frontend/backend existente.
    Auth com RBAC, billing Stripe, email transacional, analytics e feature flags.
  version: 1.0.0

  sequence:
    - task: pwb-setup-database
      agent: pwb-data-engineer
      description: "Schema SaaS: organizations, subscriptions, notifications, audit_logs"
      outputs: ["supabase/migrations/xxx_saas_schema.sql"]

    - task: pwb-setup-auth
      agent: pwb-auth
      description: "Clerk ou Supabase Auth, RBAC, MFA, org management"
      depends_on: [pwb-setup-database]
      outputs: ["middleware.ts", "app/(auth)/", "lib/auth/"]

    - task: pwb-setup-billing
      agent: pwb-billing
      description: "Stripe: products, checkout, webhooks, portal, feature gating"
      depends_on: [pwb-setup-auth]
      outputs: ["apps/api/src/services/billing.service.ts"]

    - task: pwb-setup-email
      agent: pwb-email
      description: "Resend: templates (welcome, invoice, trial-ending, etc.), fila BullMQ"
      depends_on: [pwb-setup-auth]
      parallel: true
      outputs: ["packages/emails/"]

    - task: pwb-setup-analytics
      agent: pwb-analytics
      description: "PostHog: funnels, feature flags, A/B tests, Sentry"
      depends_on: [pwb-setup-auth]
      parallel: true
      outputs: ["lib/analytics/"]

    - task: pwb-audit-system
      agent: pwb-auditor
      description: "Auditoria focada em billing, auth security e analytics"
      depends_on: [pwb-setup-billing, pwb-setup-email, pwb-setup-analytics]
