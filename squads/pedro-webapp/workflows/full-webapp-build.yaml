workflow:
  id: full-webapp-build
  name: "Full WebApp Build — Brief to Production"
  description: |
    Workflow completo para qualquer webapp: landing page, dashboard ou SaaS completo.
    Do brief até deploy em produção com SSL, CI/CD e monitoramento.
  version: 1.0.0

  phases:
    - id: planning
      name: "Fase 1 — Planejamento"
      sequence:
        - task: pwb-orchestrate-project
          agent: pwb-maestro
          description: "Analisa brief, classifica projeto (LANDING/DASHBOARD/SAAS), cria blueprint"
          outputs: ["docs/PROJECT.md", "docs/PHASE-STATUS.md"]

        - task: pwb-gather-requirements
          agent: pwb-pm
          description: "PRD completo, personas JTBD, FRs priorizados, user stories"
          depends_on: [pwb-orchestrate-project]
          outputs: ["docs/PRD.md", "docs/personas.md", "docs/stories/"]

    - id: design_architecture
      name: "Fase 2 — Design & Arquitetura"
      sequence:
        - task: design-architecture
          agent: pwb-architect
          description: "Arquitetura do sistema, tech stack, contrato de API, ADRs"
          depends_on: [pwb-gather-requirements]
          outputs: ["docs/architecture.md", "docs/api-contract.md"]

        - task: pwb-design-system
          agent: pwb-ux-designer
          description: "Design tokens oklch, motion spec, HANDOFF.md"
          depends_on: [pwb-gather-requirements]
          parallel: true
          outputs: ["apps/web/styles/design-tokens.css", "docs/design/HANDOFF.md"]

    - id: data
      name: "Fase 3 — Database"
      sequence:
        - task: pwb-setup-database
          agent: pwb-data-engineer
          description: "Schema PostgreSQL, RLS em todas as tabelas, índices, Drizzle ORM"
          depends_on: [design-architecture]
          outputs: ["supabase/migrations/", "packages/database/schema/"]

    - id: implementation
      name: "Fase 4 — Implementação"
      sequence:
        - task: pwb-build-backend
          agent: pwb-backend
          description: "API Hono.js, Clean Architecture, RBAC, multi-tenancy, BullMQ"
          depends_on: [pwb-setup-database]
          outputs: ["apps/api/"]

        - task: pwb-setup-auth
          agent: pwb-auth
          description: "Clerk ou Supabase Auth, RBAC, MFA, session management"
          depends_on: [pwb-build-backend]
          outputs: ["middleware.ts", "app/(auth)/", "lib/auth/"]

        - task: pwb-setup-billing
          agent: pwb-billing
          description: "Stripe subscriptions, webhook, feature gating, pricing page"
          depends_on: [pwb-setup-auth]
          outputs: ["apps/api/src/services/billing.service.ts", "apps/web/app/(marketing)/pricing/"]

        - task: pwb-setup-email
          agent: pwb-email
          description: "Resend + React Email, BullMQ, notificações in-app"
          depends_on: [pwb-setup-auth]
          parallel: true
          outputs: ["packages/emails/", "apps/api/src/lib/email-queue.ts"]

        - task: pwb-setup-analytics
          agent: pwb-analytics
          description: "PostHog, event taxonomy, feature flags, Sentry"
          depends_on: [pwb-setup-auth]
          parallel: true
          outputs: ["lib/analytics/", "instrumentation.ts"]

        - task: pwb-build-frontend
          agent: pwb-frontend
          description: "Next.js 15, Server Components, React Query, dark mode, Lighthouse >= 95"
          depends_on: [pwb-design-system, pwb-build-backend, pwb-setup-analytics]
          outputs: ["apps/web/"]

        - task: pwb-build-landing
          agent: pwb-landing
          description: "Landing page de alta conversão, Lighthouse 100, OG image"
          depends_on: [pwb-build-frontend]
          outputs: ["apps/web/app/(marketing)/page.tsx", "apps/web/components/marketing/"]

        - task: pwb-setup-seo
          agent: pwb-seo
          description: "Metadata API, sitemap, robots, JSON-LD, Core Web Vitals"
          depends_on: [pwb-build-landing]
          outputs: ["app/sitemap.ts", "app/robots.ts", "components/seo/"]

    - id: quality_deploy
      name: "Fase 5 — Qualidade & Deploy"
      sequence:
        - task: pwb-audit-system
          agent: pwb-auditor
          description: "Auditoria: segurança, qualidade, performance, conversão, monitoring"
          depends_on: [pwb-build-frontend, pwb-build-backend, pwb-setup-billing]
          gate: MUST_PASS

        - task: qa-gate
          agent: pwb-qa
          description: "Unit, E2E Playwright, load test k6, mobile QA"
          depends_on: [pwb-audit-system]
          gate: MUST_PASS

        - task: pwb-deploy-vps
          agent: pwb-devops
          description: "VPS + Docker + Nginx + SSL + GitHub Actions + Uptime Kuma"
          depends_on: [qa-gate]
          outputs: ["infrastructure/", ".github/workflows/"]

    - id: documentation
      name: "Fase 6 — Documentação Final"
      sequence:
        - task: write-documentation
          agent: pwb-doc-writer
          description: "Architecture.md, API reference, runbook, client guide"
          depends_on: [pwb-deploy-vps]
          outputs: ["docs/"]

        - task: delivery-report
          agent: pwb-maestro
          description: "DELIVERY.md com URLs, credenciais, next steps"
          depends_on: [write-documentation]
          outputs: ["docs/DELIVERY.md"]

  gates:
    - id: planning-gate
      after: planning
      checks:
        - "PRD.md com FRs priorizados (MUST/SHOULD/COULD)?"
        - "Personas com JTBD documentadas?"
        - "Zero 'a definir' no PRD?"

    - id: design-gate
      after: design_architecture
      checks:
        - "architecture.md com diagrama Mermaid?"
        - "HANDOFF.md com todos os componentes especificados?"
        - "design-tokens.css com dark mode?"

    - id: pre-deploy-gate
      after: quality_deploy
      checks:
        - "Zero issues críticos no audit report?"
        - "Lighthouse Performance >= 95?"
        - "Lighthouse SEO = 100?"
        - "Todos os testes passando?"
        - "SSL válido?"
        - "Health check respondendo?"
