workflow:
  id: landing-build
  name: "Landing Page Build — 48h Pipeline"
  description: |
    Workflow focado para construir landing page de alta conversão em 48h.
    Do brief ao deploy com Lighthouse 100, SEO perfeito e analytics configurado.
  version: 1.0.0

  pre_conditions:
    - "Copywriting inicial disponível"
    - "Identidade visual (cores e logo) definida"
  
  post_conditions:
    - "Landing page live com Lighthouse 100"
    - "Eventos de conversão trackeados no PostHog"

  error_handler:
    actions:
      - "Notificar time de marketing (@pwb-pm, @pwb-landing) sobre bloqueio"
      - "Executar audit manual de Core Web Vitals via CLI"

  retry: 3

  steps:
    - task: pwb-gather-requirements
      agent: pwb-pm
      retry: 1
      description: "PRD mínimo: proposta de valor, personas, CTA principal, copy aprovado"
      outputs: ["docs/PRD.md"]

    - task: pwb-design-system
      agent: pwb-ux-designer
      retry: 1
      description: "Design tokens + HANDOFF.md focado em landing page"
      depends_on: [pwb-gather-requirements]
      outputs: ["styles/design-tokens.css", "docs/design/HANDOFF.md"]

    - task: pwb-build-landing
      agent: pwb-landing
      retry: 1
      description: "Landing completa: Hero → Features → Social Proof → Pricing → FAQ → CTA"
      depends_on: [pwb-design-system]
      outputs: ["apps/web/app/(marketing)/page.tsx", "apps/web/components/marketing/"]

    - task: pwb-setup-seo
      agent: pwb-seo
      retry: 1
      description: "Metadata, OG image, sitemap, robots, JSON-LD, Core Web Vitals"
      depends_on: [pwb-build-landing]

    - task: pwb-setup-analytics
      agent: pwb-analytics
      retry: 1
      description: "PostHog eventos de conversão, Sentry, pageview tracking"
      depends_on: [pwb-build-landing]
      parallel: true

    - task: pwb-audit-system
      agent: pwb-auditor
      retry: 1
      description: "Lighthouse >= 95, SEO 100, security headers, CRO checklist"
      depends_on: [pwb-setup-seo, pwb-setup-analytics]
      gate: MUST_PASS

    - task: pwb-deploy-vps
      agent: pwb-devops
      retry: 1
      description: "Deploy Vercel (frontend) + SSL + domínio configurado"
      depends_on: [pwb-audit-system]
