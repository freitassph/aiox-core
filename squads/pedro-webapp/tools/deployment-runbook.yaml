# Deployment Runbook Tool
# Comprehensive deployment runbook for webapp projects

name: deployment-runbook
version: 1.0.0
type: tool

description: >
  Step-by-step deployment runbook generator for pedro-webapp squad.
  Creates detailed, auditable deployment checklists for each deployment
  target (Vercel, VPS, Docker) with pre-flight checks, rollback
  procedures, and post-deployment verification steps.

deployment_phases:
  pre_deployment:
    name: "Pre-Deployment"
    steps:
      - id: pre_01
        name: "Code Review Complete"
        checks:
          - "All PRs reviewed and approved (min 2 reviewers)"
          - "No pending review comments"
          - "All CI checks passing"
          - "Branch is up to date with main"

      - id: pre_02
        name: "Quality Gates Passed"
        checks:
          - "Linting: zero warnings, zero errors"
          - "TypeScript: strict mode, zero type errors"
          - "Tests: coverage >= 80%, all tests passing"
          - "Lighthouse: Performance >= 95, Accessibility >= 95"
          - "Bundle size: within budget limits"
          - "Security audit: zero critical vulnerabilities"

      - id: pre_03
        name: "Database Migrations Ready"
        checks:
          - "Migration files reviewed by DBA or senior engineer"
          - "Migrations tested on staging environment"
          - "Rollback migrations tested"
          - "No destructive changes (DROP, ALTER without default)"
          - "Backward compatible (old code works with new schema)"

      - id: pre_04
        name: "Environment Variables Verified"
        checks:
          - "All required env vars defined in .env.production"
          - "No secrets committed in code (use secret manager)"
          - "API keys rotated if needed"
          - "Third-party service keys valid (Stripe, Clerk, Sentry)"
          - "Feature flags set to correct default values"

      - id: pre_05
        name: "Staging Validation"
        checks:
          - "Deployed and validated on staging environment"
          - "Smoke tests passing on staging"
          - "Visual regression tests passing"
          - "Cross-browser testing completed"
          - "Mobile responsive testing completed"
          - "Performance benchmarks met on staging"

      - id: pre_06
        name: "Communication"
        checks:
          - "Deployment window communicated to stakeholders"
          - "Customer support team notified of changes"
          - "Status page updated (if user-facing downtime expected)"
          - "On-call engineer identified for post-deployment"

  deployment:
    name: "Deployment Execution"
    steps:
      - id: dep_01
        name: "Create Deployment Tag"
        command: "git tag -a v{version} -m 'Release {version}' && git push origin v{version}"
        checks:
          - "Tag follows semantic versioning"
          - "Tag message includes release notes reference"

      - id: dep_02
        name: "Trigger Deployment"
        commands:
          vercel: "vercel --prod --yes"
          vps: "ssh deploy@host 'cd /opt/webapp && docker-compose pull && docker-compose up -d'"
          docker: "docker-compose up -d --build"
        checks:
          - "Deployment initiated by authorized person"
          - "Deployment logs being captured"

      - id: dep_03
        name: "Run Database Migrations"
        command: "npm run db:migrate"
        checks:
          - "Migrations complete without errors"
          - "Schema version verified"
          - "No data loss confirmed"

      - id: dep_04
        name: "Cache Invalidation"
        checks:
          - "CDN cache purged (if applicable)"
          - "ISR cache revalidated (Next.js)"
          - "Redis cache cleared for changed data (if applicable)"
          - "Service worker updated (if PWA)"

  post_deployment:
    name: "Post-Deployment Verification"
    steps:
      - id: post_01
        name: "Health Check"
        checks:
          - "GET /api/health returns 200"
          - "All dependent services responding (DB, Redis, external APIs)"
          - "No error spikes in Sentry/logs"
          - "Response times within acceptable range (P95 < 200ms)"

      - id: post_02
        name: "Smoke Tests"
        checks:
          - "Homepage loads correctly"
          - "Authentication flow works (login/logout)"
          - "Core user journey functional"
          - "Payment flow works (if applicable)"
          - "Email notifications sending (if applicable)"
          - "API endpoints returning correct responses"

      - id: post_03
        name: "Performance Verification"
        checks:
          - "Lighthouse scores within threshold on production URL"
          - "Core Web Vitals passing in real-user monitoring"
          - "API response times within SLA"
          - "No increase in error rate"

      - id: post_04
        name: "Monitoring Confirmation"
        checks:
          - "Sentry receiving events (no configuration errors)"
          - "Analytics tracking correctly"
          - "Uptime monitoring endpoint responding"
          - "Log aggregation working"
          - "Alert rules active and correct"

      - id: post_05
        name: "Rollback Readiness"
        checks:
          - "Previous version tag identified"
          - "Rollback procedure documented"
          - "Rollback tested on staging (if high-risk deployment)"
          - "Database rollback procedure ready (if migrations applied)"

rollback_procedures:
  vercel:
    steps:
      - "Navigate to Vercel Dashboard > Project > Deployments"
      - "Find last known good deployment"
      - "Click 'Promote to Production'"
      - "Verify health check passes"
      - "Investigate failed deployment and fix"
    estimated_time: "2-5 minutes"

  vps_docker:
    steps:
      - "ssh deploy@host 'cd /opt/webapp'"
      - "docker-compose ps  # Note current version"
      - "docker-compose down"
      - "docker pull registry.example.com/webapp:{previous_version}"
      - "Update docker-compose.yml to previous version"
      - "docker-compose up -d"
      - "If migrations were applied: npm run db:migrate:down"
      - "Verify health check: curl -f https://host/api/health"
    estimated_time: "5-15 minutes"

  docker_compose:
    steps:
      - "docker-compose ps  # Note current images"
      - "docker-compose down"
      - "git checkout {previous_version}"
      - "docker-compose up -d --build"
      - "If migrations: npm run db:migrate:down"
      - "Verify: curl -f http://localhost:3000/api/health"
    estimated_time: "5-15 minutes"

  automatic_rollback_triggers:
    - "Health check failing for > 5 minutes"
    - "Error rate > 5% within 10 minutes of deployment"
    - "Response time > 3x baseline for > 5 minutes"
    - "Critical errors in Sentry (P0/P1)"
    - "Customer-reported data loss or corruption"

environment_checklist:
  production:
    required_env_vars:
      - NODE_ENV=production
      - DATABASE_URL (secret)
      - REDIS_URL (secret)
      - CLERK_SECRET_KEY (secret)
      - STRIPE_SECRET_KEY (secret)
      - STRIPE_WEBHOOK_SECRET (secret)
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
      - NEXT_PUBLIC_APP_URL
      - SENTRY_DSN (secret)
      - POSTHOG_API_KEY (secret)

  staging:
    required_env_vars:
      - NODE_ENV=staging
      - DATABASE_URL (staging database)
      - REDIS_URL (staging Redis)
      - CLERK_SECRET_KEY (staging project)
      - STRIPE_SECRET_KEY (test mode)
      - STRIPE_WEBHOOK_SECRET (test mode)
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY (staging)
      - NEXT_PUBLIC_APP_URL (staging URL)
      - SENTRY_DSN (staging project)

usage:
  command: "deployment-runbook"
  options:
    - flag: "--generate <target>"
      description: "Generate runbook for deployment target (vercel, vps, docker)"
    - flag: "--checklist"
      description: "Print pre-deployment checklist"
    - flag: "--rollback <target>"
      description: "Show rollback procedure for target"
    - flag: "--env-check"
      description: "Verify environment variable checklist"
    - flag: "--output <file>"
      description: "Save runbook to file"

  examples:
    - "deployment-runbook --generate vercel"
    - "deployment-runbook --checklist"
    - "deployment-runbook --rollback vps"
    - "deployment-runbook --env-check --env production"
    - "deployment-runbook --generate docker --output docs/deploy-runbook.md"
