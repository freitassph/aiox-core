# API Contract Tester Tool
# Tool for testing, validating, and documenting API contracts

name: api-contract-tester
version: 1.0.0
type: tool

description: >
  API contract testing and validation tool for pedro-webapp squad.
  Validates that API responses match their TypeScript type definitions,
  OpenAPI specifications, and expected schemas. Catches breaking changes
  before they reach production and generates up-to-date API documentation.

contract_testing:
  workflow:
    step_1_define_contracts:
      description: "Define API contracts using TypeScript types or OpenAPI spec"
      formats:
        typescript: |
          // types/api.ts
          export interface User {
            id: string;
            email: string;
            name: string;
            role: 'admin' | 'editor' | 'viewer';
            createdAt: string; // ISO 8601
            updatedAt: string; // ISO 8601
          }

          export interface UserListResponse {
            data: User[];
            meta: {
              total: number;
              page: number;
              perPage: number;
              totalPages: number;
            };
          }

        openapi: |
          openapi: '3.0.3'
          info:
            title: WebApp API
            version: '1.0.0'
          paths:
            /api/users:
              get:
                summary: List users
                responses:
                  '200':
                    description: User list
                    content:
                      application/json:
                        schema:
                          $ref: '#/components/schemas/UserListResponse'

    step_2_capture_responses:
      description: "Make API calls and capture responses"
      methods:
        - "Direct HTTP calls during test execution"
        - "Playwright/Cypress E2E test interception"
        - "Proxy mode capturing real traffic"
        - "Import recorded responses from staging"

    step_3_validate:
      description: "Compare responses against contracts"
      validation_rules:
        - "Required fields present (not null/undefined)"
        - "Field types match (string, number, boolean, array, object)"
        - "Enum values are valid"
        - "Date strings are valid ISO 8601"
        - "Array items match item schema"
        - "No unexpected extra fields (strict mode)"
        - "Response status code matches expected"
        - "Response headers present (Content-Type, etc.)"

    step_4_report:
      description: "Generate validation report"
      output_formats:
        - "Markdown report"
        - "JSON (for CI/CD integration)"
        - "JUnit XML (for test runners)"
        - "Console summary"

api_endpoints_template:
  format: |
    # API Endpoint: {METHOD} {path}

    ## Overview
    - **Method:** {GET|POST|PUT|PATCH|DELETE}
    - **Path:** {path}
    - **Auth:** {Required|Optional|None}
    - **Rate Limit:** {requests/minute}

    ## Request

    ### Headers
    | Header | Required | Description |
    |--------|----------|-------------|
    | Authorization | Yes | Bearer {token} |
    | Content-Type | Yes | application/json |
    | X-Request-ID | No | Unique request identifier |

    ### Path Parameters
    | Parameter | Type | Required | Description |
    |-----------|------|----------|-------------|
    | id | string | Yes | Resource UUID |

    ### Query Parameters
    | Parameter | Type | Required | Default | Description |
    |-----------|------|----------|---------|-------------|
    | page | number | No | 1 | Page number |
    | perPage | number | No | 20 | Items per page (max 100) |
    | sort | string | No | createdAt | Sort field |
    | order | string | No | desc | Sort direction (asc/desc) |
    | search | string | No | — | Full-text search |

    ### Request Body (POST/PUT/PATCH)
    \`\`\`typescript
    interface CreateRequest {
      name: string;           // Required, 2-100 chars
      email: string;          // Required, valid email
      role?: 'admin' | 'editor' | 'viewer'; // Default: 'viewer'
      metadata?: Record<string, unknown>;   // Optional, max 10 keys
    }
    \`\`\`

    ## Response

    ### 200 OK
    \`\`\`typescript
    interface Response {
      data: Resource[];
      meta: {
        total: number;
        page: number;
        perPage: number;
        totalPages: number;
      };
    }
    \`\`\`

    ### 201 Created (POST)
    Returns created resource with Location header.

    ### 400 Bad Request
    \`\`\`json
    {
      "error": "VALIDATION_ERROR",
      "message": "Invalid request body",
      "details": [
        { "field": "email", "message": "Invalid email format" }
      ]
    }
    \`\`\`

    ### 401 Unauthorized
    \`\`\`json
    { "error": "UNAUTHORIZED", "message": "Valid authentication required" }
    \`\`\`

    ### 403 Forbidden
    \`\`\`json
    { "error": "FORBIDDEN", "message": "Insufficient permissions" }
    \`\`\`

    ### 404 Not Found
    \`\`\`json
    { "error": "NOT_FOUND", "message": "Resource not found" }
    \`\`\`

    ### 429 Too Many Requests
    \`\`\`json
    { "error": "RATE_LIMITED", "message": "Too many requests", "retryAfter": 60 }
    \`\`\`

    ### 500 Internal Server Error
    \`\`\`json
    { "error": "INTERNAL_ERROR", "message": "An unexpected error occurred" }
    \`\`\`

    ## Examples

    ### Request
    \`\`\`bash
    curl -X GET 'https://api.example.com/api/users?page=1&perPage=10' \\
      -H 'Authorization: Bearer {token}'
    \`\`\`

    ### Response
    \`\`\`json
    {
      "data": [
        {
          "id": "usr_abc123",
          "email": "user@example.com",
          "name": "John Doe",
          "role": "admin",
          "createdAt": "2026-01-15T10:30:00Z",
          "updatedAt": "2026-04-01T14:20:00Z"
        }
      ],
      "meta": {
        "total": 142,
        "page": 1,
        "perPage": 10,
        "totalPages": 15
      }
    }
    \`\`\`

    ## Testing

    ### Contract Test
    \`\`\`typescript
    describe('GET /api/users', () => {
      it('returns valid UserListResponse', async () => {
        const response = await api.get('/api/users');
        expect(response).toMatchSchema(UserListResponseSchema);
      });
    });
    \`\`\`

breaking_change_detection:
  breaking_changes:
    - "Removing a field from response"
    - "Changing field type (string -> number)"
    - "Making optional field required"
    - "Removing an API endpoint"
    - "Changing HTTP method for endpoint"
    - "Adding required request parameter"
    - "Changing authentication requirement"
    - "Narrowing enum values (removing options)"
    - "Changing error response format"

  non_breaking_changes:
    - "Adding optional field to response"
    - "Adding optional query parameter"
    - "Adding new enum value"
    - "Adding new endpoint"
    - "Changing field from required to optional"
    - "Improving error messages"
    - "Adding new response fields (if client is resilient)"

  versioning_strategy:
    approach: "URL path versioning (/api/v1/, /api/v2/)"
    deprecation_policy:
      - "Announce deprecation with sunset date (min 6 months)"
      - "Add Deprecation header to responses"
      - "Log usage of deprecated endpoints"
      - "Notify affected API consumers"
      - "Remove after sunset date"

ci_cd_integration:
  pipeline_steps:
    - name: "Generate API types from OpenAPI spec"
      command: "npx openapi-typescript openapi.yaml -o types/api.d.ts"
    - name: "Run contract tests"
      command: "npx vitest run tests/api-contract"
    - name: "Check for breaking changes"
      command: "npx @apidevtools/swagger-cli validate openapi.yaml"
    - name: "Update API documentation"
      command: "npx redoc-cli build openapi.yaml -o docs/api.html"
    - name: "Fail if breaking changes in minor release"
      command: "napi diff openapi-prev.yaml openapi-current.yaml --fail-on-breaking"

  gate_conditions:
    - "All contract tests must pass"
    - "No undocumented breaking changes in minor/patch release"
    - "OpenAPI spec must be valid"
    - "All documented endpoints have tests"

usage:
  command: "api-contract-tester"
  options:
    - flag: "--validate <spec>"
      description: "Validate OpenAPI spec file"
    - flag: "--test <endpoint>"
      description: "Test specific endpoint against contract"
    - flag: "--test-all"
      description: "Test all endpoints against contracts"
    - flag: "--diff <old-spec> <new-spec>"
      description: "Compare two API specs for breaking changes"
    - flag: "--generate-docs"
      description: "Generate API documentation from spec"
    - flag: "--generate-types"
      description: "Generate TypeScript types from OpenAPI spec"
    - flag: "--report"
      description: "Generate contract test report"

  examples:
    - "api-contract-tester --validate openapi.yaml"
    - "api-contract-tester --test-all --base-url http://localhost:3000"
    - "api-contract-tester --diff openapi-v1.yaml openapi-v2.yaml"
    - "api-contract-tester --generate-types --output types/api.d.ts"
    - "api-contract-tester --generate-docs --output docs/api.html"
    - "api-contract-tester --report --output docs/api-contract-report.md"
