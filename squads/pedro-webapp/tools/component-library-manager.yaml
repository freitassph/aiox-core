# Component Library Manager Tool
# Tool for managing, documenting, and testing UI component libraries

name: component-library-manager
version: 1.0.0
type: tool

description: >
  Comprehensive tool for managing a webapp's UI component library.
  Handles component registration, documentation generation, visual
  regression testing, accessibility auditing, and design token
  synchronization. Ensures all components meet pedro-webapp quality
  standards for design, accessibility, and performance.

component_standards:
  required_structure:
    - "Component file: components/{ComponentName}.tsx"
    - "Styles: co-located or CSS module"
    - "Tests: components/{ComponentName}.test.tsx"
    - "Stories: components/{ComponentName}.stories.tsx (Storybook)"
    - "Documentation: components/{ComponentName}.md"

  required_exports:
    - "Default export: The component itself"
    - "Named exports: Variants, sub-components, types"

  naming_conventions:
    - "Components: PascalCase (Button, Modal, DataTable)"
    - "Hooks: camelCase with 'use' prefix (useModal, useTable)"
    - "Types: PascalCase (ButtonProps, ModalConfig)"
    - "Constants: UPPER_SNAKE_CASE (MAX_ROWS, DEFAULT_TIMEOUT)"
    - "Variants: kebab-case in CSS (btn--primary, btn--large)"

component_template:
  typescript: |
    import * as React from 'react';

    export interface ButtonProps extends React.ButtonHTMLAttributes<HTMLButtonElement> {
      /** The visual variant */
      variant?: 'primary' | 'secondary' | 'ghost' | 'destructive';
      /** Button size */
      size?: 'sm' | 'md' | 'lg';
      /** Loading state */
      isLoading?: boolean;
      /** Icon to display before text */
      icon?: React.ReactNode;
      /** Disable user interaction */
      disabled?: boolean;
    }

    /**
     * Button component for user actions.
     * Supports multiple variants, sizes, and loading states.
     *
     * @example
     * ```tsx
     * <Button variant="primary" size="md" onClick={handleClick}>
     *   Click me
     * </Button>
     * ```
     */
    export const Button = React.forwardRef<HTMLButtonElement, ButtonProps>(
      (
        {
          variant = 'primary',
          size = 'md',
          isLoading = false,
          icon,
          disabled,
          children,
          className,
          ...props
        },
        ref
      ) => {
        return (
          <button
            ref={ref}
            className={cn('btn', `btn--${variant}`, `btn--${size}`, className)}
            disabled={disabled || isLoading}
            aria-busy={isLoading}
            {...props}
          >
            {isLoading && <Spinner size="sm" aria-hidden />}
            {icon && <span className="btn__icon" aria-hidden>{icon}</span>}
            <span>{children}</span>
          </button>
        );
      }
    );

    Button.displayName = 'Button';

  storybook_story: |
    import type { Meta, StoryObj } from '@storybook/react';
    import { Button } from './Button';

    const meta: Meta<typeof Button> = {
      title: 'Components/Button',
      component: Button,
      parameters: {
        layout: 'centered',
        docs: {
          description: {
            component: 'Button component for user actions. Supports multiple variants, sizes, and loading states.'
          }
        }
      },
      argTypes: {
        variant: {
          control: 'select',
          options: ['primary', 'secondary', 'ghost', 'destructive']
        },
        size: {
          control: 'select',
          options: ['sm', 'md', 'lg']
        }
      },
      tags: ['autodocs']
    };

    export default meta;
    type Story = StoryObj<typeof Button>;

    export const Primary: Story = {
      args: { variant: 'primary', children: 'Primary Button' }
    };

    export const Secondary: Story = {
      args: { variant: 'secondary', children: 'Secondary Button' }
    };

    export const WithIcon: Story = {
      args: {
        variant: 'primary',
        icon: <DownloadIcon />,
        children: 'Download'
      }
    };

    export const Loading: Story = {
      args: { variant: 'primary', isLoading: true, children: 'Loading...' }
    };

    export const Disabled: Story = {
      args: { variant: 'primary', disabled: true, children: 'Disabled' }
    };

quality_checks:
  accessibility:
    rules:
      - "All interactive elements are keyboard accessible (Tab, Enter, Space, Escape)"
      - "All images have alt text (decorative images use alt='')"
      - "Color contrast meets WCAG AA (4.5:1 text, 3:1 large text/UI)"
      - "Focus states are visible and distinct"
      - "ARIA attributes used correctly (not as a replacement for semantic HTML)"
      - "Form inputs have associated labels"
      - "Error messages are associated with inputs (aria-describedby)"
      - "Modal traps focus and returns focus on close"
      - "Skip navigation link present"
      - "No auto-playing media"

    tools:
      - "axe-core (automated testing)"
      - "Lighthouse Accessibility audit"
      - "Manual keyboard navigation testing"
      - "Screen reader testing (VoiceOver, NVDA)"

  visual_regression:
    approach: "Storybook + Chromatic or Playwright screenshots"
    thresholds:
      pixel_diff: "< 0.1% change allowed"
      new_elements: "Any new element must be intentional"
      removed_elements: "Any removed element must be intentional"
    browsers:
      - "Chrome (latest) — Desktop"
      - "Firefox (latest) — Desktop"
      - "Safari (latest) — Desktop"
      - "Chrome (latest) — Mobile (375px)"
    viewport_sizes:
      - "375x812 (iPhone 12/13/14)"
      - "768x1024 (iPad)"
      - "1280x720 (Desktop)"
      - "1920x1080 (Large Desktop)"

  performance:
    rules:
      - "Component renders in < 16ms (single frame)"
      - "No unnecessary re-renders (React.memo where beneficial)"
      - "No inline object/function creation in render"
      - "Lazy load heavy components (next/dynamic)"
      - "Images use next/image with proper sizing"
      - "Fonts use font-display: swap"
      - "No layout shift from component rendering"

    tools:
      - "React DevTools Profiler"
      - "why-did-you-render (development)"
      - "Lighthouse Performance audit"
      - "Web Vitals monitoring"

design_tokens:
  structure:
    colors:
      primary: "Main brand color"
      secondary: "Secondary brand color"
      success: "Positive actions and states"
      warning: "Caution states"
      error: "Error states"
      neutral: "Grays for text, backgrounds, borders"
      background: "Page and component backgrounds"
      surface: "Elevated surfaces (cards, modals)"

    typography:
      font_family: "Primary and secondary font families"
      font_sizes: "Scale from xs (12px) to 5xl (48px)"
      font_weights: "Regular (400), Medium (500), Semibold (600), Bold (700)"
      line_heights: "Tight (1.25), Normal (1.5), Relaxed (1.75)"
      letter_spacing: "Tight (-0.025em), Normal (0), Wide (0.025em)"

    spacing:
      scale: "0, 1, 2, 4, 6, 8, 12, 16, 24, 32, 48, 64, 96, 128"
      unit: "4px base (0.25rem)"

    borders:
      radius: "sm (4px), md (8px), lg (12px), xl (16px), full (9999px)"
      width: "0, 1, 2, 4"
      colors: "Mapped from color tokens"

    shadows:
      sm: "Subtle elevation (cards)"
      md: "Medium elevation (dropdowns)"
      lg: "High elevation (modals, popovers)"
      xl: "Maximum elevation (toast, tooltips)"

    breakpoints:
      sm: "640px"
      md: "768px"
      lg: "1024px"
      xl: "1280px"
      "2xl": "1536px"

  sync_workflow:
    steps:
      - "Design tokens defined in Figma"
      - "Tokens exported as JSON via Figma API"
      - "JSON transformed to Tailwind config / CSS variables"
      - "Components consume tokens (not hardcoded values)"
      - "Visual regression tests verify no unintended changes"
      - "Documentation updated with new/changed tokens"

component_registry:
  core_components:
    - Button
    - Input
    - Textarea
    - Select
    - Checkbox
    - Radio
    - Switch
    - Label
    - Form
    - Modal
    - Dialog
    - Toast
    - Tooltip
    - Popover
    - Dropdown
    - Tabs
    - Accordion
    - Card
    - Avatar
    - Badge
    - Skeleton
    - Spinner
    - Progress
    - Alert
    - Breadcrumb
    - Pagination
    - DataTable
    - EmptyState
    - Navbar
    - Sidebar
    - Footer

  layout_components:
    - Container
    - Stack
    - Grid
    - Flex
    - Divider
    - Spacer
    - AspectRatio
    - Box

  feedback_components:
    - LoadingScreen
    - ErrorBoundary
    - NotFound
    - MaintenancePage
    - OfflineIndicator

usage:
  command: "component-library-manager"
  options:
    - flag: "--list"
      description: "List all registered components"
    - flag: "--doc <component>"
      description: "Generate documentation for a component"
    - flag: "--test-a11y <component>"
      description: "Run accessibility audit on component"
    - flag: "--test-visual"
      description: "Run visual regression tests"
    - flag: "--sync-tokens"
      description: "Sync design tokens from Figma"
    - flag: "--new <name>"
      description: "Scaffold a new component with all files"
    - flag: "--audit"
      description: "Full audit of all components (a11y + visual + performance)"

  examples:
    - "component-library-manager --list"
    - "component-library-manager --new Button"
    - "component-library-manager --doc Modal"
    - "component-library-manager --test-a11y DataTable"
    - "component-library-manager --sync-tokens"
    - "component-library-manager --audit"
